    if(prev){
      const vx=tx-prev.x,vy=ty-prev.y;
      if(ty<waterY+surfZone){
        const col=_touchCol(tx);
        if(col>=0)applyForce(bgHF,col,vy*0.8,6);
      }
      pushFloatersAt(tx,ty,vx*0.5,vy*0.5);
      prev.x=tx;prev.y=ty;
    }
  }
},{passive:true});
document.addEventListener('touchend',(e)=>{
  for(let i=0;i<e.changedTouches.length;i++)delete waterTouches[e.changedTouches[i].identifier];
},{passive:true});
document.addEventListener('mousedown',(e)=>{
  if(!bgWaveState.active||e.target.closest('.card,.sheet,.fab,.hdr,.pill,.coin-pill'))return;
  const dpr=_bgDpr();
  const tx=e.clientX*dpr,ty=e.clientY*dpr;
  const H=window.innerHeight*dpr;
  const waterY=H*(1-bgWaveState.fill/100);
  const surfZone=80*dpr;
  const aboveZone=20*dpr;
  // Always allow floater interaction (ball juggling needs taps above water)
  pushFloatersAt(tx,ty,0,-5);
  popBubbleAt(tx,ty);
  // Water surface effects only near the water
  if(ty<waterY-aboveZone)return;
  waterTouches['mouse']={x:tx,y:ty};
  if(ty<waterY+surfZone){
    const col=_touchCol(tx);
    if(col>=0){applyForce(bgHF,col,-25,8);sndPlop(25);}
  }
});
document.addEventListener('mousemove',(e)=>{
  const prev=waterTouches['mouse'];
  if(!prev)return;
  const dpr=_bgDpr();
  const tx=e.clientX*dpr,ty=e.clientY*dpr;
  const vx=tx-prev.x,vy=ty-prev.y;
  const H=window.innerHeight*dpr;
  const waterY=H*(1-bgWaveState.fill/100);
  const surfZone=80*dpr;
  if(ty<waterY+surfZone){
    const col=_touchCol(tx);
    if(col>=0)applyForce(bgHF,col,vy*0.8,6);
  }
  pushFloatersAt(tx,ty,vx*0.5,vy*0.5);
  prev.x=tx;prev.y=ty;
});
document.addEventListener('mouseup',()=>{delete waterTouches['mouse'];});

// ── TAP RIPPLE ──────────────────────────────────────────────────────
function spawnRipple(x,y){
  const r1=document.createElement('div');
  r1.className='tap-ripple';r1.style.left=x+'px';r1.style.top=y+'px';
  const r2=document.createElement('div');
  r2.className='tap-ripple';r2.style.left=x+'px';r2.style.top=y+'px';
  r2.style.animationDelay='.08s';
  document.body.appendChild(r1);document.body.appendChild(r2);
  setTimeout(()=>{r1.remove();r2.remove();},700);
}
document.addEventListener('pointerdown',(e)=>{
  // Ripple on interactive UI elements
  if(e.target.closest('button,a,.card,.pill,.coin-pill,.fab,.sw,[onclick]')){spawnRipple(e.clientX,e.clientY);return;}
  // Ripple on water surface taps
  if(bgWaveState.active&&bgWaveState.fill>1){
    const waterY=window.innerHeight*(1-bgWaveState.fill/100);
    if(Math.abs(e.clientY-waterY)<60)spawnRipple(e.clientX,e.clientY);
  }
},{passive:true});

let _waveAlive=0;
function startWaveLoop(){
  // Detect dead loop: waveRaf is set but loop hasn't run in 500ms
  if(waveRaf&&performance.now()-_waveAlive<500)return;
  if(waveRaf){cancelAnimationFrame(waveRaf);waveRaf=null;}
  lastFrame=performance.now();
  waveRaf=requestAnimationFrame(waveLoop);
}
function stopWaveLoop(){
  if(waveRaf){cancelAnimationFrame(waveRaf);waveRaf=null;}
}

function waveLoop(now){
  _waveAlive=now;
  let _anyContinue=false;
  try{
  const dt=Math.min((now-lastFrame)/1000,0.05);
  lastFrame=now;
  waveT=(waveT+dt)%10000;
  const anyRunning=S&&S.tasks&&S.tasks.some(t=>t.running&&!t.done);
  const rt=S&&S.tasks&&S.tasks.find(t=>t.running&&!t.done);
  _anyContinue=anyRunning||bgWaveState.active;

  // ── Pip canvas ────────────────────────────────────────────────────
  if(rt){
    const cv=document.getElementById('pf-'+rt.id);
    if(cv&&cv.tagName==='CANVAS'){
      const targetFill=parseFloat(cv.dataset.fill)||0;
      const color=cv.dataset.color||rt.color;
      // Smooth fill: lerp toward target each frame so water rises continuously
      // rather than jumping once per second tick.
      const key='_sf_'+rt.id;
      if(window[key]===undefined||!rt.running)window[key]=targetFill;
      // Fast enough to track within ~0.5s, slow enough to be smooth
      window[key]+=(targetFill-window[key])*Math.min(dt*4,0.18);
      const fill=window[key];
      const dpr=Math.min(window.devicePixelRatio||1,3);
      const W=Math.round(36*dpr), H=Math.round(36*dpr);
      if(cv.width!==W||cv.height!==H){
        cv.width=W;cv.height=H;
        cv.style.width='36px';cv.style.height='36px';
        cv.style.imageRendering='auto';
      }
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,W,H);
      if(rt.isRest){
        // Pip steam: task-colored fog dissipating
        const rPct=rt.restDur>0?rt.rem/rt.restDur:0;
        const parseH=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
        const [pr,pg,pb]=parseH(color);
        const sg=ctx.createLinearGradient(0,0,0,H);
        const sa=rPct*0.6;
        sg.addColorStop(0,`rgba(${pr},${pg},${pb},${(sa*0.15).toFixed(3)})`);
        sg.addColorStop(1,`rgba(${pr},${pg},${pb},${sa.toFixed(3)})`);
        ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
        // Wisp
        const wx=W*(0.3+0.4*Math.sin(waveT*0.2));
        const wy=H*(0.3+0.3*Math.cos(waveT*0.15));
        const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,W*0.4);
        wg.addColorStop(0,`rgba(${pr},${pg},${pb},${(rPct*0.2).toFixed(3)})`);
        wg.addColorStop(1,`rgba(${pr},${pg},${pb},0)`);
        ctx.fillStyle=wg;ctx.fillRect(0,0,W,H);
        drawContainerWalls(ctx,W,H);
      } else if(fill>0.2){
        const bubs=getBubbles(rt.id,color);
        tickBubbles(bubs,W,H,fill,dt,color,false);
        drawWater(ctx,W,H,fill,color,waveT,bubs,false,0);
        drawContainerWalls(ctx,W,H);
      }
    }
  }

  // ── Bg canvas ─────────────────────────────────────────────────────
  const bgc=document.getElementById('bg-canvas');
  const isResting=rt&&rt.isRest;
  if(bgc&&bgWaveState.active&&anyRunning){
    bgWaveState.fill+=(bgWaveState.targetFill-bgWaveState.fill)*Math.min(dt*3,0.18);
    if(bgWaveState.fill<2&&bgWaveState.targetFill>0)bgWaveState.fill=2; // never fully zero while active
    // Lerp bg color toward target for smooth task-color transitions
    if(bgWaveState.targetColor&&bgWaveState.color!==bgWaveState.targetColor){
      const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
      const parseHex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const hex2=(n)=>n.toString(16).padStart(2,'0');
      const [r1,g1,b1]=parseHex(bgWaveState.color);
      const [r2,g2,b2]=parseHex(bgWaveState.targetColor);
      const s=Math.min(dt*2,0.08);
      bgWaveState.color='#'+hex2(lerp(r1,r2,s))+hex2(lerp(g1,g2,s))+hex2(lerp(b1,b2,s));
    }
    const dprBg=Math.min(window.devicePixelRatio||1,2);
    const W=Math.round(window.innerWidth*dprBg);
    const H=Math.round(window.innerHeight*dprBg);
    if(Math.abs(bgc.width-W)>2||Math.abs(bgc.height-H)>2){
      bgc.width=W;bgc.height=H;
    }
    const ctx=bgc.getContext('2d');
    ctx.clearRect(0,0,W,H);

    if(isResting){
      // ── REST: steam dissipating ──────────────────────────────────
      // Steam density = how much rest remains (dense at start, clear at end)
      const restPct=rt.restDur>0?rt.rem/rt.restDur:0; // 1.0→0.0
      const parseHex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const [sr,sg,sb]=parseHex(bgWaveState.color);
      // Vertical gradient: dense at bottom (where water was), thinning upward
      const steamG=ctx.createLinearGradient(0,0,0,H);
      const baseA=restPct*0.45; // max opacity scales with remaining rest
      steamG.addColorStop(0,   `rgba(${sr},${sg},${sb},${(baseA*0.05).toFixed(3)})`);
      steamG.addColorStop(0.3, `rgba(${sr},${sg},${sb},${(baseA*0.25).toFixed(3)})`);
      steamG.addColorStop(0.7, `rgba(${sr},${sg},${sb},${(baseA*0.6).toFixed(3)})`);
      steamG.addColorStop(1,   `rgba(${sr},${sg},${sb},${baseA.toFixed(3)})`);
      ctx.fillStyle=steamG;
      ctx.fillRect(0,0,W,H);
      // Animated wisps — slow-moving cloudy patches
      const wispCount=6;
      for(let wi=0;wi<wispCount;wi++){
        const wx=W*(0.1+0.8*((Math.sin(waveT*0.08+wi*2.1)+1)/2));
        const wy=H*(0.2+0.6*((Math.cos(waveT*0.05+wi*1.7)+1)/2));
        const wr=W*(0.15+0.1*Math.sin(waveT*0.03+wi));
        const wispA=restPct*0.12;
        const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,wr);
        wg.addColorStop(0,`rgba(${sr},${sg},${sb},${wispA.toFixed(3)})`);
        wg.addColorStop(1,`rgba(${sr},${sg},${sb},0)`);
        ctx.fillStyle=wg;
        ctx.fillRect(wx-wr,wy-wr,wr*2,wr*2);
      }
      // ── Centered rest text (aquarium mode only — cards hidden) ──
      if(document.querySelector('.app-wrap.aquarium')){
        const textA=Math.min(1,restPct*1.5)*0.55;
        const dprBgT=Math.min(window.devicePixelRatio||1,2);
        ctx.save();
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.font=`800 ${Math.round(22*dprBgT)}px Syne,sans-serif`;
        ctx.fillStyle=`rgba(28,25,23,${textA.toFixed(2)})`;
        ctx.fillText('steam clearing.',W/2,H*0.44);
        ctx.font=`800 ${Math.round(48*dprBgT)}px Syne,sans-serif`;
        ctx.fillStyle=`rgba(28,25,23,${(textA*0.9).toFixed(2)})`;
        ctx.fillText(fmtTime(rt.rem),W/2,H*0.44+Math.round(52*dprBgT));
        ctx.font=`600 ${Math.round(12*dprBgT)}px "Plus Jakarta Sans",sans-serif`;
        ctx.fillStyle=`rgba(28,25,23,${(textA*0.5).toFixed(2)})`;
        const bl=rt.total-rt.completed;
        const sub=bl<=1?'final block next':'block '+(rt.completed+1)+' of '+rt.total+' next';
        ctx.fillText(sub,W/2,H*0.44+Math.round(90*dprBgT));
        ctx.restore();
      }
    } else if(bgWaveState.fill>0.3){
      // ── WORK: water + floaters + noodles ─────────────────────────
      // Step heightfield physics
      const bgStep=3;
      const bgN=Math.min(Math.ceil(W/bgStep)+1,1024);
      ensureBgHF(bgN);
      const boil2=(bgWaveState.fill/100)*(bgWaveState.fill/100);
      const hfSteps=Math.max(2,Math.round(dt*60));
      for(let si=0;si<hfSteps;si++)stepHF(bgHF,0.35,0.985);
      injectBoilEnergy(bgHF,boil2,dt);
      updateTiltLayer(bgN);
      tickBubbles(bgBubbles,W,H,bgWaveState.fill,dt,bgWaveState.color,true);
      drawWater(ctx,W,H,bgWaveState.fill,bgWaveState.color,waveT*0.35,bgBubbles,true,bgHF);
      // Noodles (drawn submerged, before floaters)
      const bgFillY=H*(1-bgWaveState.fill/100);
      if(getTheme().noodles){
        if(!_noodles.length)initNoodles(W,H,bgFillY);
        drawNoodles(ctx,W,H,bgFillY,boil2,waveT);
      }
      // Floaters
      if(activeFloaters.length===0&&((S.shopItems&&S.shopItems.floaters&&S.shopItems.floaters.length)||getTheme().floaters.length))spawnFloaters(W,bgFillY);
      stepFloaters(W,H,bgFillY,bgHF,bgStep,dt,boil2);
      drawFloaters(ctx);
      // Glass fogging at high boil
      if(boil2>0.4){
        ctx.save();ctx.globalAlpha=(boil2-0.4)*0.25;
        const fogG=ctx.createLinearGradient(0,0,0,H);
        fogG.addColorStop(0,'rgba(255,255,255,0.7)');
        fogG.addColorStop(0.25,'rgba(255,255,255,0)');
        fogG.addColorStop(0.75,'rgba(255,255,255,0)');
        fogG.addColorStop(1,'rgba(255,255,255,0.3)');
        ctx.fillStyle=fogG;ctx.fillRect(0,0,W,H);
        ctx.restore();
      }
      // Edge vignette
      const edgeG=ctx.createLinearGradient(0,0,W,0);
      edgeG.addColorStop(0,  `rgba(0,0,0,0.08)`);
      edgeG.addColorStop(0.04,`rgba(0,0,0,0)`);
      edgeG.addColorStop(0.96,`rgba(0,0,0,0)`);
      edgeG.addColorStop(1,  `rgba(0,0,0,0.08)`);
      ctx.fillStyle=edgeG;
      ctx.fillRect(0,0,W,H);
    }
  }

  // Steam particles above waterline at high boil — heat level lowers threshold
  const _steamHm=heatMultiplier();
  const _steamThreshold=Math.max(15,35-_steamHm*4);
  if(bgWaveState.active&&bgWaveState.fill>_steamThreshold){
    const steamBoil=(bgWaveState.fill/100)*(bgWaveState.fill/100);
    if(steamBoil>0.10){
      const steamRate=(steamBoil-0.10)*5*_steamHm;
      const sN=Math.floor(steamRate*dt+(Math.random()<(steamRate*dt%1)?1:0));
      const surfY=FX.height*(1-bgWaveState.fill/100);
      for(let si=0;si<sN;si++){
        const sp=new P(
          FX.width*(0.12+Math.random()*0.76),
          surfY-5-Math.random()*15,
          (Math.random()-.5)*1.5,
          -(0.6+Math.random()*2),
          `rgba(255,255,255,${(0.08+steamBoil*0.12).toFixed(2)})`,
          4+Math.random()*8,-0.015);
        sp.decay=0.01+Math.random()*0.008;
        sp.round=true;
        parts.push(sp);
      }
      if(sN>0)startFX();
    }
  }

  _anyContinue=anyRunning||bgWaveState.active;
  if(GOD_MODE&&_tiltRaw!==undefined){const td=document.getElementById('tilt-debug');if(td)td.textContent=`tilt: ${_tiltRaw===null?'NO DATA':_tiltRaw.toFixed(1)}° smooth: ${tiltSmooth.toFixed(1)} | sensors: ${_sensorsAttached?'ON':'OFF'}`;}
  }catch(e){console.error('waveLoop:',e);_anyContinue=true;}
  if(_anyContinue){
    waveRaf=requestAnimationFrame(waveLoop);
  } else {
    waveRaf=null;
    const _bgc=document.getElementById('bg-canvas');
    if(_bgc){const _ctx=_bgc.getContext('2d');if(_ctx)_ctx.clearRect(0,0,_bgc.width,_bgc.height);}
  }
}


// ── BUBBLE SYSTEM ─────────────────────────────────────────────────────
function heatMultiplier(){const idx=HEAT_LEVELS.findIndex(h=>h===getHeatLevel());return 1+idx*0.12;}
function tickBubbles(pool,W,H,fp,dt,color,isBg){
  const b2=(fp/100)*(fp/100);
  const fillY=H*(1-fp/100);
  const hm=heatMultiplier();
  const baseRate=isBg?(fp<8?0:b2*120*hm):(fp<15?0:b2*18*hm);
  const n=Math.floor(baseRate*dt+(Math.random()<(baseRate*dt%1)?1:0));
  for(let s=0;s<n;s++){
    // Nucleation-site spawning: bubbles form near bottom and edges
    // Start TINY, grow as they rise (simulated via r scaling with born time)
    const startR=isBg?(0.3+Math.random()*0.8):(0.3+Math.random()*0.6);
    // At high boil (b2>0.6) bubbles grow significantly larger and more visible
    const highBoilBonus=isBg?Math.max(0,b2-0.5)*8:0;
    const maxR  =isBg?(2+b2*9+highBoilBonus+Math.random()*(b2*4+highBoilBonus*0.5)):(1.0+b2*3.0+Math.random()*(b2*2.0));
    const speed=isBg?(10+b2*140+Math.random()*(b2*80))
                    :(4+b2*35+Math.random()*(b2*20));
    // Nucleation sites: mostly near walls and bottom
    const nucleateSide=Math.random()<0.25; // 25% chance spawn near a wall
    const spawnX=nucleateSide
      ? (Math.random()<0.5 ? W*(0.02+Math.random()*0.08) : W*(0.90+Math.random()*0.08))
      : W*(0.08+Math.random()*0.84);
    // Spawn in bottom 40% of water column
    const waterDepth=Math.max(1,H-fillY);
    const spawnY=Math.min(H-2, fillY+waterDepth*0.60+Math.random()*waterDepth*0.38);
    pool.push({
      x:spawnX, y:spawnY,
      vy:-speed, vx:(Math.random()-.5)*(isBg?3:1.5),
      r:startR, maxR, // grow toward maxR as rises
      op:isBg?(0.5+b2*0.5+Math.random()*0.05):(0.55+b2*0.35+Math.random()*0.05),
      born:0, wobble:Math.random()*Math.PI*2
    });
  }
  for(let i=pool.length-1;i>=0;i--){
    const b=pool[i];
    b.born+=dt;
    // Accelerate near surface (pressure drops = bubble expands = rises faster)
    const distToSurface=Math.max(0.1,b.y-fillY);
    const pressureFactor=1+(H-b.y)/(H-fillY+1)*0.3; // faster near top
    b.vy*=0.998;
    b.y+=b.vy*dt*pressureFactor;
    b.x+=b.vx*dt+Math.sin(b.born*3.5+b.wobble)*dt*(isBg?2:0.8);
    b.vx*=0.995;
    // Grow toward maxR as it rises (expansion due to decreasing pressure)
    if(b.r<b.maxR) b.r=Math.min(b.maxR, b.r+(b.maxR-b.r)*dt*1.5);
    if(b.y<=fillY||b.x<-b.r||b.x>W+b.r||b.born>10){
      // Surface pop: inject impulse into heightfield + spray particles
      if(b.y<=fillY&&isBg&&bgHF.cols>0){
        const col=Math.round(b.x/W*bgHF.cols);
        if(col>=0&&col<bgHF.cols)bgHF.v[col]-=b.r*0.35;
        if(b.r>2.5){
          const sprayCount=b.r>6?6:3;
          for(let k=0;k<sprayCount;k++){
            const a=-Math.PI*0.3+Math.random()*Math.PI*0.6-Math.PI/2;
            const sp=0.5+Math.random()*2;
            const p=new P(b.x,fillY,Math.cos(a)*sp,Math.sin(a)*sp,'rgba(255,255,255,0.35)',0.5+Math.random()*1.5,0.08);
            p.round=true;p.decay=0.04+Math.random()*0.02;parts.push(p);
          }
          startFX();
        }
      }
      pool.splice(i,1);
    }
  }
  // Merge nearby bubbles (bg only)
  if(isBg&&pool.length>1){
    for(let i=0;i<pool.length&&i<100;i++){
      for(let j=i+1;j<pool.length&&j<100;j++){
        const dx=pool[i].x-pool[j].x,dy=pool[i].y-pool[j].y;
        if(dx*dx+dy*dy<(pool[i].r+pool[j].r)*(pool[i].r+pool[j].r)*0.36){
          const big=pool[i].r>=pool[j].r?i:j,small=big===i?j:i;
          pool[big].r=Math.min(pool[big].maxR*1.3,Math.sqrt(pool[big].r*pool[big].r+pool[small].r*pool[small].r));
          pool[big].x=(pool[big].x+pool[small].x)/2;
          pool[big].y=(pool[big].y+pool[small].y)/2;
          pool.splice(small,1);if(small<=i)i--;j--;
        }
      }
    }
  }
  const cap=isBg?200:25;
  if(pool.length>cap)pool.splice(0,pool.length-cap);
}

// ── DRAW WATER ────────────────────────────────────────────────────────
// Design principles:
//   - ONE primary wave (smooth, readable, never spiky)
//   - ONE small ripple on top (adds texture, same direction)
//   - Tilt = LINEAR SLOPE (not phase shift, not offset — actual slope)
//   - Gradient anchored to actual wave min height
//   - Bubbles: bright, high-opacity, clearly visible glass spheres
function clr(v){return Math.max(0,Math.min(255,Math.round(v)));}
const _surf=new Float32Array(1024);

function drawWater(ctx,W,H,fp,colorHex,t,bubbles,isBg,hf){
  fp=Math.max(0,Math.min(fp,100));
  if(fp<1)return;

  const boil=(fp/100)*(fp/100);
  const fillY=H*(1-fp/100);

  // Sine wave params (used for pip canvas; bg uses heightfield)
  const A   = boil*7.0;
  const Arip= boil*2.0;
  const sp  = Math.min(0.25+boil*0.55, 0.80);
  const lam = W/1.4;
  const lamR= lam*0.5;
  const sprip= sp*2.0;

  let ri=parseInt(colorHex.slice(1,3),16);
  let gi=parseInt(colorHex.slice(3,5),16);
  let bi=parseInt(colorHex.slice(5,7),16);
  // Theme tint — shifts task color toward theme character
  const _theme=getTheme();
  if(_theme.waterTint&&isBg){
    ri=clr(ri+_theme.waterTint.r);gi=clr(gi+_theme.waterTint.g);bi=clr(bi+_theme.waterTint.b);
  }
  // Temperature color tint — task color stays the base, warmth intensifies with boil
  // Heat level amplifies the visual intensity
  const _hm=heatMultiplier();
  if(isBg){
    const warm=Math.max(0,(fp/100-0.25)/0.75)*_hm;
    ri=Math.min(255,Math.round(ri+warm*50));
    gi=Math.max(0,Math.round(gi-warm*15));
    bi=Math.max(0,Math.round(bi-warm*40));
  } else {
    ri=Math.min(255,Math.round(ri+boil*10*_hm));
    bi=Math.max(0,Math.round(bi-boil*6*_hm));
  }

  // Build surface
  const step=isBg?3:1;
  const N=Math.min(Math.ceil(W/step)+1,1024);
  let minY=H;
  for(let i=0;i<N;i++){
    if(hf&&i<hf.cols){
      // Heightfield + smooth tilt layer (separate from physics, no jitter)
      const tOff=(tiltH&&i<tiltH.length)?tiltH[i]:0;
      _surf[i]=Math.max(2, Math.min(H-2, fillY+hf.h[i]+tOff));
    } else {
      // Sine waves for pip canvas
      const x=i*step;
      const wave=Math.sin(2*Math.PI*(x/lam - t*sp))*A;
      const rip =Math.sin(2*Math.PI*(x/lamR - t*sprip))*Arip;
      _surf[i]=Math.max(2, Math.min(H-2, fillY+wave+rip));
    }
    if(_surf[i]<minY)minY=_surf[i];
  }
  const gt=Math.max(0,minY-3);

  // ── Body gradient (light at surface, deep at bottom) ──────────────
  const _om=_theme.opacityMul||1.0;
  // Background water starts transparent, reaches full opacity near completion
  const _bp=isBg?0.35+0.65*(fp/100):1;
  const g=ctx.createLinearGradient(0,gt,0,H);
  g.addColorStop(0,   `rgba(${clr(ri+70)},${clr(gi+70)},${clr(bi+70)},${Math.min(1,(isBg?0.32:0.95)*_om*_bp)})`);
  g.addColorStop(0.08,`rgba(${clr(ri+35)},${clr(gi+35)},${clr(bi+35)},${Math.min(1,(isBg?0.27:0.85)*_om*_bp)})`);
  g.addColorStop(0.4, `rgba(${ri},${gi},${bi},${Math.min(1,(isBg?0.22:0.78)*_om*_bp)})`);
  g.addColorStop(1,   `rgba(${clr(ri-25)},${clr(gi-25)},${clr(bi-25)},${Math.min(1,(isBg?0.28:0.82)*_om*_bp)})`);
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]);
  for(let i=1;i<N;i++)ctx.lineTo(i*step,_surf[i]);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();

  // ── Subsurface shimmer (depth layer) ──────────────────────────────
  if(boil>0.08){
    ctx.save();
    ctx.globalAlpha=boil*0.22;
    ctx.beginPath();
    ctx.moveTo(0,_surf[0]+A*0.6);
    for(let i=1;i<N;i++)ctx.lineTo(i*step,_surf[i]+A*0.6);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=`rgb(${clr(ri+100)},${clr(gi+100)},${clr(bi+100)})`;
    ctx.fill();
    ctx.restore();
  }

  // ── Surface highlight: the single most important line ─────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]);
  for(let i=1;i<N;i++)ctx.lineTo(i*step,_surf[i]);
  ctx.lineWidth=isBg?2.0:1.3;
  ctx.strokeStyle=`rgba(255,255,255,${isBg?0.75:0.92})`;
  ctx.stroke();
  // Soft glow below line — heat level amplifies
  const glowMul=0.8+(_hm-1)*0.5;
  ctx.lineWidth=isBg?(8+boil*12*glowMul):(2.5+boil*3*glowMul);
  ctx.strokeStyle=`rgba(255,255,255,${isBg?Math.min(0.32,0.16*glowMul):Math.min(0.55,0.35*glowMul)})`;
  ctx.stroke();
  ctx.restore();

  // ── Surface foam at high boil (pip only) ─────────────────────────
  if(!isBg&&boil>0.3){
    ctx.save();
    const foamA=Math.min((boil-0.3)*1.5,0.7);
    ctx.globalAlpha=foamA;
    const _fc=_theme.foamColor||null;
    for(let i=0;i<N;i++){
      const x=i*step,sy=_surf[i];
      // Deterministic foam using sin hash — stable per frame, noisy across x
      const h=(Math.sin(x*127.1+t*2.1)*43758.5453)%1;
      if(Math.abs(h)>0.4){
        const fr=0.4+Math.abs(h)*2.0;
        ctx.beginPath();
        ctx.arc(x,sy+Math.sin(x*0.8+t*3)*1.5,fr,0,Math.PI*2);
        ctx.fillStyle=_fc||`rgba(255,255,255,${0.45*foamA})`;
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // ── Bubbles: deformed glass spheres ─────────────────────────────────
  bubbles.forEach(b=>{
    if(b.r<0.2)return;
    const fade=Math.min(1,b.born*10)*Math.min(1,(5-b.born)*0.8);
    if(fade<=0)return;
    if(b.y<fillY-b.r)return;
    // Deformation: squash/stretch based on velocity
    const vyN=Math.min(Math.abs(b.vy||0)/80,0.5);
    const stretch=1+vyN*0.4;
    const squash=1/Math.sqrt(stretch);
    const boilAlpha=isBg?Math.max(0.4,fp/100):1.0;
    const a=b.op*fade*boilAlpha;
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.scale(squash,stretch);
    const rg=ctx.createRadialGradient(-b.r*0.35,-b.r*0.35,b.r*0.05,0,0,b.r);
    rg.addColorStop(0,  `rgba(255,255,255,${a})`);
    rg.addColorStop(0.25,`rgba(255,255,255,${a*0.35})`);
    rg.addColorStop(0.7, `rgba(255,255,255,${a*0.06})`);
    rg.addColorStop(1,   `rgba(255,255,255,${a*0.65})`);
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fillStyle=rg;ctx.fill();
    ctx.strokeStyle=`rgba(255,255,255,${a*0.5})`;
    ctx.lineWidth=0.6;
    ctx.stroke();
    ctx.restore();
  });
}
function drawContainerWalls(ctx,W,H){
  // Top: slightly darker (dry glass above waterline)
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,W,4);
  // Left edge
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.fillRect(0,0,3,H);
  // Right edge
  ctx.fillRect(W-3,0,3,H);
}

// ── REST MODE: sound + haptics + animation ──────────────────────────
function onRestStart(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t)return;
  if(S.seen.rest)showToast('☕ Rest','#2e9e6a',1500);
  else seenToast('rest','☕ Rest. The next block starts after.','#2e9e6a',800);
  // Gentle descending chime — work done, relax now
  const now=ac().currentTime;
  [[0,880,.06],[.1,660,.055],[.22,523,.05],[.36,440,.04]].forEach(([dt,hz,v])=>tone(hz,.35,v,now+dt));
  // Soft "whoosh" noise for transition feel
  try{
    const c=ac(),buf=c.createBuffer(1,c.sampleRate*.3,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.8;
    const src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='lowpass';f.frequency.value=600;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(.04,now+.1);g.gain.exponentialRampToValueAtTime(.001,now+.4);
    src.start(now+.1);src.stop(now+.5);
  }catch(e){}
  haptic([0,30,60]);
  // Re-render card to show rest overlay, then flash green
  const t2=S.tasks.find(x=>x.id===id);
  if(t2)renderCard(t2);
  updateAquariumBar();
  const el=document.getElementById('c-'+id);
  if(el){el.classList.add('rest-flash');setTimeout(()=>el.classList.remove('rest-flash'),850);}
}

function beginDay(){
  if(!_sensorsAttached)requestMotionPermission();
  const h=parseInt(document.getElementById('begin-h').value)||14;
  S.startTs=Date.now();S.dayHours=h;

  renderDaybar();renderCards();updateLogoDot();updateScrollState();
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  // Begin ceremony: flash + low G2 tone (98hz)
  const _fc=S.tasks.length?S.tasks[0].color:'#4a9eba';
  const flash=document.createElement('div');
  Object.assign(flash.style,{
    position:'fixed',inset:'0',background:_fc,
    opacity:'0',zIndex:'9999',pointerEvents:'none',
    transition:'opacity .1s ease'
  });
  document.body.appendChild(flash);
  requestAnimationFrame(()=>{
    flash.style.opacity='0.22';
    setTimeout(()=>{
      flash.style.opacity='0';
      setTimeout(()=>flash.remove(),200);
    },120);
  });
  try{tone(98,.55,.04);tone(98,.55,.02,ac().currentTime+.55);}catch(e){}
  haptic([30,40,80]);
}

// Snapshot economic state at day start so reset can undo rewards
function _snapshotDay(){
  S._daySnap={
    lifetimeCoins:S.lifetimeCoins||0,
    stars:S.stars||0,
    streak:S.streak||0,
    lastCompletedDate:S.lastCompletedDate||null,
    bestScore:S.bestScore||0,
    daysCompleted:S.daysCompleted||0,
    fullBoils:S.fullBoils||0,
    streakFreezes:S.streakFreezes||0,
    mercyCoins:S.mercyCoins||0,
    shopItems:JSON.parse(JSON.stringify(S.shopItems||{})),
    badges:S.badges?S.badges.slice():[],
  };
}
function _restoreSnap(){
  const sn=S._daySnap;if(!sn)return;
  S.lifetimeCoins=sn.lifetimeCoins;
  S.stars=sn.stars;
  S.streak=sn.streak;
  S.lastCompletedDate=sn.lastCompletedDate;
  S.bestScore=sn.bestScore;
  S.daysCompleted=sn.daysCompleted;
  S.fullBoils=sn.fullBoils;
  S.streakFreezes=sn.streakFreezes;
  S.mercyCoins=sn.mercyCoins;
  S.shopItems=sn.shopItems;
  S.badges=sn.badges;
  delete S._daySnap;
}

}

  const workDur=parseInt(document.getElementById('fwork').value)*60||3600;
  const restDur=pomoOn?(parseInt(document.getElementById('frest').value)*60||600):0;
  const color=pickedCol||PAL[0];
  const days=getPickedDays();
  if(!name)return;
  if(id){
    const t=S.tasks.find(x=>x.id===id);
    if(t){t.name=name;t.color=color;t.days=days;if(t.workDur!==workDur||t.restDur!==restDur){t.workDur=workDur;t.restDur=restDur;resetTask(t);}else{t.total=total;if(t.completed>=t.total){t.completed=t.total;t.done=true;t.running=false;t.isRest=false;t.rem=0;t.savedAt=null;}}}
  } else {
    S.tasks.push(mkTask('t-'+Date.now(),name,color,total,workDur,restDur,days));
  }
  pickedCol=null;save();closeSheet();render();
}
function delTask(id){S.tasks=S.tasks.filter(x=>x.id!==id);delete bubblePools[id];save();closeSheet();render();}

// ── FINISH DAY ──────────────────────────────────────────────────────
function openFinishDay(){
  // Compute stats
  const totalSubBlocks = S.tasks.reduce((a,t)=>a+t.total, 0);
  const completedSubBlocks = S.tasks.reduce((a,t)=>a+t.completed, 0);
  const completedTasks = S.tasks.filter(t=>t.done).length;
  const totalTasks = S.tasks.length;
  const pct = totalSubBlocks>0 ? Math.round(completedSubBlocks/totalSubBlocks*100) : 0;
  const wr = dayRem();
  const elapsed = dayEl();
  const fmtElapsed = fmtHM(elapsed);
  const dayScore = calcDayScore();

  // Per-task breakdown
  const taskRows = S.tasks.map(t=>{
    const coins = t.completed;
    const bag = t.done ? '⭐' : '';
    const pips = `${t.completed}/${t.total}`;
    return `<div class="fin-task-row">
      <div class="fin-task-dot" style="background:${t.color}"></div>
      <div class="fin-task-name">${t.done?`<s style="text-decoration-color:${t.color}">${t.name}</s>`:t.name}</div>
      <div class="fin-task-detail">${pips}</div>
      <div class="fin-task-coins">${'🪙'.repeat(Math.min(coins,8))}${coins>8?` ×${coins}`:''}</div>
      <div style="font-size:16px;margin-left:2px">${bag}</div>
    </div>`;
  }).join('');

  openSheet(`<div class="sh-ttl">today</div>

    <div class="fin-progress">
      <div class="fin-prog-label">
        <span class="fin-prog-title">overall progress</span>
        <span class="fin-prog-pct">${pct}%</span>
      </div>
      <div class="fin-prog-track">
        <div class="fin-prog-fill" id="fin-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="fin-grid">
      <div class="fin-stat">
        <div class="fin-stat-icon">🪙</div>
        <div class="fin-stat-val gold">${completedSubBlocks}<span style="font-size:16px;font-weight:700;color:var(--dim)"> / ${totalSubBlocks}</span></div>
        <div class="fin-stat-label">coins earned</div>
      </div>
      <div class="fin-stat">
        <div class="fin-stat-icon">⭐</div>
        <div class="fin-stat-val purple">${completedTasks}<span style="font-size:16px;font-weight:700;color:var(--dim)"> / ${totalTasks}</span></div>
        <div class="fin-stat-label">stars earned</div>
      </div>
      <div class="fin-stat">
        <div class="fin-stat-icon">⏳</div>
        <div class="fin-stat-val grn">${wr>0?fmtHM(wr):'—'}</div>
        <div class="fin-stat-label">free time left</div>
      </div>
      <div class="fin-stat">
        <div class="fin-stat-icon">⚡</div>
        <div class="fin-stat-val">${fmtElapsed}</div>
        <div class="fin-stat-label">time invested</div>
      </div>
      <div class="fin-stat wide">
        <div class="fin-stat-icon">🏆</div>
        <div class="fin-stat-val gold"><span id="fin-score-val">${dayScore}</span><span style="font-size:12px;font-weight:700;color:var(--dim)"> pts${dayScore>=S.bestScore&&dayScore>0?' · new best!':''}</span></div>
        <div class="fin-stat-label">day score${S.streak>1?` · 🔥 ${S.streak} day streak`:''}</div>
      </div>
    </div>

    <div style="margin-bottom:10px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)">by block</div>
    <div style="background:var(--bg);border:1.5px solid var(--brd);border-radius:14px;padding:4px 14px;margin-bottom:20px">
      ${taskRows}
    </div>

    <div class="sh-btns">
      <button class="bs" onclick="closeSheet()">back</button>
    </div>
    <button onclick="closeSheet();askReset()" style="display:block;margin:16px auto 0;background:none;border:none;font-family:var(--fs);font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;padding:8px 0">reset blocks</button>`);

  // Animate progress bar + score count after render
  setTimeout(()=>{
    const fill=document.getElementById('fin-fill');
    if(fill)fill.style.width=pct+'%';
    // Animate day score counting up
    const scoreEl=document.getElementById('fin-score-val');
    if(scoreEl){
      const target=dayScore;
      let current=0;
      const step=Math.ceil(target/30);
      const tick=setInterval(()=>{
        current=Math.min(current+step,target);
        scoreEl.textContent=current;
        if(current>=target)clearInterval(tick);
      },30);
    }
  },80);
}
function finishDay(){
  const totalB=S.tasks.reduce((a,t)=>a+t.total,0);
  const compB=S.tasks.reduce((a,t)=>a+t.completed,0);
  const pct=totalB>0?compB/totalB:0;
  if(pct>=0.7&&S.lastCompletedDate!==today()){
    updateStreak();
    if(!S.tasks.every(t=>t.done)){
      showToast(`🔥 ${Math.round(pct*100)}% — streak maintained!`,'#c8841a',2500);
      haptic([20,30,20,30,80]);
    }
  }
  // Unlock toast after first day
  if(S.daysCompleted===1){
    setTimeout(()=>showToast('You earned coins. Tap 🪙 to spend them.','#c8841a',3500),800);
  }
  doReset();
}

// ── SHEET ───────────────────────────────────────────────────────────
let _sheetOpenT=0;
function openSheet(h){document.getElementById('sb').innerHTML=h;document.getElementById('ov').classList.add('open');_sheetOpenT=Date.now();}
function closeSheet(){document.getElementById('ov').classList.remove('open');pickedCol=null;}
function ovClick(e){if(e.target.classList.contains('ov')&&Date.now()-_sheetOpenT>300)closeSheet();}


// ── DRAG TO REORDER ────────────────────────────────────────────────
// Long-press (500ms) activates drag. Touch-based reorder for mobile.
let dragState=null; // {id, el, startY, cloneEl, origIdx}
const LONG_MS=480;

function attachDrag(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('touchstart',onDragTouchStart,{passive:true});
  });
}

function onDragTouchStart(e){
  const card=e.currentTarget;
  const id=card.id.replace('c-','');
  const touch=e.touches[0];
  const startX=touch.clientX, startY=touch.clientY;
  let fired=false;

  const longTimer=setTimeout(()=>{
    fired=true;
    cleanup();
    startDrag(id,card,{clientX:startX,clientY:startY});
  },LONG_MS);

  function onMove(ev){
    const t=ev.touches[0];
    const dx=t.clientX-startX, dy=t.clientY-startY;
    // Only cancel if finger moved >8px — allows natural hand tremor
    if(Math.sqrt(dx*dx+dy*dy)>8){clearTimeout(longTimer);cleanup();}
  }
  function onEnd(){clearTimeout(longTimer);cleanup();}
  function cleanup(){
    card.removeEventListener('touchmove',onMove);
    card.removeEventListener('touchend',onEnd);
  }
  card.addEventListener('touchmove',onMove,{passive:true});
  card.addEventListener('touchend',onEnd,{passive:true});
}

function startDrag(id,card,touch){
  haptic([30]);
  const scroll=document.getElementById('cards');
  scroll.classList.add('drag-active');
  const rect=card.getBoundingClientRect();

  // ghost clone
  const clone=card.cloneNode(true);
  clone.style.cssText=`
    position:fixed;left:${rect.left}px;top:${rect.top}px;
    width:${rect.width}px;height:${rect.height}px;
    z-index:500;pointer-events:none;opacity:.92;
    transform:scale(1.03) rotate(1.2deg);
    box-shadow:0 16px 48px rgba(0,0,0,.22);
    transition:none;border-radius:18px;
  `;
  document.body.appendChild(clone);
  card.classList.add('dragging');

  dragState={id,el:card,clone,startY:touch.clientY,offsetY:touch.clientY-rect.top,origIdx:taskIndex(id)};

  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd,{passive:true});
}

function taskIndex(id){return S.tasks.findIndex(t=>t.id===id);}

function cardAtY(y){
  const cards=[...document.querySelectorAll('.card:not(.dragging)')];
  for(const c of cards){
    const r=c.getBoundingClientRect();
    if(y>=r.top&&y<=r.bottom)return c.id.replace('c-','');
  }
  return null;
}

function onDragMove(e){
  if(!dragState)return;
  e.preventDefault();
  const touch=e.touches[0];
  const{clone,offsetY}=dragState;
  clone.style.top=(touch.clientY-offsetY)+'px';

  // highlight drop target
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));
  const overId=cardAtY(touch.clientY);
  if(overId&&overId!==dragState.id){
    document.getElementById('c-'+overId)?.classList.add('drag-over');
  }
}

function onDragEnd(e){
  if(!dragState)return;
  const touch=e.changedTouches[0];
  const overId=cardAtY(touch.clientY);

  // reorder in state
  if(overId&&overId!==dragState.id){
    const fromIdx=S.tasks.findIndex(t=>t.id===dragState.id);
    const toIdx=S.tasks.findIndex(t=>t.id===overId);
    if(fromIdx>-1&&toIdx>-1){
      const [moved]=S.tasks.splice(fromIdx,1);
      S.tasks.splice(toIdx,0,moved);
      save();
    }
  }

  // cleanup
  dragState.clone.remove();
  dragState.el.classList.remove('dragging');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));
  document.getElementById('cards').classList.remove('drag-active');
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  dragState=null;

  // re-render order without full re-render (just reorder DOM)
  renderCards();
}

// ── BEGIN SCREEN WATER ──────────────────────────────────────────────
let beginWaveRaf=null;
function animateBeginWater(){
  const cv=document.getElementById('begin-water');
  if(!cv||cv.offsetParent===null){beginWaveRaf=null;return;}
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const W=Math.round(cv.clientWidth*dpr);
  const H=Math.round(cv.clientHeight*dpr);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const c=cv.getContext('2d');
  c.clearRect(0,0,W,H);
  const t=performance.now()/1000;
  const fp=18;
  const fillY=H*(1-fp/100);
  const A=3.5,lam=W/1.6,spd=0.12;
  c.beginPath();
  c.moveTo(0,fillY+Math.sin(2*Math.PI*(-t*spd))*A);
  for(let x=1;x<=W;x+=2){
    const y=fillY+Math.sin(2*Math.PI*(x/lam-t*spd))*A+Math.sin(2*Math.PI*(x/(lam*0.5)-t*spd*2))*1.2;
    c.lineTo(x,y);
  }
  c.lineTo(W,H);c.lineTo(0,H);c.closePath();
  const g=c.createLinearGradient(0,fillY,0,H);
  g.addColorStop(0,'rgba(74,158,186,0.22)');
  g.addColorStop(1,'rgba(74,158,186,0.06)');
  c.fillStyle=g;c.fill();
  c.beginPath();
  c.moveTo(0,fillY+Math.sin(2*Math.PI*(-t*spd))*A);
  for(let x=1;x<=W;x+=2){
    const y=fillY+Math.sin(2*Math.PI*(x/lam-t*spd))*A+Math.sin(2*Math.PI*(x/(lam*0.5)-t*spd*2))*1.2;
    c.lineTo(x,y);
  }
  c.lineWidth=1.5;c.strokeStyle='rgba(255,255,255,0.45)';c.stroke();
  beginWaveRaf=requestAnimationFrame(animateBeginWater);
}
function checkBeginWater(){
  const bs=document.getElementById('begin-screen');
  if(bs&&bs.style.display!=='none'&&!beginWaveRaf)beginWaveRaf=requestAnimationFrame(animateBeginWater);
  if(bs&&bs.style.display==='none'&&beginWaveRaf){cancelAnimationFrame(beginWaveRaf);beginWaveRaf=null;}
}

// ── INIT ────────────────────────────────────────────────────────────
boot();
schedMidnight();
if(S.tasks.some(t=>t.running))ensureTicker();
render();
