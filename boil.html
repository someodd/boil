<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f0e8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="boil">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f5f0e8'/><text y='.85em' font-size='75' text-anchor='middle' x='50'>🫧</text></svg>">
  <title>boil</title>
  <meta name="description" content="Water rises while you work. When it boils, rest.">
  <meta property="og:title" content="boil">
  <meta property="og:description" content="Water rises while you work. When it boils, rest.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="boil">
  <meta name="twitter:description" content="Water rises while you work. When it boils, rest.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #f5f0e8;
      --card:  #faf8f4;
      --brd:   #e2dbd0;
      --text:  #1c1917;
      --mid:   #6b6258;
      --dim:   #8a8078;
      --dimmer:#d4cdc4;
      --ink:   #1c1917;
      --glass: rgba(250,248,244,0.45);
      --glass-hi: rgba(250,248,244,0.32);
      --glass-border: rgba(226,219,208,0.6);
      --fs: 'Plus Jakarta Sans', system-ui, sans-serif;
      --fd: 'Syne', sans-serif;
      --spring: linear(0, 0.006, 0.025 2.8%, 0.101 6.1%, 0.236 10.1%, 0.44 15.3%, 0.684, 0.903 26.3%, 1.029 30.9%, 1.124 36.2%, 1.157, 1.171, 1.168, 1.149 48.1%, 1.104 52.2%, 1.012 60.8%, 0.981 67.5%, 0.974, 0.975, 0.984 78.8%, 1.001 87.4%, 1.007 100%);
    }
    html.battery-saver .card,html.battery-saver .hdr,html.battery-saver .daybar,html.battery-saver .sheet{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}.tap-ripple{display:none!important}}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
    :focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:4px}
    html,body{height:100%;overscroll-behavior:none}
    body{background:var(--bg);color:var(--text);font-family:var(--fs);display:flex;flex-direction:column;height:100dvh;overflow:hidden;align-items:center;user-select:none;-webkit-user-select:none}
    .app-wrap{width:100%;max-width:680px;display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative}

    /* ── HEADER (logo | daybar | gear) ──────────────────────── */
    .hdr{
      width:100%;max-width:680px;
      padding:10px 12px;
      display:flex;align-items:center;
      flex-shrink:0;gap:10px;
      background:var(--glass);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      border:1.5px solid var(--glass-border);border-top:none;
      border-radius:0 0 16px 16px;
      box-shadow:0 4px 16px rgba(0,0,0,.06);
      position:relative;z-index:2;
      box-sizing:border-box;
    }
    .hdr-row{display:flex;align-items:center;justify-content:center;gap:12px} /* legacy */
    /* Gear button — circular icon */
    .profile-pill{
      width:34px;height:34px;border-radius:50%;
      background:var(--card);border:1.5px solid var(--brd);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;line-height:1;
      cursor:pointer;transition:all .14s;flex-shrink:0;padding:0;
    }
    .profile-pill:hover{background:var(--brd)}
    .profile-pill:active{transform:scale(.9)}
    .hdr-left{display:flex;align-items:center;gap:10px;flex-shrink:0} /* legacy, kept inert */
    .logo{
      font-family:var(--fd);font-size:21px;font-weight:800;
      color:var(--ink);letter-spacing:-.03em;
      display:flex;align-items:center;gap:5px;
    }
    .logo-dot{
      width:10px;height:10px;border-radius:50%;background:#c8841a;
      transition:background .5s,transform .3s;flex-shrink:0;
    }
    .logo-dot.pulse{animation:dot-pop .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes dot-pop{0%{transform:scale(1)}50%{transform:scale(1.8)}100%{transform:scale(1)}}
    .hdr-acts{display:flex;gap:5px;align-items:center}
    /* Standard action pills */
    .pill{
      background:var(--card);border:1.5px solid var(--brd);
      color:var(--mid);font-size:12px;font-family:var(--fs);
      font-weight:700;padding:5px 13px;border-radius:100px;
      cursor:pointer;transition:all .14s;
    }
    .pill:hover{background:var(--brd);color:var(--ink)}
    .pill:active{background:var(--brd);color:var(--ink);transform:scale(.95)}

    /* ── TIMELINE (inline track between logo and gear) ─────────────────────── */
    .daybar{flex:1;min-width:0;height:34px;background:var(--card);border:1.5px solid var(--brd);border-radius:10px;cursor:pointer;transition:background .14s,border-color .14s;display:flex;align-items:center;padding:0 8px;position:relative;overflow:visible}
    .daybar:hover{background:var(--brd)}
    .daybar:active{transform:scale(.99)}
    .daybar:empty{background:color-mix(in srgb,var(--card) 60%,transparent);cursor:default}
    .db-top,.db-stat,.db-ticks,.db-tick{display:none} /* slim mode: stat/ticks live in the day panel */
    .db-track{flex:1;height:18px;background:color-mix(in srgb,var(--card) 70%,transparent);border-radius:6px;position:relative;overflow:hidden;border:1px solid color-mix(in srgb,var(--brd) 60%,transparent)}
    .db-el{position:absolute;left:0;top:0;bottom:0;background:color-mix(in srgb,var(--brd) 55%,transparent);z-index:1;border-radius:5px 0 0 5px;transition:width 1s linear}
    .db-free{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:10px;letter-spacing:.02em;color:color-mix(in srgb,var(--ink) 70%,transparent);z-index:4;pointer-events:none;white-space:nowrap;overflow:hidden}
    .db-skull{position:absolute;right:-2px;top:50%;transform:translate(0,-50%);font-size:18px;line-height:1;z-index:6;text-shadow:0 1px 2px rgba(0,0,0,.4);pointer-events:none;animation:skull-tilt 1.6s ease-in-out infinite}
    @keyframes skull-tilt{0%,100%{transform:translate(0,-50%) rotate(-8deg)}50%{transform:translate(0,-50%) rotate(8deg)}}
    /* Slack overlay — transparent bold text centered on the track */
    .db-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:11px;letter-spacing:-.01em;color:rgba(28,25,23,.45);text-shadow:0 1px 0 rgba(255,255,255,.25);pointer-events:none;z-index:7;mix-blend-mode:multiply}
    .db-overlay.go{color:rgba(46,158,106,.85)}
    .db-overlay.warn{color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(192,69,58,.7);mix-blend-mode:normal}
    .db-el{position:absolute;left:0;top:0;bottom:0;background:var(--dimmer);border-radius:7px 0 0 7px;transition:width 1s linear;z-index:1}
    .db-seg{position:absolute;top:0;bottom:0;transition:all .5s;z-index:3;opacity:.88}
    .db-hatch{position:absolute;right:0;top:0;bottom:0;z-index:4;background:linear-gradient(90deg,rgba(192,69,58,.4),rgba(220,80,40,.85));transition:width .5s;border-radius:0 7px 7px 0;animation:lava-pulse 1.8s ease-in-out infinite}
    @keyframes lava-pulse{0%,100%{opacity:1}50%{opacity:.65}}
    .db-now{position:absolute;top:-3px;bottom:-3px;width:2.5px;background:var(--ink);border-radius:2px;z-index:8;transform:translateX(-50%);box-shadow:0 0 4px rgba(28,25,23,.45),0 0 0 1.5px color-mix(in srgb,var(--card) 80%,transparent)}
    .db-ticks{display:flex;justify-content:space-between}
    .db-tick{font-size:8px;font-weight:700;color:var(--dimmer);letter-spacing:.02em}

    /* screen flash overlay for sub-block done */
    @keyframes screenFlash{
      0%{opacity:0}12%{opacity:.45}100%{opacity:0}
    }
    .screen-flash{
      position:fixed;inset:0;pointer-events:none;z-index:997;
      animation:screenFlash .42s ease forwards;
      mix-blend-mode:multiply;
    }

    /* all-done day overlay */
    @keyframes dayDone{
      0%{opacity:0;transform:scale(.75)}
      20%{opacity:1;transform:scale(1.04)}
      75%{opacity:1;transform:scale(1)}
      100%{opacity:0;transform:scale(1.08)}
    }
    .day-done-msg{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      z-index:998;pointer-events:none;
    }
    .day-done-inner{
      font-family:var(--fd);font-size:46px;font-weight:800;color:var(--ink);
      text-align:center;line-height:1.2;letter-spacing:-.03em;
      text-shadow:0 2px 20px rgba(255,255,255,.9);
      text-wrap:balance;
      animation:dayDone 3.8s ease forwards;
    }
    .day-done-sub{font-size:22px;opacity:.65;font-weight:700;display:block;margin-top:4px}
    /* ── FAB ───────────────────────────── */
    .fab{
      position:fixed;bottom:20px;right:16px;width:58px;height:58px;
      border-radius:50%;background:var(--ink);color:#fff;border:none;
      font-size:30px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 4px rgba(28,25,23,.12),0 8px 24px rgba(28,25,23,.16);
      transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
    }
    @media(min-width:680px){
      .fab{right:calc(50% - 340px + 16px)}
    }
    .fab:hover{transform:scale(1.08);box-shadow:0 4px 8px rgba(28,25,23,.12),0 12px 32px rgba(28,25,23,.2)}
    .fab:active{transform:scale(.86)!important;transition:transform .1s ease!important;box-shadow:0 2px 8px rgba(28,25,23,.2)}

    /* ── SHEET ─────────────────────────── */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;transition:background .25s;pointer-events:none}
    .ov.open{background:rgba(0,0,0,.42);pointer-events:all}
    .sheet{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid var(--glass-border);border-bottom:none;border-radius:22px 22px 0 0;padding:6px 16px 52px;width:100%;max-width:680px;margin:0 auto;max-height:90dvh;overflow-y:auto;transform:translateY(100%);transition:transform .35s var(--spring)}
    .ov.open .sheet{transform:translateY(0)}
    .sh-hnd{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:10px auto 18px}
    .sh-ttl{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:18px;text-wrap:balance}

    /* form */
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
    .field input,.field select{width:100%;background:var(--bg);border:2px solid var(--brd);color:var(--ink);font-size:16px;font-weight:600;font-family:var(--fs);padding:11px 13px;border-radius:12px;outline:none;transition:border-color .14s;appearance:none;-webkit-appearance:none}
    .field input:focus,.field select:focus{border-color:var(--ink)}
    .tog-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:2px solid var(--brd);padding:11px 13px;border-radius:12px}
    .tog-lbl{font-size:15px;font-weight:600;color:var(--ink)}
    .tog-sub{font-size:11px;color:var(--dim);margin-top:1px}
    .tog{width:46px;height:26px;border-radius:100px;background:var(--brd);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
    .tog.on{background:var(--ink)}
    .tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .tog.on::after{transform:translateX(20px)}
    .cr{display:flex;gap:8px;flex-wrap:wrap}
    .sw{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .14s,border-color .14s}
    .day-picker{display:flex;gap:6px;width:100%}
    .day-pill{flex:1;min-width:0;height:38px;border-radius:10px;border:2px solid var(--brd);background:transparent;color:var(--dim);font-size:11px;font-weight:800;font-family:var(--fs);cursor:pointer;transition:all .14s;display:flex;align-items:center;justify-content:center;padding:0}
    .day-pill:hover{border-color:var(--mid);color:var(--mid)}
    .day-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
    .sw.on{border-color:var(--ink);transform:scale(1.2)}
    .sh-btns{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
    .bp{flex:1;background:var(--ink);color:#fff;border:none;padding:14px;border-radius:12px;font-size:14px;font-family:var(--fs);font-weight:800;cursor:pointer;transition:opacity .12s}
    .bp:active{opacity:.8}
    .bs{flex:1;background:none;color:var(--mid);border:2px solid var(--brd);padding:14px;border-radius:12px;font-size:14px;font-family:var(--fs);font-weight:700;cursor:pointer}
    .bd{background:none;color:#c0453a;border:2px solid rgba(192,69,58,.25);padding:14px 16px;border-radius:12px;font-size:14px;font-family:var(--fs);font-weight:700;cursor:pointer}
    .conf-ask{background:color-mix(in srgb,#c0453a 8%,var(--card));border:2px solid color-mix(in srgb,#c0453a 20%,var(--brd));border-radius:12px;padding:13px;margin-top:12px}
    .conf-ask p{font-size:13px;color:var(--text);font-weight:700;margin-bottom:10px}
    .conf-ask .sh-btns{margin-top:0}

    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* ── BEGIN SCREEN ─────────────────── */
    .begin-screen{
      position:fixed;inset:0;z-index:900;
      background:var(--bg);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:clamp(16px,4vh,28px);padding:32px;
    }
    .begin-logo{
      font-family:var(--fd);font-size:42px;font-weight:800;
      color:var(--ink);letter-spacing:-.04em;
      animation:cardIn .5s ease both;
    }

    .begin-sub{
      font-size:15px;font-weight:600;color:var(--dim);
      text-align:center;line-height:1.6;max-width:260px;
      text-wrap:balance;
    }
    .begin-btn{
      background:var(--ink);color:#fff;border:none;
      font-family:var(--fd);font-size:20px;font-weight:800;
      letter-spacing:-.02em;
      padding:20px 40px;border-radius:100px;
      cursor:pointer;
      box-shadow:0 6px 28px rgba(28,25,23,.28);
      transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
    }
    .begin-btn:hover{transform:scale(1.03);box-shadow:0 8px 32px rgba(28,25,23,.38)}
    .begin-btn:active{transform:scale(.92)!important;transition:transform .1s ease!important}
    .quick-boil-btn{
      background:transparent;color:var(--dim);border:1.5px solid var(--brd);
      font-family:var(--fs);font-size:13px;font-weight:700;
      padding:10px 24px;border-radius:100px;cursor:pointer;
      transition:all .2s;margin-top:8px;
    }
    .quick-boil-btn:hover{background:var(--card);color:var(--ink)}
    .quick-boil-btn:active{transform:scale(.92)!important}
    .skip-tut{font-size:12px;color:var(--mid);text-decoration:underline;text-underline-offset:3px;margin-top:16px;background:none;border:none;cursor:pointer;font-family:var(--fs);font-weight:600;transition:color .14s}
    .skip-tut:hover{color:var(--text)}
    .begin-hours{
      display:flex;align-items:center;gap:12px;
    }
    .begin-h-label{font-size:13px;font-weight:700;color:var(--dim)}
    .begin-h-input{
      width:72px;background:var(--card);border:2px solid var(--brd);
      color:var(--ink);font-size:22px;font-weight:800;font-family:var(--fd);
      padding:8px 10px;border-radius:12px;outline:none;text-align:center;
      transition:border-color .14s;
      /* hide native spinner on all browsers */
      -moz-appearance:textfield;appearance:textfield;
    }
    .begin-h-input::-webkit-outer-spin-button,
    .begin-h-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .begin-h-input:focus{border-color:var(--ink);outline:none}

    /* hide spinners on all number inputs */
    input[type=number]{-moz-appearance:textfield;appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

    /* ── PIP CANVAS WATER ─────────────────────────────────────── */
    .pip-canvas{
      position:absolute;inset:0;
      display:block;
      will-change:contents;
      border-radius:inherit;
    }


    /* ── REST MODE ─────────────────────────────────────────────────────── */
    @keyframes restPulse{
      0%{background:var(--glass)}
      30%{background:rgba(212,240,228,0.75)}
      100%{background:var(--glass)}
    }
    .card.rest-flash{animation:restPulse .8s ease forwards}

    /* Steam banner — shows during rest above cards */
    #steam-banner{
      text-align:center;padding:18px 16px 14px;
      font-family:var(--fd);color:var(--ink);opacity:0.55;
      transition:opacity .6s ease;
      position:relative;z-index:2;
    }
    #steam-banner .sb-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
    #steam-banner .sb-timer{font-size:42px;font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1.1}
    #steam-banner .sb-sub{font-size:11px;font-weight:600;font-family:var(--fs);color:var(--mid);margin-top:2px}

    /* Rest overlay inside pips-wrap — covers pips with a chill vibe */
    .rest-overlay{
      position:absolute;inset:0;
      background:color-mix(in srgb,#2e9e6a 12%,var(--card));
      border-radius:10px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:4px;
      z-index:2;
    }
    .rest-emoji{font-size:28px;line-height:1;animation:float 2.4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .rest-label{
      font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
      color:var(--mid);
    }
    .rest-timer-big{
      font-family:var(--fd);font-size:38px;font-weight:800;
      letter-spacing:-.04em;line-height:1;color:var(--text);
      font-variant-numeric:tabular-nums;
    }
    .rest-bar-wrap{
      width:80%;height:5px;background:color-mix(in srgb,#2e9e6a 15%,var(--card));
      border-radius:100px;overflow:hidden;margin-top:2px;
    }
    .rest-bar{
      height:100%;background:#2e9e6a;border-radius:100px;
      transition:width 1s linear;
    }

    /* ── SITE BACKGROUND CANVAS ────────────────────────────────────────── */
    #bg-canvas{
      position:fixed;left:0;top:0;right:0;bottom:0;width:100%;height:100%;max-width:none;
      pointer-events:none;z-index:-1;
      opacity:0;
      transition:opacity 1.4s ease;
      will-change:contents;
    }
    #bg-canvas.active{opacity:1}
    /* everything else sits above z-index:-1 naturally */

    /* ── FINISH DAY SHEET ─────────────────── */
    .fin-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:20px;
    }
    .fin-stat{
      background:var(--bg);border:1.5px solid var(--brd);
      border-radius:14px;padding:14px 14px 12px;
      display:flex;flex-direction:column;gap:4px;
    }
    .fin-stat.wide{grid-column:span 2}
    .fin-stat-icon{font-size:24px;line-height:1;margin-bottom:2px}
    .fin-stat-val{
      font-family:var(--fd);font-size:28px;font-weight:800;
      letter-spacing:-.03em;line-height:1;color:var(--ink);
    }
    .fin-stat-val.gold{color:#c8841a}
    .fin-stat-val.grn{color:#2e9e6a}
    .fin-stat-val.purple{color:#9b6bb5}
    .fin-stat-label{
      font-size:10px;font-weight:800;letter-spacing:.09em;
      text-transform:uppercase;color:var(--dim);
    }
    .fin-progress{
      background:var(--bg);border:1.5px solid var(--brd);
      border-radius:14px;padding:14px;margin-bottom:10px;
    }
    .fin-prog-label{
      display:flex;justify-content:space-between;align-items:baseline;
      margin-bottom:8px;
    }
    .fin-prog-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
    .fin-prog-pct{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--ink)}
    .fin-prog-track{height:10px;background:var(--brd);border-radius:100px;overflow:hidden}

<script>
/*
 * boil — design manifesto
 *
 * warm, not cool. physical, not digital.
 * punishing, not forgiving. one metaphor, committed fully.
 * the water is the product. everything else is seasoning.
 * subtract before adding. if it doesn't serve heat, cut it.
 * no accounts. no sync. no analytics. no settings page.
 * one file. honest, portable, hackable.
 * copy should sound human, never like software.
 * every feature earns its place or gets boiled off.
 */

// ── PWA MANIFEST (inline via blob) ────────────────────────────────
(function(){
  try{
    const m={name:'boil',short_name:'boil',display:'standalone',
      background_color:'#f5f0e8',theme_color:'#f5f0e8',
      description:'Time-blocking with heat',
      icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🫧</text></svg>',sizes:'any',type:'image/svg+xml'}]};
    const blob=new Blob([JSON.stringify(m)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('link');
    link.rel='manifest';link.href=url;
    document.head.appendChild(link);
  }catch(e){}
})();
// ── SERVICE WORKER (notification relay — PRODUCT.md: notifications are the lifeline) ──
let _swReg=null;
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(r=>{_swReg=r;}).catch(()=>{});}
function _swNotify(title,body,tag){
  if(_swReg&&_swReg.active){try{_swReg.active.postMessage({type:'notify',title,body,tag,vibrate:[200,100,200]});return true;}catch(e){}}
  try{new Notification(title,{body,vibrate:[200,100,200]});}catch(e){}return false;
}
// ── CONSTANTS ──────────────────────────────────────────────────────
// Day window: min(dayHours, time until midnight from startTs)
function timeToDecimal(s){if(!s)return null;const[h,m]=s.split(':').map(Number);return h+m/60;}
function decimalToTime(d){if(d==null)return'';const h=Math.floor(d),m=Math.round((d%1)*60);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function DAY_S(){
  const raw=(S?.dayHours??14)*3600;
  if(!S?.startTs)return raw;
  const start=new Date(S.startTs);
  if(S.bedtime!=null){
    // Bedtime is the day boundary — no midnight cap needed
    const bed=new Date(start);bed.setHours(Math.floor(S.bedtime),Math.round((S.bedtime%1)*60),0,0);
    if(bed<=start)bed.setDate(bed.getDate()+1);
    const secsToBed=Math.floor((bed-start)/1000);
    return Math.min(raw,secsToBed);
  }
  // No bedtime — cap at midnight (fallback)
  const midnight=new Date(start);midnight.setHours(24,0,0,0);
  const secsToMid=Math.floor((midnight-start)/1000);
  return Math.min(raw,secsToMid);
}
function dayEl(){if(!S?.startTs)return 0;return Math.max(0,Math.floor((Date.now()-S.startTs)/1000));}
// Seconds from now to the next bedtime occurrence (always positive while bedtime is set).
// "Past bedtime" is determined by isPastBedtime(), not by dayRem<=0.
function dayRem(){
  const now=new Date();
  if(S&&S.bedtime!=null){
    const bed=new Date(now);
    bed.setHours(Math.floor(S.bedtime),Math.round((S.bedtime%1)*60),0,0);
    if(bed<=now)bed.setDate(bed.getDate()+1);
    return Math.floor((bed-now)/1000);
  }
  const mid=new Date(now);mid.setHours(24,0,0,0);
  return Math.floor((mid-now)/1000);
}
// True iff current clock falls inside the user's sleep window (bedtime → wake-up, with wrap).
function isPastBedtime(){
  if(!S||S.bedtime==null||!S.startTs)return false;
  const h=new Date().getHours()+new Date().getMinutes()/60;
  const bed=S.bedtime;
  const rise=S.wakeUp!=null?S.wakeUp:((S.bedtime+8)%24);
  // Sleep window: [bed, rise) with wrap if bed > rise
  return bed<=rise ? (h>=bed&&h<rise) : (h>=bed||h<rise);
}
function setPhaseStart(t){
  if(!t.running||t.done)return;
  const pd=t.isRest?t.restDur:t.workDur;
  t._phaseStart=Date.now()-((pd-t.rem)/godTick())*1000;
}
// ── NIGHT SKY TRANSITION ──────────────────────────────────────────
function _wallClockNight(){
  // All math in "hours since wake-up" so wrap-around schedules
  // (night-shift: wake=19, bed=11) work the same as conventional ones.
  const h=new Date().getHours()+new Date().getMinutes()/60;
  const bed=S&&S.bedtime!=null?S.bedtime:22;
  const rise=S&&S.wakeUp!=null?S.wakeUp:(S&&S.bedtime!=null?((S.bedtime+8)%24):6);
  const dayLen=(((bed-rise)%24)+24)%24||24; // hours of waking day, allowing wrap
  const sunriseDur=1.5;
  const sunsetDur=2;
  const sinceRise=(((h-rise)%24)+24)%24; // hours since wake-up, 0→24
  if(sinceRise>=dayLen)return 1; // sleep window
  if(sinceRise<sunriseDur)return Math.max(0,1-sinceRise/sunriseDur);
  if(sinceRise>=dayLen-sunsetDur)return Math.min(1,(sinceRise-(dayLen-sunsetDur))/sunsetDur);
  return 0;
}
function nightT(){
  return _wallClockNight();
}
let _lastNightT=-1,_stars=[],_bedtimeReached=false;
let _togHidden=false;
function applyNightTheme(){
  const t=nightT();
  if(Math.abs(t-_lastNightT)<0.005)return;
  _lastNightT=t;
  const lr=(a,b,t)=>Math.round(a+(b-a)*t);
  const lh=(day,night,t)=>{
    const d=[parseInt(day.slice(1,3),16),parseInt(day.slice(3,5),16),parseInt(day.slice(5,7),16)];
    const n=[parseInt(night.slice(1,3),16),parseInt(night.slice(3,5),16),parseInt(night.slice(5,7),16)];
    return'#'+[0,1,2].map(i=>lr(d[i],n[i],t).toString(16).padStart(2,'0')).join('');
  };
  const bgT=Math.pow(t,1.4),txtT=1/(1+Math.exp(-20*(t-0.55)));
  const root=document.documentElement.style;
  // Day → night, NO sunset color in the bg itself. The painterly sky gradient overlay
  // (set on body.backgroundImage below) does the warmth. The bg slides through neutral
  // mid-grey, which the gradient covers entirely during the warm window.
  // Warm-tinted day, cool-tinted night — no neutral greys anywhere
  root.setProperty('--bg',    lh('#f5f0e8','#0e1420',bgT));
  root.setProperty('--card',  lh('#faf3ea','#1a2238',bgT));
  root.setProperty('--brd',   lh('#e8d8c4','#2e3450',bgT));
  root.setProperty('--dimmer',lh('#d8c4b0','#3a3a5a',bgT));
  root.setProperty('--text',  lh('#1c1612','#e8e0d4',txtT));
  root.setProperty('--mid',   lh('#7a5a48','#b0a8c0',txtT));
  root.setProperty('--dim',   lh('#9c7a60','#a09cbc',txtT));
  root.setProperty('--ink',   lh('#1c1612','#e8e0d4',txtT));
  const gr=lr(250,18,bgT),gg=lr(248,22,bgT),gb=lr(244,34,bgT);
  root.setProperty('--glass',`rgba(${gr},${gg},${gb},0.45)`);
  root.setProperty('--glass-hi',`rgba(${gr},${gg},${gb},0.32)`);
  root.setProperty('--glass-border',`rgba(${lr(226,37,bgT)},${lr(219,42,bgT)},${lr(208,56,bgT)},0.6)`);

  // ── Painterly sky: daytime → sunset → night ────────────────────────
  // 5-stop vertical gradient that tweens across two axes:
  //   stage      — color path: day (sky blue) → sunset (gold/violet)
  //   intensity  — opacity: full all day & sunset, drops to 0 at deep night
  // Past t≈0.96 the gradient is gone; only the dark --bg shows so the
  // starfield reads against pure navy (the night look you wanted untouched).
  // stage ramps 0→1 across t ∈ [0.10, 0.50] — clean day until late afternoon,
  // then evolves through sunset by mid-window. Past 0.5 it stays at sunset
  // colors while intensity fades to night.
  const stage=Math.max(0,Math.min(1,(t-0.10)/0.40));
  // Smooth fade-out near full night
  const fadeOut=t<0.85?1:Math.max(0,1-(t-0.85)/0.13);
  const intensity=fadeOut;
  if(intensity>0.02){
    // 5 stops, each a [day RGB, sunset RGB] pair, lerped by `stage`
    const lerp3=(d,n,s)=>[Math.round(d[0]+(n[0]-d[0])*s),Math.round(d[1]+(n[1]-d[1])*s),Math.round(d[2]+(n[2]-d[2])*s)];
    // Horizon (bottom): warm pale → golden coral
    const h=lerp3([244,236,210],[255,180,105],stage);
    // Lower-mid: pale sky → peach
    const l=lerp3([212,232,242],[240,130,110],stage);
    // Mid: light sky blue → pink-magenta
    const m=lerp3([166,210,236],[200, 95,145],stage);
    // Upper-mid: medium blue → violet
    const u=lerp3([122,172,210],[105, 65,150],stage);
    // Zenith (top): deeper blue → indigo
    const z=lerp3([ 82,135,180],[ 38, 28,100],stage);
    const a=k=>(intensity*k).toFixed(3);
    document.body.style.backgroundImage=`linear-gradient(to top,
      rgba(${h[0]},${h[1]},${h[2]},${a(0.78)}) 0%,
      rgba(${l[0]},${l[1]},${l[2]},${a(0.78)}) 22%,
      rgba(${m[0]},${m[1]},${m[2]},${a(0.78)}) 48%,
      rgba(${u[0]},${u[1]},${u[2]},${a(0.74)}) 75%,
      rgba(${z[0]},${z[1]},${z[2]},${a(0.72)}) 100%
    )`;
  } else {
    document.body.style.backgroundImage='none';
  }

  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=lh('#f5f0e8','#0e1420',bgT);
  if(S&&isPastBedtime()){
    document.querySelector('.app-wrap')?.classList.add('bedtime-active');
  }
}
function resetNightTheme(){
  _lastNightT=-1;_stars=[];
  const root=document.documentElement.style;
  ['--bg','--card','--brd','--text','--mid','--dim','--dimmer','--ink','--glass','--glass-hi','--glass-border'].forEach(p=>root.removeProperty(p));
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content='#f5f0e8';
}
function initStars(W,H){
  _stars=[];
  for(let i=0;i<65;i++){
    const isBright=i<4; // 4 bright stars visible at deep night
    _stars.push({x:Math.random()*W,y:Math.random()*H*(isBright?0.5:0.85),r:isBright?1.5+Math.random()*1.2:0.5+Math.random()*1.5,phase:Math.random()*Math.PI*2,speed:isBright?0.15+Math.random()*0.3:0.3+Math.random()*0.7,bright:isBright?0.8+Math.random()*0.2:0.5+Math.random()*0.5,isBright});
  }
}
function drawStars(ctx,W,H,t,nA){
  if(nA<0.01||isBatterySaver())return;
  if(!_stars.length)initStars(W,H);
  const dpr=window.devicePixelRatio||1;
  const deepNight=Math.max(0,(nA-0.7)/0.3); // 0 until nA>0.7, then 0→1
  ctx.save();
  for(const s of _stars){
    const tw=0.3+0.7*((Math.sin(t*s.speed+s.phase)+1)/2);
    const brightScale=s.isBright?1+deepNight*0.5:1; // bright stars grow at deep night
    ctx.globalAlpha=nA*s.bright*tw*brightScale;
    ctx.fillStyle=s.isBright&&s===_stars[0]?'#ffe8c0':'#fff'; // first bright star has warm tint
    ctx.beginPath();ctx.arc(s.x,s.y,s.r*dpr*brightScale,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
// Star tap — twinkle sound on touch
function tapStar(tx,ty){
  if(nightT()<0.15||!_stars.length)return;
  const dpr=window.devicePixelRatio||1;
  const hitR=18*dpr; // generous tap target
  for(const s of _stars){
    const dx=tx-s.x,dy=ty-s.y;
    if(dx*dx+dy*dy<hitR*hitR){
      // Twinkle: high crystalline tones, pitch varies by star brightness
      const base=s.isBright?1800+Math.random()*400:2400+Math.random()*600;
      const c=ac();const t=c.currentTime;
      tone(base,0.25,0.03,t);
      tone(base*1.5,0.2,0.02,t+0.06);
      tone(base*2,0.15,0.015,t+0.12);
      haptic([4]);
      // Brief brightness flash
      s.bright=Math.min(1,s.bright+0.5);
      setTimeout(()=>{s.bright=Math.max(0.3,s.bright-0.5);},400);
      return true;
    }
  }
  return false;
}
// Rare shooting star — streaks across night sky in <1 second
let _shootingStar=null;
function drawShootingStar(ctx,W,H,nA,dt){
  if(nA<0.8&&!_shootingStar)return; // only spawn at deep night
  if(!_shootingStar&&Math.random()<0.009*dt){ // dt-normalized: ~1 per 111s regardless of framerate
    const sx=Math.random()*W*0.8+W*0.1,sy=Math.random()*H*0.3;
    const angle=-0.3-Math.random()*0.4; // shallow downward angle
    _shootingStar={x:sx,y:sy,angle,life:1,speed:W*0.8+Math.random()*W*0.4,len:40+(Math.random()*30)};
  }
  if(_shootingStar){
    const s=_shootingStar;
    const dpr=window.devicePixelRatio||1;
    const dx=Math.cos(s.angle)*s.speed*dt,dy=Math.sin(s.angle)*s.speed*dt;
    s.x+=dx;s.y-=dy;s.life-=dt*2.5; // fade over ~0.4s
    if(s.life<=0||s.x>W||s.y<0){_shootingStar=null;return;}
    ctx.save();
    const grad=ctx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.angle)*s.len*dpr,s.y+Math.sin(s.angle)*s.len*dpr);
    grad.addColorStop(0,`rgba(255,255,255,${nA*s.life*0.9})`);
    grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=grad;ctx.lineWidth=1.5*dpr;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-Math.cos(s.angle)*s.len*dpr,s.y+Math.sin(s.angle)*s.len*dpr);
    ctx.stroke();ctx.restore();
  }
}
const PAL=['#c0453a','#d4782a','#b59a1a','#3a9e6a','#2a8a8a','#4a78c0','#5b5cd6','#9b6bb5','#c06090','#8a6548'];
const KEY='boil-v1'; // renamed from blocks-v7

// ── DATA MODEL ─────────────────────────────────────────────────────

function mkTask(id,name,color,total,workDur,restDur,days,desc,emoji){

}
// Auto-assign emoji for tasks that don't have one
const TASK_EMOJIS=['📖','✏️','💻','🎯','🏋️','🎨','🎵','🧹','📞','🍳','🧘','📐','🔧','🌱','📝','🗂️','💡','🎓','🧪','📦'];
function autoEmoji(t){
  if(t.emoji)return t.emoji;

  let h=0;for(let i=0;i<t.id.length;i++){h=((h<<5)-h)+t.id.charCodeAt(i);h|=0;}
  return TASK_EMOJIS[Math.abs(h)%TASK_EMOJIS.length];

let S, ticker=null;

function godTick(){return GOD_MODE?60:1;}

// ── SISTER'S VOICE ────────────────────────────────────────────────
const SISTER={
  begin:['Shall we begin?','Ready when you are.','One small thing. That\'s all.'],

// ── PROCEDURAL NOODLES ──────────────────────────────────────────────
// Noodles: spaghetti dropped in as a bundle — stiff sticks fanning from
// a grip point near the surface, many poking above the water. As they cook
// they soften and slink down into the water, eventually draping limp.
const _noodles=[];
function initNoodles(W,H,fillY){
  _noodles.length=0;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const count=22+Math.floor(Math.random()*6);
  // Bundle grip point — where your hand dropped them in
  // Slightly off-center for a natural look
  const gripX=W*(0.4+Math.random()*0.2);
  for(let i=0;i<count;i++){
    const len=(320+Math.random()*180)*dpr;
    // Fan angle: steep, mostly pointing UP from the bottom
    const spread=(i/count-0.5)*1.2; // -0.6 to +0.6
    const baseAngle=-Math.PI/2+spread; // straight up ± fan
    const angle=baseAngle+(Math.random()-0.5)*0.3; // individual jitter
    // Anchor x: clustered around the grip point with slight scatter
    const x=gripX+(Math.random()-0.5)*30*dpr;
    // bottomOff: small offset from the very bottom of the canvas
    const bottomOff=(Math.random()-0.5)*20*dpr;
    _noodles.push({
      x,bottomOff,len,
      initAngle:angle, // raw/rigid angle (steep, poking up from bottom)
      cookedAngle:-0.1+Math.random()*0.2, // target: mostly horizontal when cooked
      phase:Math.random()*Math.PI*2,
      drift:0.15+Math.random()*0.25,
      thick:(4.5+Math.random()*2.0)*dpr,
      bendCenter:0.3+Math.random()*0.4,
      cookOffset:Math.random()*0.18,
      bob:0.4+Math.random()*0.6,
      // Each strand settles to a different depth when fully cooked
      settleDepth:0.15+Math.random()*0.55,
      // Slight x drift as strand settles — they spread out
      settleX:W*(0.05+Math.random()*0.9),
    });
  }
}
function drawNoodles(ctx,W,H,fillY,boil,t){
  if(!_noodles.length)return;
  const rawCook=Math.min(boil*2.0,1.0);
  const waterDepth=H-fillY;
  ctx.save();
  ctx.lineCap='round';
  ctx.lineJoin='round';

  // Starchy water overlay — subtle milky tint that increases with cooking
  if(rawCook>0.1){
    ctx.save();
    ctx.globalAlpha=rawCook*0.08;
    ctx.fillStyle='rgb(245,240,230)';
    ctx.fillRect(0,fillY,W,H-fillY);
    ctx.restore();
  }

  _noodles.forEach(n=>{
    const cook=Math.max(0,Math.min(1,rawCook-n.cookOffset));
    // Ease function — fast initial slump, slow settle
    const ease=1-Math.pow(1-cook,2.5);

    // Anchor point transitions from bottom cluster to spread-out floating position
    const nx=n.x+(n.settleX-n.x)*ease+Math.sin(t*0.3+n.phase)*n.drift*25*cook;
    // Rigid: sits on the bottom. Cooked: floats up to settle in the water column.
    const bottomY=H-8+n.bottomOff;
    const floatY=fillY+waterDepth*n.settleDepth;
    const ny=bottomY+(floatY-bottomY)*ease+Math.sin(t*0.2*n.bob+n.phase*1.3)*8*cook;

    // Angle: steep (poking up) at raw → horizontal when cooked
    const angle=n.initAngle+(n.cookedAngle-n.initAngle)*ease;

    // Length above water shrinks as they cook (slink into the pot)
    // At raw: most of the strand is above water. At cooked: fully submerged.
    const segs=14;
    const segLen=n.len/segs;
    const pts=[];
    for(let s=0;s<=segs;s++){
      const frac=s/segs;
      // Baseline: straight rigid stick from anchor at current angle
      const bx=nx+Math.cos(angle)*segLen*s;
      const by=ny+Math.sin(angle)*segLen*s;

      // Softening bend — only develops as strand cooks
      const maxBend=n.len*0.10;
      const bendAmp=cook*cook*maxBend;
      const bend=bendAmp*Math.sin((frac-n.bendCenter)*Math.PI*1.3+n.phase*0.3);

      // Gravity: pulls tips downward. Stronger at the far end of the strand.
      // At low cook: stiff, gravity barely affects. At high cook: tips droop heavily.
      const gravityPull=cook*cook*n.len*0.12*frac*frac;

      // Subtle secondary wave at high cook
      const secondary=cook>0.5?(cook-0.5)*n.len*0.012*Math.sin(frac*Math.PI*2.3+t*0.15+n.phase):0;

      const px=-Math.sin(angle);
      const py=Math.cos(angle);
      pts.push({
        x:bx+px*(bend+secondary),
        y:by+py*(bend+secondary)+gravityPull
      });
    }
    // At low cook: allow points above fillY (sticking out of water)
    // At high cook: clamp into water column
    const minY=fillY*(1-Math.max(0,1-cook*1.5))+0; // at cook=0: allow y=0; at cook>0.67: clamp to fillY
    const clampTop=cook<0.67?0:fillY+4;
    pts.forEach(p=>{p.y=Math.max(clampTop,Math.min(H-6,p.y));});

    // Draw smooth curve
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let s=1;s<pts.length-1;s++){
      const cx=(pts[s].x+pts[s+1].x)/2;
      const cy=(pts[s].y+pts[s+1].y)/2;
      ctx.quadraticCurveTo(pts[s].x,pts[s].y,cx,cy);
    }
    ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);

    // Color: raw semolina → cooked pale wheat
    const r=Math.round(224+cook*13);
    const g=Math.round(204+cook*20);
    const b=Math.round(144+cook*28);
    const alpha=0.65+cook*0.10;
    ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth=n.thick*(1+cook*0.15);
    ctx.stroke();

    // Subtle highlight
    ctx.strokeStyle=`rgba(250,243,220,${0.10+cook*0.06})`;
    ctx.lineWidth=n.thick*0.25;
    ctx.stroke();
  });
  ctx.restore();
}

      if(!cont){items.push({ms:(off+120)*1000,title:'The water\u2019s waiting when you are',body:name,tag:'boil-bg-wait'});break;}
      rest=false;rem=t.workDur;

      if(t.restDur>0){rest=true;rem=t.restDur;}

        comp++;

          items.push({ms:off*1000,title:name+' complete',body:total+'/'+total+' blocks done.',tag:'boil-bg-done'});
          if(lastTask)items.push({ms:off*1000+2000,title:'Fully boiled',body:'Every task done. Go gently.',tag:'boil-bg-full'});

        }
        items.push({ms:off*1000,title:name+': '+comp+'/'+total+' blocks',body:(total-comp)+' to go.',tag:'boil-bg-'+idx++});
        if(!cont){items.push({ms:(off+120)*1000,title:'The water\u2019s waiting when you are',body:name,tag:'boil-bg-wait'});break;}

function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h>0?`${h}:${p2(m)}:${p2(ss)}`:`${p2(m)}:${p2(ss)}`;}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0&&m>0?`${h}h ${m}m`:h>0?`${h}h`:`${m}m`;}

function totalRemSecs(){
  return S.tasks.filter(taskVisibleToday).reduce((a,t)=>{
    if(t.done||t.skipped)return a;
    const futureBlocks=t.total-t.completed-1;
    const extra=futureBlocks*t.workDur
      +(!t.isRest&&t.restDur>0?(futureBlocks+1)*t.restDur:0)

// ── DAYBAR ─────────────────────────────────────────────────────────
function renderDaybar(){
  if(!S)return;
  const now=new Date();
  const nowH=now.getHours()+now.getMinutes()/60;
  const fmtT=h=>{h=((h%24)+24)%24;const ap=h>=12?'pm':'am';const h12=Math.round(h)%12||12;return`${h12}${ap}`;};
  const totalB=totalRemSecs();

  // Past bedtime: collapse to a quiet blurred bar (let the day end)
  if(isPastBedtime()){document.getElementById('daybar').innerHTML='';return;}

  // Anchor the bar to the user's wake-up hour, not startTs.
  // startTs can be stale (e.g. set in a previous schedule), so trusting it makes
  // spanH absurdly small and nowPct pinned to 100% — segments collapse.
  const wakeH=(S&&S.wakeUp!=null)
    ?S.wakeUp
    :(S&&S.bedtime!=null?(((S.bedtime+8)%24)):(S.startTs?(new Date(S.startTs).getHours()+new Date(S.startTs).getMinutes()/60):nowH));
  const bedH=S.bedtime!=null?S.bedtime:24;
  let spanH=bedH-wakeH;if(spanH<=0)spanH+=24;
  let nowOff=nowH-wakeH;if(nowOff<0)nowOff+=24;
  const nowPct=Math.max(0,Math.min(nowOff/spanH*100,100));

  let endTime=new Date(now);
  if(S.bedtime!=null){
    endTime.setHours(Math.floor(S.bedtime),Math.round((S.bedtime%1)*60),0,0);
    if(endTime<=now)endTime.setDate(endTime.getDate()+1);
  } else endTime.setHours(24,0,0,0);
  const wr=Math.max(0,Math.floor((endTime-now)/1000));
  const futureW=100-nowPct;
  const remS=Math.max(wr,1);

  // Task segments in the future portion of the bar
  const active=S.tasks.filter(t=>!t.done&&taskVisibleToday(t));
  let cursor=0;
  const segs=[];
  active.forEach(t=>{
    const fb=t.total-t.completed-1;
    const tSecs=t.rem+fb*t.workDur
      +(!t.isRest&&t.restDur>0?(fb+1)*t.restDur:0)
      +(t.isRest&&t.restDur>0?fb*t.restDur:0);
    const wPct=tSecs/remS*futureW;
    const left=nowPct+cursor;
    const w=Math.min(wPct,100-left);
    if(w>0.1)segs.push({color:t.color,left,width:w});
    cursor+=wPct;
  });

  const totalTaskPct=cursor;
  const overflow=Math.max(0,nowPct+totalTaskPct-100);
  const hatchW=overflow>0?Math.min(futureW,overflow):0;
  const slack=Math.round(wr-totalB);
  const isOver=slack<0;

  // Zones (left → right):
  //   [ELAPSED]  [NOW]  [TASK SEGMENTS]  [FREE]   [end of bar = bedtime]
  //   tan tint   line   vivid colors    open      skull on overflow
  // The slack label sits in the FREE zone (right of segments) so the segments
  // stay clean. No overlay over the colored bars.
  const free=Math.max(0,Math.round(wr-totalB));
  const segEnd=Math.min(100,nowPct+(isOver?futureW:Math.min(cursor,futureW)));
  const freeStart=segEnd;
  const freeWidth=Math.max(0,100-freeStart);
  const slackLabel=totalB<=0
    ?'done ✓'
    :isOver?`${fmtHM(Math.abs(slack))} over`:`${fmtHM(free)} free`;
  const showSlack=freeWidth>14&&!isOver; // only show "free" text when there's room
  document.getElementById('daybar').innerHTML=`
    <div class="db-track">
      <div class="db-el" style="width:${nowPct.toFixed(2)}%"></div>
      ${segs.map((s,i)=>`<div class="db-seg" style="left:${s.left.toFixed(2)}%;width:${Math.max(s.width,0.8).toFixed(2)}%;background:${s.color};${i===segs.length-1?'border-radius:0 7px 7px 0':''}"></div>`).join('')}
      ${hatchW>0?`<div class="db-hatch" style="width:${Math.min(hatchW,100).toFixed(2)}%;right:0"></div>`:''}
      ${showSlack?`<div class="db-free" style="left:${freeStart.toFixed(2)}%;width:${freeWidth.toFixed(2)}%">${slackLabel}</div>`:''}
      <div class="db-now" style="left:${nowPct.toFixed(2)}%"></div>
    </div>
    ${isOver?'<div class="db-skull">💀</div>':''}`;
}

// The task whose bubble should be visually "active" (centered + ring).
// Running task wins; otherwise S.lastActiveId (if it's a real, undone task); otherwise null.
function _activeTaskForBubble(){
  if(!S||!S.tasks)return null;
  const r=S.tasks.find(t=>t.running);

function spawnTaskBlocks(W,fillY){

    activeTaskBlocks.push({
      taskId:activeT.id,emoji:autoEmoji(activeT),color:activeT.color,name:activeT.name,
      size:sz,baseSize:sz,

      y:sp?.y ?? fillY-sz*0.3,

function stepTaskBlocks(W,H,fillY,hf,step,dt){
  const dpr=_bgDpr();

  activeTaskBlocks.forEach(f=>{
    if(f.vx===undefined)f.vx=0;
    if(f.beingDragged){_bubblePos[f.taskId]={x:f.x,y:f.y,userPlaced:true};return;}
    if(f.isSunken){
      // Sink to bottom — gentle gravity, lots of drag once near floor

      f.vy*=0.93;
      f.y+=f.vy;

      f.x+=Math.sin(f.bobPhase*0.4)*0.08;
      f.rot=Math.sin(f.bobPhase*0.5)*0.04;
    } else {
      // Float on the water — strong damping so a dropped bubble settles fast.
      // No continuous force on the heightfield (waves come from explicit user touches only).
      const col=Math.round(f.x/step);
      const tOff=(tiltH&&col>=0&&col<tiltH.length)?tiltH[col]:0;
      const surfY=(hf&&col>=0&&col<hf.cols)?fillY+hf.h[col]+tOff:fillY+tOff;
      const submerge=f.size*0.35;
      const targetY=surfY-submerge;

      f.vy+=(targetY-f.y)*0.18;

      // forever-bob that comes from chasing tiny residual surface ripples.

        const tRot=Math.atan2(hf.h[col+1]-hf.h[col-1],step*2)*(f.isActive?0.3:0.6);
        f.rot+=(tRot-f.rot)*0.10;
      }

      if(!f.isActive&&!f.userPlaced&&hf&&col>0&&col<hf.cols-1){
        f.vx+=(hf.h[col+1]-hf.h[col-1])*0.04;
      }
      if(f.isActive&&!f.userPlaced){
        f.vx+=(W/2-f.x)*0.0035;

      if(f._splashOnce&&hf&&col>=0&&col<hf.cols){

  // get undone by buoyancy. Bias the contact normal toward horizontal so they

  const N=activeTaskBlocks.length;
  for(let i=0;i<N;i++){
    const a=activeTaskBlocks[i];
    for(let j=i+1;j<N;j++){
      const b=activeTaskBlocks[j];
      if(a.isSunken!==b.isSunken)continue;
      let dx=b.x-a.x, dy=b.y-a.y;
      const minSep=(a.size+b.size)*0.5+4*dpr;
      let d2=dx*dx+dy*dy;
      if(d2>=minSep*minSep)continue;
      // If perfectly stacked or collinear vertically, kick horizontally with a tiny random offset.
      if(d2<1){dx=(Math.random()-0.5)*0.6+(i<j?1:-1);dy=0;d2=dx*dx;}
      // For surface bubbles (or similarly-aligned pairs), force the resolution
      // onto the X axis — vertical pushes are useless when they all float to the surface.
      if(!a.isSunken&&!b.isSunken&&Math.abs(dx)<minSep*0.95){
        dx=dx||(i<j?1:-1)*0.5;

      const nx=dx/d, ny=dy/d;
      // If one is being dragged, the other yields entirely (so the user's bubble stays under their finger)
      const aDr=!!a.beingDragged, bDr=!!b.beingDragged;
      const aShare=aDr?0:(bDr?1.0:0.7);
      const bShare=bDr?0:(aDr?1.0:0.7);
      const push=overlap*0.5;
      a.x-=nx*push*aShare;a.y-=ny*push*aShare;
      b.x+=nx*push*bShare;b.y+=ny*push*bShare;

      if(!aDr){a.vx-=nx*kick;a.vy-=ny*kick;}
      if(!bDr){b.vx+=nx*kick;b.vy+=ny*kick;}
    }

  activeTaskBlocks.forEach(f=>{

    if(f.x<margin){f.x=margin;f.vx=Math.max(0,f.vx);}
    if(f.x>W-margin){f.x=W-margin;f.vx=Math.min(0,f.vx);}
    _bubblePos[f.taskId]={x:f.x,y:f.y,userPlaced:!!f.userPlaced};
  });

  // Both want the surface, so bias the contact normal horizontal when they're stacked.
  if(typeof activeFloaters!=='undefined'&&activeFloaters.length){
    for(const fl of activeFloaters){
      if(fl.underwater)continue;
      for(const b of activeTaskBlocks){
        if(b.isSunken)continue;
        let dx=fl.x-b.x, dy=fl.y-b.y;
        const minSep=(fl.size+b.size)*0.5+2*dpr;
        let d2=dx*dx+dy*dy;
        if(d2>=minSep*minSep)continue;
        if(d2<1){dx=(Math.random()-0.5)*0.6+(fl.x>=b.x?1:-1);dy=0;d2=dx*dx;}
        if(Math.abs(dx)<minSep*0.95){dx=dx||(fl.x>=b.x?1:-1)*0.5;dy=0;d2=dx*dx;}
        const d=Math.sqrt(d2);
        const overlap=minSep-d;
        const nx=dx/d, ny=dy/d;
        // Ball is lighter → takes more of the push; bubble takes a smaller share
        fl.x+=nx*overlap*0.75; fl.y+=ny*overlap*0.4;
        b.x-=nx*overlap*0.35; b.y-=ny*overlap*0.15;
        const kick=Math.min(overlap*0.6,8);
        fl.vx+=nx*kick; fl.vy+=ny*kick*0.4;
        b.vx-=nx*kick*0.4; b.vy-=ny*kick*0.15;
      }
    }
  }
  // GC stale entries (deleted tasks)
  for(const k in _bubblePos){if(!S.tasks.find(t=>t.id===k))delete _bubblePos[k];}
}
function drawTaskBlocks(ctx){
  const dpr=_bgDpr();
  const _now=performance.now();
  activeTaskBlocks.forEach(f=>{
    const t=S.tasks.find(x=>x.id===f.taskId);
    if(!t)return;
    ctx.save();
    ctx.translate(f.x,f.y);
    if(!f.isActive)ctx.rotate(f.rot);
    const r=f.size*0.5;

    if(f.isSunken){
      // Sunken: emoji only, no body, no ring, no markers, slight transparency
      ctx.globalAlpha=0.55;
      const emojiImg=getEmojiImg(f.emoji,Math.round(f.size*0.7));
      if(emojiImg)ctx.drawImage(emojiImg,-f.size*0.35,-f.size*0.35,f.size*0.7,f.size*0.7);
      ctx.restore();
      return;
    }

    const alpha=1.0;
    ctx.globalAlpha=alpha;
    // Bubble body
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=f.color+'44';ctx.fill();
    ctx.strokeStyle=f.color+'aa';
    ctx.lineWidth=(f.isActive?3:2)*dpr;
    ctx.stroke();
    // Emoji
    const emojiImg=getEmojiImg(f.emoji,Math.round(f.size*0.45));
    if(emojiImg)ctx.drawImage(emojiImg,-f.size*0.22,-f.size*0.22,f.size*0.45,f.size*0.45);
    // Name label
    ctx.textAlign='center';ctx.textBaseline='top';
    const fontSize=Math.round((f.isActive?12:10)*dpr);
    ctx.font=`700 ${fontSize}px "Plus Jakarta Sans",sans-serif`;
    const labelOff=r+(f.isActive?14:4)*dpr;
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillText(f.name,1*dpr,labelOff+1);
    ctx.fillStyle=f.color;
    ctx.fillText(f.name,0,labelOff);
    // Ring (active bubble only, while it has work left)
    const ringR=r+(f.isActive?12*dpr:0);
    if(f.isActive&&!t.done){
      ctx.beginPath();ctx.arc(0,0,ringR,0,Math.PI*2);
      ctx.strokeStyle=f.color+'33';
      ctx.lineWidth=4*dpr;ctx.stroke();
      const phaseDur=t.isRest?Math.max(1,t.restDur):Math.max(1,t.workDur);
      const elapsed=phaseDur-Math.max(0,t.rem);
      const progress=Math.max(0,Math.min(1,elapsed/phaseDur));
      if(progress>0.001){

    const markerSize=(f.isActive?4.5:3)*dpr;
    const N=Math.max(1,t.total||1);
    for(let i=0;i<N;i++){
      const ang=-Math.PI/2+(i/N)*Math.PI*2+(N>1?Math.PI/N:0);

}

}

let _frameTimeLog=[],_frameLogTimer=0;
function waveLoop(now){
  _waveAlive=now;
  let _anyContinue=false;
  try{
  const dt=Math.min((now-lastFrame)/1000,0.05);
  // Frame time tracking: detect progressive slowdown (thermal throttling)
  const _ft=now-lastFrame;
  _frameTimeLog.push(_ft);
  if(_frameTimeLog.length>300)_frameTimeLog.shift(); // keep last 5s at 60fps
  _frameLogTimer+=dt;
  if(_frameLogTimer>10){ // log every 10s
    _frameLogTimer=0;
    const avg=_frameTimeLog.reduce((a,b)=>a+b,0)/_frameTimeLog.length;
    const max=Math.max(..._frameTimeLog);
    const slow=_frameTimeLog.filter(f=>f>50).length; // frames >50ms = dropped
    console.log(`[wave] avg=${avg.toFixed(1)}ms max=${max.toFixed(0)}ms slow=${slow}/${_frameTimeLog.length} parts=${parts.length} bgBub=${bgBubbles.length}`);
    if(avg>100){
      try{const fl=JSON.parse(localStorage.getItem('_freezeLog')||'[]');
        fl.push({ts:new Date().toISOString(),type:'thermal',avgFrame:Math.round(avg),maxFrame:Math.round(max),slow,parts:parts.length,bgBub:bgBubbles.length});
        if(fl.length>20)fl.splice(0,fl.length-20);
        localStorage.setItem('_freezeLog',JSON.stringify(fl));
      }catch(e){}
    }
  }
  lastFrame=now;
  waveT=(waveT+dt)%10000;
  if(shakeF>0.001)shakeF*=Math.pow(0.4,dt);else shakeF=0;
  const anyRunning=S&&S.tasks&&S.tasks.some(t=>t.running&&!t.done);
  const rt=S&&S.tasks&&S.tasks.find(t=>t.running&&!t.done);
  _anyContinue=anyRunning||bgWaveState.active;

  // ── Pip canvas ────────────────────────────────────────────────────
  if(rt){
    const cv=document.getElementById('pf-'+rt.id);
    if(cv&&cv.tagName==='CANVAS'){
      const targetFill=parseFloat(cv.dataset.fill)||0;
      const color=cv.dataset.color||rt.color;
      // Smooth fill: lerp toward target each frame so water rises continuously
      // rather than jumping once per second tick.
      const key='_sf_'+rt.id;
      if(window[key]===undefined||!rt.running)window[key]=targetFill;
      // Fast enough to track within ~0.5s, slow enough to be smooth
      window[key]+=(targetFill-window[key])*Math.min(dt*4,0.18);
      const fill=window[key];
      const dpr=Math.min(window.devicePixelRatio||1,3);
      const W=Math.round(36*dpr), H=Math.round(36*dpr);
      if(cv.width!==W||cv.height!==H){
        cv.width=W;cv.height=H;
        cv.style.width='36px';cv.style.height='36px';
        cv.style.imageRendering='auto';
      }
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,W,H);
      if(rt.isRest){
        // Pip steam: task-colored fog dissipating
        const rPct=rt.restDur>0?rt.rem/rt.restDur:0;
        const parseH=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
        const [pr,pg,pb]=parseH(color);
        const sg=ctx.createLinearGradient(0,0,0,H);
        const sa=rPct*0.6;
        sg.addColorStop(0,`rgba(${pr},${pg},${pb},${(sa*0.15).toFixed(3)})`);
        sg.addColorStop(1,`rgba(${pr},${pg},${pb},${sa.toFixed(3)})`);
        ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
        // Wisp
        const wx=W*(0.3+0.4*Math.sin(waveT*0.2));
        const wy=H*(0.3+0.3*Math.cos(waveT*0.15));
        const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,W*0.4);
        wg.addColorStop(0,`rgba(${pr},${pg},${pb},${(rPct*0.2).toFixed(3)})`);
        wg.addColorStop(1,`rgba(${pr},${pg},${pb},0)`);
        ctx.fillStyle=wg;ctx.fillRect(0,0,W,H);
        drawContainerWalls(ctx,W,H);
      } else if(fill>0.2){
        const bubs=getBubbles(rt.id,color);
        tickBubbles(bubs,W,H,fill,dt,color,false);
        drawWater(ctx,W,H,fill,color,waveT,bubs,false,0);
        drawContainerWalls(ctx,W,H);
      }
    }
  }

  // ── Bg canvas ─────────────────────────────────────────────────────
  const bgc=document.getElementById('bg-canvas');
  const isResting=rt&&rt.isRest;
  if(bgc&&bgWaveState.active&&(anyRunning||bgWaveState.ambient)){
    // Water kick-start: brief surge on tap for instant feedback
    if(bgWaveState.kick>0){bgWaveState.fill=Math.min(bgWaveState.fill+bgWaveState.kick*5,bgWaveState.targetFill+5);bgWaveState.kick*=0.85;if(bgWaveState.kick<0.05)bgWaveState.kick=0;}
    bgWaveState.fill+=(bgWaveState.targetFill-bgWaveState.fill)*Math.min(dt*(bgWaveState.ambient?1:3),bgWaveState.ambient?0.06:0.18);
    if(bgWaveState.fill<2&&bgWaveState.targetFill>0)bgWaveState.fill=2; // never fully zero while active
    // Lerp bg color toward target for smooth task-color transitions
    if(bgWaveState.targetColor&&bgWaveState.color!==bgWaveState.targetColor){
      const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
      const parseHex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const hex2=(n)=>n.toString(16).padStart(2,'0');
      const [r1,g1,b1]=parseHex(bgWaveState.color);
      const [r2,g2,b2]=parseHex(bgWaveState.targetColor);
      const s=Math.min(dt*2,0.08);
      bgWaveState.color='#'+hex2(lerp(r1,r2,s))+hex2(lerp(g1,g2,s))+hex2(lerp(b1,b2,s));
    }
    const dprBg=_bgDpr();
    const W=Math.round(window.innerWidth*dprBg);
    const H=Math.round(window.innerHeight*dprBg);
    if(Math.abs(bgc.width-W)>2||Math.abs(bgc.height-H)>2){
      bgc.width=W;bgc.height=H;
    }
    const ctx=bgc.getContext('2d');
    ctx.clearRect(0,0,W,H);

    // Night sky: stars behind water
    applyNightTheme();
    drawStars(ctx,W,H,waveT,nightT());
    // Rare shooting star at deep night (Bunzeck novelty signal)
    if(!isBatterySaver())drawShootingStar(ctx,W,H,nightT(),dt);

    if(isResting){
      // ── REST: steam dissipating ──────────────────────────────────
      // Steam density = how much rest remains (dense at start, clear at end)
      const restPct=rt.restDur>0?rt.rem/rt.restDur:0; // 1.0→0.0
      const parseHex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const [sr,sg,sb]=parseHex(bgWaveState.color);
      // Vertical gradient: dense at bottom (where water was), thinning upward
      const steamG=ctx.createLinearGradient(0,0,0,H);
      const baseA=restPct*0.45; // max opacity scales with remaining rest
      steamG.addColorStop(0,   `rgba(${sr},${sg},${sb},${(baseA*0.05).toFixed(3)})`);
      steamG.addColorStop(0.3, `rgba(${sr},${sg},${sb},${(baseA*0.25).toFixed(3)})`);
      steamG.addColorStop(0.7, `rgba(${sr},${sg},${sb},${(baseA*0.6).toFixed(3)})`);
      steamG.addColorStop(1,   `rgba(${sr},${sg},${sb},${baseA.toFixed(3)})`);
      ctx.fillStyle=steamG;
      ctx.fillRect(0,0,W,H);
      // Animated wisps — slow-moving cloudy patches
      const wispCount=6;
      for(let wi=0;wi<wispCount;wi++){
        const wx=W*(0.1+0.8*((Math.sin(waveT*0.08+wi*2.1)+1)/2));
        const wy=H*(0.2+0.6*((Math.cos(waveT*0.05+wi*1.7)+1)/2));
        const wr=W*(0.15+0.1*Math.sin(waveT*0.03+wi));
        const wispA=restPct*0.12;
        const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,wr);
        wg.addColorStop(0,`rgba(${sr},${sg},${sb},${wispA.toFixed(3)})`);
        wg.addColorStop(1,`rgba(${sr},${sg},${sb},0)`);
        ctx.fillStyle=wg;
        ctx.fillRect(wx-wr,wy-wr,wr*2,wr*2);
      }
    } else if(bgWaveState.ambient&&bgWaveState.fill>0.3){
      // ── AMBIENT: calm pool with floaters + bubbles ────────────────
      const bgStep=Math.max(3,Math.ceil(W/1023));
      const bgN=Math.min(Math.ceil(W/bgStep)+1,1024);
      ensureBgHF(bgN);
      const hfSteps=Math.max(2,Math.round(dt*60));
      for(let si=0;si<hfSteps;si++)stepHF(bgHF,0.35,0.995); // higher damping = calmer
      updateTiltLayer(bgN);
      if(shakeF>0.1)injectBoilEnergy(bgHF,shakeF*0.1,dt);
      drawWater(ctx,W,H,bgWaveState.fill,bgWaveState.color,waveT*0.2,[],true,bgHF);
      const ambFillY=H*(1-bgWaveState.fill/100);
      // Floaters
      if(activeFloaters.length===0)spawnFloaters(W,ambFillY);
      stepFloaters(W,H,ambFillY,bgHF,bgStep,dt,0);
      drawFloaters(ctx);
      // Task bubbles (every task is a bubble, always visible)
      if(activeTaskBlocks.length===0&&S.tasks&&S.tasks.length)spawnTaskBlocks(W,ambFillY);
      stepTaskBlocks(W,H,ambFillY,bgHF,bgStep,dt);
      drawTaskBlocks(ctx);
    } else if(bgWaveState.fill>0.3){
      // ── WORK: water + floaters + noodles ─────────────────────────
      // Step heightfield physics
      const bgStep=Math.max(3,Math.ceil(W/1023));
      const bgN=Math.min(Math.ceil(W/bgStep)+1,1024);
      ensureBgHF(bgN);
      const boil2=(bgWaveState.fill/100)*(bgWaveState.fill/100);
      const hfSteps=Math.max(2,Math.round(dt*60));
      for(let si=0;si<hfSteps;si++)stepHF(bgHF,0.35,0.985);
      const _ndW=1-nightT()*0.4; // night damping for wave energy
      injectBoilEnergy(bgHF,boil2*_ndW,dt);
      updateTiltLayer(bgN);
      tickBubbles(bgBubbles,W,H,bgWaveState.fill,dt,bgWaveState.color,true);
      drawWater(ctx,W,H,bgWaveState.fill,bgWaveState.color,waveT*0.35,bgBubbles,true,bgHF);
      // Noodles (drawn submerged, before floaters)
      const bgFillY=H*(1-bgWaveState.fill/100);
      if(getTheme().noodles){
        if(!_noodles.length)initNoodles(W,H,bgFillY);
        drawNoodles(ctx,W,H,bgFillY,boil2,waveT);
      }
      // Floaters
      if(activeFloaters.length===0)spawnFloaters(W,bgFillY);
      stepFloaters(W,H,bgFillY,bgHF,bgStep,dt,boil2);
      drawFloaters(ctx);
      // Task bubbles (always visible while there are tasks)
      if(activeTaskBlocks.length===0&&S.tasks&&S.tasks.length)spawnTaskBlocks(W,bgFillY);
      stepTaskBlocks(W,H,bgFillY,bgHF,bgStep,dt);
      drawTaskBlocks(ctx);
      // Glass fogging at high boil
      if(boil2>0.4){
        ctx.save();ctx.globalAlpha=(boil2-0.4)*0.25;
        const fogG=ctx.createLinearGradient(0,0,0,H);
        fogG.addColorStop(0,'rgba(255,255,255,0.7)');
        fogG.addColorStop(0.25,'rgba(255,255,255,0)');
        fogG.addColorStop(0.75,'rgba(255,255,255,0)');
        fogG.addColorStop(1,'rgba(255,255,255,0.3)');
        ctx.fillStyle=fogG;ctx.fillRect(0,0,W,H);
        ctx.restore();
      }
      // Edge vignette
      const edgeG=ctx.createLinearGradient(0,0,W,0);
      edgeG.addColorStop(0,  `rgba(0,0,0,0.08)`);
      edgeG.addColorStop(0.04,`rgba(0,0,0,0)`);
      edgeG.addColorStop(0.96,`rgba(0,0,0,0)`);
      edgeG.addColorStop(1,  `rgba(0,0,0,0.08)`);
      ctx.fillStyle=edgeG;
      ctx.fillRect(0,0,W,H);
    }
  }

  // Steam particles above waterline at high boil — heat level lowers threshold
  const _steamHm=heatMultiplier();
  const _steamThreshold=Math.max(15,35-_steamHm*4);
  if(bgWaveState.active&&bgWaveState.fill>_steamThreshold){
    const steamBoil=(bgWaveState.fill/100)*(bgWaveState.fill/100);
    if(steamBoil>0.10){
      const steamRate=(steamBoil-0.10)*5*_steamHm*(1-nightT()*0.4);
      const sN=Math.floor(steamRate*dt+(Math.random()<(steamRate*dt%1)?1:0));
      const surfY=FX.height*(1-bgWaveState.fill/100);
      for(let si=0;si<sN;si++){
        const sp=new P(
          FX.width*(0.12+Math.random()*0.76),
          surfY-5-Math.random()*15,
          (Math.random()-.5)*1.5,
          -(0.6+Math.random()*2),
          `rgba(255,255,255,${(0.08+steamBoil*0.12).toFixed(2)})`,
          4+Math.random()*8,-0.015);
        sp.decay=0.01+Math.random()*0.008;
        sp.round=true;
        parts.push(sp);
      }
      if(sN>0)startFX();
    }
  }

  _anyContinue=anyRunning||bgWaveState.active;_waveErrors=0;
  if(GOD_MODE&&_tiltRaw!==undefined){const td=document.getElementById('tilt-debug');if(td)td.textContent=`tilt: ${_tiltRaw===null?'NO DATA':_tiltRaw.toFixed(1)}° smooth: ${tiltSmooth.toFixed(1)} | sensors: ${_sensorsAttached?'ON':'OFF'}`;}
  }catch(e){console.error('waveLoop:',e);_waveErrors=(_waveErrors||0)+1;if(_waveErrors>10){_anyContinue=false;_waveErrors=0;}}
  if(_anyContinue){
    waveRaf=requestAnimationFrame(waveLoop);
  } else {
    waveRaf=null;
    const _bgc=document.getElementById('bg-canvas');
    if(_bgc){const _ctx=_bgc.getContext('2d');if(_ctx)_ctx.clearRect(0,0,_bgc.width,_bgc.height);}
  }
}


function _workRunning(){return S&&S.tasks&&S.tasks.find(t=>t.running&&!t.done&&!t.isRest);}


// ── BUBBLE SYSTEM ─────────────────────────────────────────────────────
function heatMultiplier(){return 1;}
// Session water personality — subliminal variation prevents hedonic adaptation (Schultz RPE, Bunzeck novelty)
const _waterSeed={
  nucleateWall:0.20+Math.random()*0.15,   // 20-35% wall nucleation (default was fixed 25%)
  speedMul:0.88+Math.random()*0.24,        // 0.88-1.12× speed
  sizeBias:0.9+Math.random()*0.2,          // 0.9-1.1× size
  wobbleFreq:2.8+Math.random()*1.4,        // 2.8-4.2 wobble Hz (default was fixed 3.5)
};
function tickBubbles(pool,W,H,fp,dt,color,isBg){
  const b2=(fp/100)*(fp/100);
  const fillY=H*(1-fp/100);
  const hm=heatMultiplier();
  const _nd=1-nightT()*0.4; // night damping: 60% energy at full night
  const fizzM=1+shakeF*4;
  // Anticipatory crescendo: +50% bubble rate in final 20% (Salimpoor — caudate anticipation)
  const _cresc=fp>80?1+0.5*Math.pow((fp-80)/20,2):1;
  const baseRate=((isBg?(fp<8?0:b2*120*hm):(fp<15?0:b2*18*hm))*fizzM+(shakeF>0&&fp>0.5?(isBg?shakeF*80:shakeF*12):0))*_cresc*_nd;
  const n=Math.floor(baseRate*dt+(Math.random()<(baseRate*dt%1)?1:0));
  for(let s=0;s<n;s++){
    // Nucleation-site spawning: bubbles form near bottom and edges
    // Start TINY, grow as they rise (simulated via r scaling with born time)
    const startR=isBg?(0.3+Math.random()*0.8):(0.3+Math.random()*0.6);
    // At high boil (b2>0.6) bubbles grow significantly larger and more visible
    const highBoilBonus=isBg?Math.max(0,b2-0.5)*8:0;
    const shakeBoost=shakeF>0?shakeF:0;
    const _sb=_waterSeed.sizeBias;
    const _crescR=(_cresc-1)*2; // 0→1 crescendo for radius boost
    const maxR  =((isBg?(2.5+b2*10*_sb+highBoilBonus+Math.random()*(b2*4.5*_sb+highBoilBonus*0.5)):(1.0+b2*3.0*_sb+Math.random()*(b2*2.0*_sb)))+(isBg?shakeBoost*4:shakeBoost*2))*(1+_crescR*0.25);
    const _sm=_waterSeed.speedMul;
    const speed=((isBg?(10+b2*140+Math.random()*(b2*80))
                      :(4+b2*35+Math.random()*(b2*20)))*_sm*_nd)*(1+shakeBoost*1.5);
    // Nucleation sites: mostly near walls and bottom — ratio varies per session
    const nucleateSide=Math.random()<_waterSeed.nucleateWall;
    const spawnX=nucleateSide
      ? (Math.random()<0.5 ? W*(0.02+Math.random()*0.08) : W*(0.90+Math.random()*0.08))
      : W*(0.08+Math.random()*0.84);
    // Spawn in bottom 40% of water column
    const waterDepth=Math.max(1,H-fillY);
    const spawnY=Math.min(H-2, fillY+waterDepth*0.60+Math.random()*waterDepth*0.38);
    pool.push({
      x:spawnX, y:spawnY,
      vy:-speed, vx:(Math.random()-.5)*(isBg?3:1.5),
      r:startR, maxR, // grow toward maxR as rises
      op:isBg?(0.5+b2*0.5+Math.random()*0.05):(0.55+b2*0.35+Math.random()*0.05),
      born:0, wobble:Math.random()*Math.PI*2
    });
  }
  for(let i=pool.length-1;i>=0;i--){
    const b=pool[i];
    b.born+=dt;
    // Accelerate near surface (pressure drops = bubble expands = rises faster)
    const distToSurface=Math.max(0.1,b.y-fillY);
    const pressureFactor=1+(H-b.y)/(H-fillY+1)*0.3; // faster near top
    b.vy*=0.998;
    b.y+=b.vy*dt*pressureFactor;
    b.x+=b.vx*dt+Math.sin(b.born*_waterSeed.wobbleFreq+b.wobble)*dt*(isBg?2:0.8);
    b.vx*=0.995;
    // Grow toward maxR as it rises (expansion due to decreasing pressure)
    if(b.r<b.maxR) b.r=Math.min(b.maxR, b.r+(b.maxR-b.r)*dt*1.5);
    if(b.y<=fillY||b.x<-b.r||b.x>W+b.r||b.born>10){
      // Surface pop: inject impulse into heightfield + spray particles
      if(b.y<=fillY&&isBg&&bgHF.cols>0){
        const col=Math.round(b.x/W*bgHF.cols);
        if(col>=0&&col<bgHF.cols)bgHF.v[col]-=b.r*0.35;
        if(b.r>2.5){
          const sprayCount=b.r>6?6:3;
          for(let k=0;k<sprayCount;k++){
            const a=-Math.PI*0.3+Math.random()*Math.PI*0.6-Math.PI/2;
            const sp=0.5+Math.random()*2;
            const p=new P(b.x,fillY,Math.cos(a)*sp,Math.sin(a)*sp,'rgba(255,255,255,0.35)',0.5+Math.random()*1.5,0.08);
            p.round=true;p.decay=0.04+Math.random()*0.02;parts.push(p);
          }
          startFX();
        }
      }
      pool.splice(i,1);
    }
  }
  const cap=isBg?(_isMobile?60:120):25;
  if(pool.length>cap)pool.splice(0,pool.length-cap);
}

// Pre-rendered bubble sprite — one gradient baked to texture, drawImage per bubble
let _bubbleSprite=null;
function ensureBubbleSprite(){
  if(_bubbleSprite)return _bubbleSprite;
  const sz=48,c=document.createElement('canvas');
  c.width=sz;c.height=sz;
  const cx=c.getContext('2d'),r=sz/2;
  const rg=cx.createRadialGradient(r*0.65,r*0.65,r*0.05,r,r,r);
  rg.addColorStop(0,'rgba(255,255,255,1)');
  rg.addColorStop(0.25,'rgba(255,255,255,0.35)');
  rg.addColorStop(0.7,'rgba(255,255,255,0.06)');
  rg.addColorStop(1,'rgba(255,255,255,0.65)');
  cx.beginPath();cx.arc(r,r,r,0,Math.PI*2);
  cx.fillStyle=rg;cx.fill();
  _bubbleSprite=c;return c;
}

// ── DRAW WATER ────────────────────────────────────────────────────────
// Design principles:
//   - ONE primary wave (smooth, readable, never spiky)
//   - ONE small ripple on top (adds texture, same direction)
//   - Tilt = LINEAR SLOPE (not phase shift, not offset — actual slope)
//   - Gradient anchored to actual wave min height
//   - Bubbles: bright, high-opacity, clearly visible glass spheres
function clr(v){return Math.max(0,Math.min(255,Math.round(v)));}
const _surf=new Float32Array(1024);

function drawWater(ctx,W,H,fp,colorHex,t,bubbles,isBg,hf){
  fp=Math.max(0,Math.min(fp,100));
  if(fp<1)return;

  const boil=(fp/100)*(fp/100);
  const fillY=H*(1-fp/100);
  // Anticipatory crescendo: quadratic ramp in final 20% (Salimpoor — caudate anticipation)
  const cresc=fp>80?Math.pow((fp-80)/20,2):0;

  // Sine wave params (used for pip canvas; bg uses heightfield)
  const A   = boil*7.0*(1+cresc*0.3);
  const Arip= boil*2.0*(1+cresc*0.3);
  const sp  = Math.min(0.25+boil*0.55, 0.80)*(1+cresc*0.15);
  const lam = W/1.4;
  const lamR= lam*0.5;
  const sprip= sp*2.0;

  let ri=parseInt(colorHex.slice(1,3),16);
  let gi=parseInt(colorHex.slice(3,5),16);
  let bi=parseInt(colorHex.slice(5,7),16);
  // Theme tint — shifts task color toward theme character
  const _theme=getTheme();
  if(_theme.waterTint&&isBg){
    ri=clr(ri+_theme.waterTint.r);gi=clr(gi+_theme.waterTint.g);bi=clr(bi+_theme.waterTint.b);
  }
  // Temperature color tint — task color stays the base, warmth intensifies with boil
  // Heat level amplifies the visual intensity
  const _hm=heatMultiplier();
  if(isBg){
    const warm=Math.max(0,(fp/100-0.25)/0.75)*_hm;
    ri=Math.min(255,Math.round(ri+warm*50));
    gi=Math.max(0,Math.round(gi-warm*15));
    bi=Math.max(0,Math.round(bi-warm*40));
  } else {
    ri=Math.min(255,Math.round(ri+boil*10*_hm));
    bi=Math.max(0,Math.round(bi-boil*6*_hm));
  }
  // Crescendo warmth: amber shift in final 20% (goal gradient — Kivetz)
  if(cresc>0){ri=clr(ri+cresc*25);gi=clr(gi-cresc*5);bi=clr(bi-cresc*20);}
  // Night cooling — moonlit water
  const _nt=nightT();
  if(_nt>0&&isBg){ri=Math.max(0,Math.round(ri-_nt*40));gi=Math.max(0,Math.round(gi-_nt*20));bi=Math.min(255,Math.round(bi+_nt*30));}

  // Build surface
  const step=isBg?Math.max(3,Math.ceil(W/1023)):1;
  const N=Math.min(Math.ceil(W/step)+1,1024);
  let minY=H;
  for(let i=0;i<N;i++){
    if(hf&&i<hf.cols){
      // Heightfield + smooth tilt layer (separate from physics, no jitter)
      const tOff=(tiltH&&i<tiltH.length)?tiltH[i]:0;
      _surf[i]=Math.max(2, Math.min(H-2, fillY+hf.h[i]+tOff));
    } else {
      // Sine waves for pip canvas
      const x=i*step;
      const wave=Math.sin(2*Math.PI*(x/lam - t*sp))*A;
      const rip =Math.sin(2*Math.PI*(x/lamR - t*sprip))*Arip;
      _surf[i]=Math.max(2, Math.min(H-2, fillY+wave+rip));
    }
    if(_surf[i]<minY)minY=_surf[i];
  }
  const gt=Math.max(0,minY-3);

  // ── Body gradient (light at surface, deep at bottom) ──────────────
  const _om=_theme.opacityMul||1.0;
  // Background water starts transparent, reaches full opacity near completion
  // Flowing mode: boost opacity so water is more visually prominent
  const _flowing=isBg&&S&&S.tasks&&S.tasks.some(t=>t.running&&!t.isRest);
  const _bp=isBg?(_flowing?0.55+0.45*(fp/100):0.35+0.65*(fp/100)):1;
  const g=ctx.createLinearGradient(0,gt,0,H);
  g.addColorStop(0,   `rgba(${clr(ri+70)},${clr(gi+70)},${clr(bi+70)},${Math.min(1,(isBg?0.32:0.95)*_om*_bp)})`);
  g.addColorStop(0.08,`rgba(${clr(ri+35)},${clr(gi+35)},${clr(bi+35)},${Math.min(1,(isBg?0.27:0.85)*_om*_bp)})`);
  g.addColorStop(0.4, `rgba(${ri},${gi},${bi},${Math.min(1,(isBg?0.22:0.78)*_om*_bp)})`);
  g.addColorStop(1,   `rgba(${clr(ri-25)},${clr(gi-25)},${clr(bi-25)},${Math.min(1,(isBg?0.28:0.82)*_om*_bp)})`);
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();

  // ── Subsurface shimmer (depth layer, skip on mobile) ────────────────
  if(boil>0.08&&!_isMobile){
    ctx.save();
    ctx.globalAlpha=boil*0.22;
    ctx.beginPath();
    ctx.moveTo(0,_surf[0]+A*0.6);
    for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]+A*0.6);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=`rgb(${clr(ri+100)},${clr(gi+100)},${clr(bi+100)})`;
    ctx.fill();
    ctx.restore();
  }

  // ── Star reflections on water surface (night only) ────────────────
  if(isBg&&!isBatterySaver()){
    const _nA=nightT();
    if(_nA>0.15&&_stars.length){
      ctx.save();
      const dpr=window.devicePixelRatio||1;
      for(const s of _stars){
        if(s.y>=fillY)continue; // star must be above waterline
        const mirrorY=fillY+(fillY-s.y)*0.3; // compressed reflection
        if(mirrorY>H)continue;
        const tw=0.3+0.7*((Math.sin(waveT*s.speed+s.phase)+1)/2);
        // Wobble tied to surface heightfield
        const si=Math.min(N-1,Math.max(0,Math.round(s.x/step)));
        const surfOff=_surf?_surf[si]-fillY:0;
        const wx=s.x+surfOff*0.5; // horizontal wobble from waves
        const deepMul=s.isBright?1.5:1;
        ctx.globalAlpha=_nA*s.bright*tw*0.25*deepMul; // 25% of sky brightness
        ctx.fillStyle=s.isBright&&s===_stars[0]?'#ffe8c0':'#fff';
        // Elongated vertical reflection
        ctx.beginPath();
        ctx.ellipse(wx,mirrorY+surfOff,s.r*dpr*0.8,s.r*dpr*2.5,0,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── Surface highlight: the single most important line ─────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]);
  const _cg=fp>80?Math.pow((fp-80)/20,2):0; // crescendo glow
  // Surface highlight warms from white to gold during crescendo
  const _hlG=Math.round(255-_cg*30),_hlB=Math.round(255-_cg*60);
  ctx.lineWidth=(isBg?2.0:1.3)*(1+_cg*0.5);
  ctx.strokeStyle=`rgba(255,${_hlG},${_hlB},${Math.min(1,(isBg?0.75:0.92)+_cg*0.15)})`;
  ctx.stroke();
  // Soft glow below line — heat level amplifies (skip on mobile: thin highlight suffices)
  if(!_isMobile){
    const glowMul=0.8+(_hm-1)*0.5;
    ctx.lineWidth=isBg?(8+boil*12*glowMul):(2.5+boil*3*glowMul);
    ctx.strokeStyle=`rgba(255,${_hlG},${_hlB},${isBg?Math.min(0.32,0.16*glowMul):Math.min(0.55,0.35*glowMul)})`;
    ctx.stroke();
  }
  ctx.restore();

  // ── Surface foam at high boil (pip only) ─────────────────────────
  if(!isBg&&boil>0.3){
    ctx.save();
    const foamA=Math.min((boil-0.3)*1.5,0.7)*(1+cresc*0.4);
    ctx.globalAlpha=foamA;
    const _fc=_theme.foamColor||null;
    for(let i=0;i<N;i++){
      const x=i*step,sy=_surf[i];
      // Deterministic foam using sin hash — stable per frame, noisy across x
      const h=(Math.sin(x*127.1+t*2.1)*43758.5453)%1;
      if(Math.abs(h)>0.4-cresc*0.12){
        const fr=(0.4+Math.abs(h)*2.0)*(1+cresc*0.3);
        ctx.beginPath();
        ctx.arc(x,sy+Math.sin(x*0.8+t*3)*1.5,fr,0,Math.PI*2);
        ctx.fillStyle=_fc||`rgba(255,255,255,${0.45*foamA})`;
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // ── Bubbles: sprite-based rendering (pre-baked gradient texture) ─────
  const _bsp=ensureBubbleSprite();
  bubbles.forEach(b=>{
    if(b.r<0.8)return;
    const fade=Math.min(1,b.born*10)*Math.min(1,(5-b.born)*0.8);
    if(fade<=0)return;
    if(b.y<fillY-b.r)return;
    const boilAlpha=isBg?Math.max(0.4,fp/100):1.0;
    const a=b.op*fade*boilAlpha;
    if(a<0.03)return;
    const vyN=Math.min(Math.abs(b.vy||0)/80,0.5);
    const stretch=1+vyN*0.4;
    const squash=1/Math.sqrt(stretch);
    const w=b.r*2*squash,h=b.r*2*stretch;
    ctx.globalAlpha=a;
    ctx.drawImage(_bsp,b.x-w/2,b.y-h/2,w,h);
  });
  ctx.globalAlpha=1;
}
function drawContainerWalls(ctx,W,H){
  // Top: slightly darker (dry glass above waterline)
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,W,4);
  // Left edge
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.fillRect(0,0,3,H);
  // Right edge
  ctx.fillRect(W-3,0,3,H);
}

function updateSiteWave(t,pct){
  const bgc=document.getElementById('bg-canvas');
  if(!bgc)return;
  if(t&&t.running){
    bgWaveState.targetFill=pct;
    bgWaveState.targetColor=t.color;
    if(!bgWaveState.color)bgWaveState.color=bgWaveState.targetColor;
    bgWaveState.active=true;
    bgWaveState.ambient=false;
    bgc.classList.add('active');
    startWaveLoop();
  } else if(isDayActive()){
    // Fall back to ambient water
    bgWaveState.ambient=true;
    bgWaveState.active=true;
    bgWaveState.targetFill=10;
    bgWaveState.targetColor='#a89e92';
    bgc.classList.add('active');
    startWaveLoop();
  } else {
    bgWaveState.active=false;
    bgWaveState.ambient=false;
    bgc.classList.remove('active');
  }
}

// ── REST MODE: sound + haptics + animation ──────────────────────────
function onRestStart(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t)return;
  if(S.seen.rest){sisterMsg(sisterSays('restStart'),2500);}
  else seenToast('rest','☕ Rest. The next block starts after.','#2e9e6a',800);
  // Gentle descending chime — work done, relax now
  const now=ac().currentTime;
  [[0,880,.06],[.1,660,.055],[.22,523,.05],[.36,440,.04]].forEach(([dt,hz,v])=>tone(hz,.35,v,now+dt));
  // Soft "whoosh" noise for transition feel
  try{
    const c=ac(),buf=c.createBuffer(1,c.sampleRate*.3,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.8;
    const src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='lowpass';f.frequency.value=600;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(.04,now+.1);g.gain.exponentialRampToValueAtTime(.001,now+.4);
    src.start(now+.1);src.stop(now+.5);
  }catch(e){}
  haptic([0,30,60]);
  activeTaskBlocks.length=0;
}

function beginDay(){
  if(!_sensorsAttached)requestMotionPermission();
  S.startTs=Date.now();S.dayHours=24;
  S.bedtime=timeToDecimal(document.getElementById('begin-bed').value);
  _snapshotDay();
  save();
  document.getElementById('begin-screen').style.display='none';
  if(beginWaveRaf){cancelAnimationFrame(beginWaveRaf);beginWaveRaf=null;}
  renderDaybar();updateLogoDot();
  activeTaskBlocks.length=0;
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  // Begin ceremony: flash + low G2 tone (98hz)
  const _fc=S.tasks.length?S.tasks[0].color:'#4a9eba';
  const flash=document.createElement('div');
  Object.assign(flash.style,{
    position:'fixed',inset:'0',background:_fc,
    opacity:'0',zIndex:'9999',pointerEvents:'none',
    transition:'opacity .1s ease'
  });
  document.body.appendChild(flash);
  requestAnimationFrame(()=>{
    flash.style.opacity='0.22';
    setTimeout(()=>{
      flash.style.opacity='0';
      setTimeout(()=>flash.remove(),200);
    },120);
  });
  try{tone(98,.55,.04);tone(98,.55,.02,ac().currentTime+.55);}catch(e){}
  haptic([30,40,80]);
}

}

function render(){
  document.documentElement.classList.toggle('battery-saver',!!S.batterySaver);
  checkBeginScreen();renderDaybar();updateSteamBanner();updateLogoDot();updateHeader();applyNightTheme();updateGodBadge();
  // Activate water (ambient or task-tinted) + force respawn of bubble field
  const _rt=S.tasks.find(t=>t.running&&!t.done);
  if(_rt){const _pd=_rt.isRest?_rt.restDur:_rt.workDur;updateSiteWave(_rt,14+(_pd>0?((_pd-_rt.rem)/_pd*86):0));}
  else updateSiteWave(null,0);
  activeTaskBlocks.length=0;
  setTimeout(startWaveLoop,50);

  const eh=document.getElementById('empty-hint');
