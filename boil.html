// ── FORMAT ─────────────────────────────────────────────────────────
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h>0?`${h}:${p2(m)}:${p2(ss)}`:`${p2(m)}:${p2(ss)}`;}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0&&m>0?`${h}h ${m}m`:h>0?`${h}h`:`${m}m`;}
function p2(n){return String(n).padStart(2,'0');}
// dayEl/dayRem defined near constants above

function totalRemSecs(){
  return S.tasks.filter(taskVisibleToday).reduce((a,t)=>{
    if(t.done)return a;
    const futureBlocks=t.total-t.completed-1;
    const extra=futureBlocks*t.workDur
      +(!t.isRest&&t.restDur>0?(futureBlocks+1)*t.restDur:0)
      +(t.isRest&&t.restDur>0?futureBlocks*t.restDur:0);
    return a+t.rem+extra;
  },0);
}

// ── DAYBAR ─────────────────────────────────────────────────────────
function renderDaybar(){
  const we=dayEl(),wr=dayRem(),totalB=totalRemSecs();
  const elPct=(we/DAY_S()*100).toFixed(2);
  const nowPct=parseFloat(elPct);

  // stack task segments from NOW
  const active=S.tasks.filter(t=>!t.done&&taskVisibleToday(t));
  let cursor=nowPct;
  const segs=[];
  active.forEach(t=>{
    const fb=t.total-t.completed-1;
    const tSecs=t.rem+fb*t.workDur
      +(!t.isRest&&t.restDur>0?(fb+1)*t.restDur:0)
      +(t.isRest&&t.restDur>0?fb*t.restDur:0);
    const w=Math.min(tSecs/DAY_S()*100, 100-cursor);
    if(w>0)segs.push({color:t.color,left:cursor,width:w});
    cursor+=tSecs/DAY_S()*100;
  });

  const overflow=Math.max(0,cursor-100);
  const hatchW=overflow>0?Math.min(100-nowPct,overflow):0;
  const slack=Math.round(wr-totalB);
  const isOver=slack<0;

  // Left stat: remaining work time
  const leftText=totalB<=0
    ?`<div class="db-stat go"><b>done</b> ✓</div>`
    :`<div class="db-stat"><b>${fmtHM(totalB)}</b> of work</div>`;

  // Right stat: free time or overbooked
  const free=Math.max(0,Math.round(wr-totalB));
  const rightText=isOver
    ?`<div class="db-stat warn"><span style="font-size:14px">💀</span> <b>${fmtHM(Math.abs(slack))}</b> over</div>`
    :`<div class="db-stat${totalB<=0?' go':''}"><b>${fmtHM(free)}</b> free</div>`;

  // Dynamic tick labels based on actual start time and DAY_S() (respects midnight cap)
  const dbTicks=(()=>{
    if(!S.startTs)return['8 am','12 pm','6 pm','midnight'];
    const start=new Date(S.startTs);
    const fmtT=h=>{const ap=h>=12?'pm':'am';const h12=h%12||12;return`${h12}${ap}`;};
    const s0=start.getHours()+start.getMinutes()/60;
    const actualHours=DAY_S()/3600;
    const step=actualHours/3;
    return [0,1,2,3].map(i=>{
      const h=(s0+i*step)%24;
      if(i===3&&Math.round(h)%24===0)return'midnight';
      return fmtT(Math.round(h));
    });
  })();
  document.getElementById('daybar').innerHTML=`
    <div class="db-top">
      ${leftText}
      ${rightText}
    </div>
    <div class="db-track">
      <div class="db-el" style="width:${elPct}%"></div>
      ${segs.map((s,i)=>`<div class="db-seg" style="left:${s.left.toFixed(2)}%;width:${s.width.toFixed(2)}%;background:${s.color};${i===segs.length-1?'border-radius:0 7px 7px 0':''}"></div>`).join('')}
      ${hatchW>0?`<div class="db-hatch" style="width:${Math.min(hatchW,100-nowPct).toFixed(2)}%;right:0"></div>`:''}
      <div class="db-now" style="left:${nowPct}%"></div>
    </div>
    <div class="db-ticks">
      ${dbTicks.map(l=>`<span class="db-tick">${l}</span>`).join('')}
    </div>`;
}

function cardState(t){
  if(t.done||t.isRest)return'';
  if(t.rem<=10)return'critical'; // last 10s
  if(t.rem<60)return'danger';
  if(t.rem<300)return'warn';
  return'';
}

function taskTotalRem(t){
  if(t.done)return 0;
  const fullBlock=t.workDur+t.restDur;
  const afterCurrent=t.total-t.completed-1;
  // current phase rem + rest of current block (if in work phase with pomo) + all remaining full blocks
  const curBlockRem=t.rem+(!t.isRest&&t.restDur>0?t.restDur:0);
  return curBlockRem+afterCurrent*fullBlock;
}

function taskVisibleToday(t){return !t.days||t.days.includes(new Date().getDay());}
// Endowed progress: water starts at 2% so pressing start is visible (Nunes & Dreze 2006)
function endowedFill(raw){return 2+raw*0.98;}
function renderCards(){
  const el=document.getElementById('cards');

function _attachSensors(){

    const mag=Math.sqrt(dx*dx+dy*dy+dz*dz);
    lastShakeAccel={x:a.x,y:a.y,z:a.z};
    if(mag>10){
      shakeF=Math.min(shakeF+mag*0.1,3);

const bgHF={h:null,v:null,cols:0};
function ensureBgHF(cols){
  if(bgHF.cols===cols)return;
  const nh=new Float32Array(cols),nv=new Float32Array(cols);
  if(bgHF.h){const m=Math.min(cols,bgHF.cols);for(let i=0;i<m;i++){nh[i]=bgHF.h[i];nv[i]=bgHF.v[i];}}
  bgHF.h=nh;bgHF.v=nv;bgHF.cols=cols;
}
function stepHF(hf,tension,damping){
  const{h,v,cols}=hf;
  for(let i=1;i<cols-1;i++)v[i]+=(h[i-1]+h[i+1]-2*h[i])*tension;
  v[0]+=(h[1]-h[0])*tension;
  v[cols-1]+=(h[cols-2]-h[cols-1])*tension;
  for(let i=0;i<cols;i++){
    v[i]-=h[i]*0.004;
    v[i]*=damping;
    h[i]+=v[i];
    if(h[i]>150)h[i]=150; if(h[i]<-150)h[i]=-150;
  }
  // Smoothing pass — alternating direction prevents directional drift
  if(hf._smoothDir){for(let i=cols-2;i>0;i--)h[i]=h[i]*0.7+(h[i-1]+h[i+1])*0.15;}
  else{for(let i=1;i<cols-1;i++)h[i]=h[i]*0.7+(h[i-1]+h[i+1])*0.15;}
  hf._smoothDir=!hf._smoothDir;
}
function applyForce(hf,col,force,radius){
  const lo=Math.max(0,Math.floor(col-radius*3)),hi=Math.min(hf.cols,Math.ceil(col+radius*3));
  for(let i=lo;i<hi;i++){const dx=i-col;hf.v[i]+=force*Math.exp(-dx*dx/(radius*radius));}
}
function injectBoilEnergy(hf,boil,dt){
  if(boil<0.02)return;
  // Inject as gaussian blobs, not per-column noise — creates smooth rolling waves
  const rate=boil*2*dt*60;
  const n=Math.floor(rate+(Math.random()<(rate%1)?1:0));
  for(let s=0;s<n;s++){
    const col=Math.floor(Math.random()*hf.cols);
    const strength=(Math.random()-0.5)*boil*6;
    applyForce(hf,col,strength,8+Math.random()*12);
  }
}
// Tilt: separate smooth height layer (no oscillation, no jitter)
let tiltH=null;
function updateTiltLayer(cols){
  if(!tiltH||tiltH.length!==cols)tiltH=new Float32Array(cols);
  const strength=-tiltSmooth/6;
  for(let i=0;i<cols;i++){
    const target=strength*(i/cols-0.5)*300;
    tiltH[i]+=(target-tiltH[i])*0.12;
  }
}

function stepTaskBlocks(W,H,fillY,hf,step,dt){

function stepFloaters(W,H,fillY,hf,step,dt,boil){
  const flowing=S&&S.tasks&&S.tasks.some(t=>t.running);
  activeFloaters.forEach(f=>{
    const col=Math.round(f.x/step);
    const tOff=(tiltH&&col>=0&&col<tiltH.length)?tiltH[col]:0;
    const surfY=(hf&&col>=0&&col<hf.cols)?fillY+hf.h[col]+tOff:fillY+tOff;
    // Ball → anchor during work: sinks to bottom
    if(f.bouncy&&flowing){
      if(!f._anchored){f._anchored=true;f._origEmoji=f.emoji;f.emoji='⚓';f.juggleCount=0;}
      f.vy+=0.25; // gravity pulls anchor down
      f.vy*=0.96;
      f.y+=f.vy;
      if(f.y>H-f.size){f.y=H-f.size;f.vy=0;}
      // Gentle sway at bottom
      f.rot=Math.sin(waveT*0.5)*0.08;
      f.vx*=0.95;f.x+=f.vx;
      if(f.x<f.size)f.x=f.size;if(f.x>W-f.size)f.x=W-f.size;
      return;
    }
    if(f.bouncy&&!flowing&&f._anchored){f._anchored=false;f.emoji=f._origEmoji||'🏐';f.vy=-3;} // float back up
    // Fish: swim through the water with sinusoidal path
    if(f.underwater){
      // Target: middle of the water column
      const waterMid=surfY+(H-surfY)*0.5;
      f.vy+=(waterMid-f.y)*0.02;
      f.vy*=0.92;
      f.y+=f.vy;
      // Fish AI: gentle turns with longer intervals
      f.fishTimer-=dt;
      if(f.fishTimer<=0){f.fishDir*=-1;f.fishTimer=3+Math.random()*5;}
      // Wall bounce — nudge away so it doesn't re-trigger
      if(f.x<=f.size+4){f.x=f.size+5;f.fishDir=1;f.fishTimer=3+Math.random()*4;}
      if(f.x>=W-f.size-4){f.x=W-f.size-5;f.fishDir=-1;f.fishTimer=3+Math.random()*4;}
      const panicMult=boil>0.5?1+boil*2:1;
      const baseSwim=0.7*panicMult;
      f.vx+=(f.fishDir*baseSwim-f.vx)*0.08; // smooth acceleration
      f.x+=f.vx;
      // Sinusoidal swimming path — gentle wave motion
      f.y+=Math.sin(waveT*2.5+f.x*0.01)*0.4*panicMult;

      f.rot=f.fishDir<0?0.08:-0.08;

function pushFloatersAt(tx,ty,vx,vy){
  activeFloaters.forEach(f=>{
    const dx=tx-f.x,dy=ty-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>=f.size*3)return;

    // Ball: ONLY direct taps, no proximity/drag forces
    // Rising pitch on successive juggles (Mario shell style)
    // Juggling disabled during work — it's a toy for idle/rest
    if(f.bouncy){
      if(_workRunning())return;
      if(dist<f.size*2){
        // Only count juggles when ball is above water surface
        const _H=window.innerHeight*_bgDpr();
        const _waterSurf=_H*(1-bgWaveState.fill/100);
        const aboveSurf=f.y<_waterSurf+f.size*0.5;
        const nx=f.x-tx, ny=f.y-ty;
        const mag=Math.sqrt(nx*nx+ny*ny)||1;
        const power=6+Math.min(dist/f.size,1)*4;
        f.vx=nx/mag*power*0.6;
        f.vy=ny/mag*power;
        if(f.vy>-3) f.vy=-3;
        if(aboveSurf){
          f.juggleCount=(f.juggleCount||0)+1;
          f.juggleHitT=performance.now();
        }
        // Extended pitch: +70Hz/juggle to 10, then +20Hz/juggle beyond
        const jc=f.juggleCount;
        const basePitch=300+Math.min(jc,10)*70+Math.max(0,jc-10)*20;
        const vol=0.035+Math.min(jc,15)*0.002;
        const nearRec=(S.ballRecord||0)>3&&jc>=(S.ballRecord||0)-2;
        try{const now=ac().currentTime;
          tone(_jHz(basePitch),.06,vol,now);tone(_jHz(basePitch+200),.06,vol*.85,now+_jDt(.05));tone(_jHz(basePitch+500),.1,vol*.7,now+_jDt(.09));
          // Approaching record: extra harmonic shimmer
          if(nearRec)tone(_jHz(basePitch+700),.12,.015,now+_jDt(.12));
        }catch(e){}
        // Haptic escalates with count
        const h=Math.min(jc,12);
        haptic(nearRec?[15,30,15]:[8+h,15+h*2,8+h]);
        // Per-juggle mini-burst
        if(!isBatterySaver()&&jc>1){
          const dpr=_bgDpr();
          burstAt(f.x/dpr,f.y/dpr,CPAL[jc%CPAL.length],3+Math.min(jc,8));
        }
        // Confetti + record toast the moment you beat the high score
        if(aboveSurf&&f.juggleCount>0&&f.juggleCount>(S.ballRecord||0)&&f.juggleCount>3){
          S.ballRecord=f.juggleCount;save();

          burstAt(f.x/dpr,f.y/dpr,'#c8841a',40);
          burstAt(f.x/dpr,f.y/dpr,PAL[f.juggleCount%PAL.length],25);
          shockwave(f.x/dpr,f.y/dpr,'#fffbe8',20);
          sparks(f.x/dpr,f.y/dpr,'#c8841a',15);
          haptic([20,40,20,40,20]);
          try{const now=ac().currentTime;
            tone(_jHz(basePitch*2),.15,.03,now+.15);tone(_jHz(basePitch*2.5),.12,.025,now+.2);tone(_jHz(basePitch*3),.2,.02,now+.25);
          }catch(e){}
          showToast(`🏐 New record: ${f.juggleCount}!`,'#c8841a',1800);
        }
      }
      return;
    }

    // Other floaters: gentle proximity push + sounds on direct hit
    const force=Math.max(0,1-dist/(f.size*3));
    f.vx+=(vx-dx*0.05)*force*0.5;
    f.vy+=(vy-dy*0.05)*force*0.5;
    if(dist<f.size*1.5){
      try{const now=ac().currentTime;
        if(f.type==='float_ducky'){tone(280,.12,.04,now,'square');tone(220,.14,.035,now+.1,'square');}

        else if(f.type==='float_ice'){tone(2400,.06,.025,now);tone(3200,.04,.02,now+.04);}
      }catch(e){}
      if(f.type==='float_ducky')haptic([15]);
      else if(f.type==='float_boat')haptic([8]);
      else haptic([5]);
    }

}

let _waveAlive=0;

  if(waveRaf){cancelAnimationFrame(waveRaf);waveRaf=null;}

function waveLoop(now){
  _waveAlive=now;

  lastFrame=now;

    if(cv&&cv.tagName==='CANVAS'){
      const targetFill=parseFloat(cv.dataset.fill)||0;
      const color=cv.dataset.color||rt.color;
      // Smooth fill: lerp toward target each frame so water rises continuously
      // rather than jumping once per second tick.
      const key='_sf_'+rt.id;
      if(window[key]===undefined||!rt.running)window[key]=targetFill;
      // Fast enough to track within ~0.5s, slow enough to be smooth
      window[key]+=(targetFill-window[key])*Math.min(dt*4,0.18);

      if(cv.width!==W||cv.height!==H){

      ctx.clearRect(0,0,W,H);

        // Pip steam: task-colored fog dissipating

        const parseH=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];

      }
    }
  }

  // ── Bg canvas ─────────────────────────────────────────────────────
  const bgc=document.getElementById('bg-canvas');
  const isResting=rt&&rt.isRest;
  if(bgc&&bgWaveState.active&&(anyRunning||bgWaveState.ambient)){
    // Water kick-start: brief surge on tap for instant feedback
    if(bgWaveState.kick>0){bgWaveState.fill=Math.min(bgWaveState.fill+bgWaveState.kick*5,bgWaveState.targetFill+5);bgWaveState.kick*=0.85;if(bgWaveState.kick<0.05)bgWaveState.kick=0;}
    bgWaveState.fill+=(bgWaveState.targetFill-bgWaveState.fill)*Math.min(dt*(bgWaveState.ambient?1:3),bgWaveState.ambient?0.06:0.18);
    if(bgWaveState.fill<2&&bgWaveState.targetFill>0)bgWaveState.fill=2; // never fully zero while active
    // Lerp bg color toward target for smooth task-color transitions
    if(bgWaveState.targetColor&&bgWaveState.color!==bgWaveState.targetColor){
      const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
      const parseHex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];

      const [r2,g2,b2]=parseHex(bgWaveState.targetColor);

    drawStars(ctx,W,H,waveT,nightT());
    // Rare shooting star at deep night (Bunzeck novelty signal)
    if(!isBatterySaver())drawShootingStar(ctx,W,H,nightT(),dt);

    if(isResting){
      // ── REST: steam dissipating ──────────────────────────────────
      // Steam density = how much rest remains (dense at start, clear at end)
      const restPct=rt.restDur>0?rt.rem/rt.restDur:0; // 1.0→0.0
      const parseHex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const [sr,sg,sb]=parseHex(bgWaveState.color);
      // Vertical gradient: dense at bottom (where water was), thinning upward
      const steamG=ctx.createLinearGradient(0,0,0,H);
      const baseA=restPct*0.45; // max opacity scales with remaining rest
      steamG.addColorStop(0,   `rgba(${sr},${sg},${sb},${(baseA*0.05).toFixed(3)})`);
      steamG.addColorStop(0.3, `rgba(${sr},${sg},${sb},${(baseA*0.25).toFixed(3)})`);
      steamG.addColorStop(0.7, `rgba(${sr},${sg},${sb},${(baseA*0.6).toFixed(3)})`);
      steamG.addColorStop(1,   `rgba(${sr},${sg},${sb},${baseA.toFixed(3)})`);
      ctx.fillStyle=steamG;
      ctx.fillRect(0,0,W,H);
      // Animated wisps — slow-moving cloudy patches
      const wispCount=6;
      for(let wi=0;wi<wispCount;wi++){
        const wx=W*(0.1+0.8*((Math.sin(waveT*0.08+wi*2.1)+1)/2));
        const wy=H*(0.2+0.6*((Math.cos(waveT*0.05+wi*1.7)+1)/2));
        const wr=W*(0.15+0.1*Math.sin(waveT*0.03+wi));
        const wispA=restPct*0.12;
        const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,wr);
        wg.addColorStop(0,`rgba(${sr},${sg},${sb},${wispA.toFixed(3)})`);
        wg.addColorStop(1,`rgba(${sr},${sg},${sb},0)`);
        ctx.fillStyle=wg;
        ctx.fillRect(wx-wr,wy-wr,wr*2,wr*2);
      }
      // ── Centered rest text (aquarium mode only — cards hidden) ──
      if(document.querySelector('.app-wrap.aquarium')){
        const textA=Math.min(1,restPct*1.5)*0.55;
        const dprBgT=Math.min(window.devicePixelRatio||1,2);
        ctx.save();
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.font=`800 ${Math.round(22*dprBgT)}px Syne,sans-serif`;
        ctx.fillStyle=`rgba(28,25,23,${textA.toFixed(2)})`;
        ctx.fillText('steam clearing.',W/2,H*0.44);
        ctx.font=`800 ${Math.round(48*dprBgT)}px Syne,sans-serif`;
        ctx.fillStyle=`rgba(28,25,23,${(textA*0.9).toFixed(2)})`;
        ctx.fillText(fmtTime(rt.rem),W/2,H*0.44+Math.round(52*dprBgT));
        ctx.font=`600 ${Math.round(12*dprBgT)}px "Plus Jakarta Sans",sans-serif`;
        ctx.fillStyle=`rgba(28,25,23,${(textA*0.5).toFixed(2)})`;
        const bl=rt.total-rt.completed;
        const sub=bl<=1?'final block next':'block '+(rt.completed+1)+' of '+rt.total+' next';
        ctx.fillText(sub,W/2,H*0.44+Math.round(90*dprBgT));
        ctx.restore();
      }
    } else if(bgWaveState.ambient&&bgWaveState.fill>0.3){
      // ── AMBIENT: calm pool with floaters ───────────────────────
      const bgStep=Math.max(3,Math.ceil(W/1023));
      const bgN=Math.min(Math.ceil(W/bgStep)+1,1024);
      ensureBgHF(bgN);
      const hfSteps=Math.max(2,Math.round(dt*60));
      for(let si=0;si<hfSteps;si++)stepHF(bgHF,0.35,0.995); // higher damping = calmer
      updateTiltLayer(bgN);
      if(shakeF>0.1)injectBoilEnergy(bgHF,shakeF*0.1,dt);
      drawWater(ctx,W,H,bgWaveState.fill,bgWaveState.color,waveT*0.2,[],true,bgHF);
      const ambFillY=H*(1-bgWaveState.fill/100);
      drawEcosystem(ctx,W,H,ambFillY,bgHF,bgStep,bgN,dt);
      // Floaters — your toys stay in the water
      if(activeFloaters.length===0&&((S.shopItems&&S.shopItems.floaters&&S.shopItems.floaters.length)||getTheme().floaters.length))spawnFloaters(W,ambFillY);
      stepFloaters(W,H,ambFillY,bgHF,bgStep,dt,0);
      drawFloaters(ctx);
    } else if(bgWaveState.fill>0.3){
      // ── WORK: water + floaters + noodles ─────────────────────────
      // Step heightfield physics
      const bgStep=Math.max(3,Math.ceil(W/1023));
      const bgN=Math.min(Math.ceil(W/bgStep)+1,1024);
      ensureBgHF(bgN);
      const boil2=(bgWaveState.fill/100)*(bgWaveState.fill/100);
      const hfSteps=Math.max(2,Math.round(dt*60));
      for(let si=0;si<hfSteps;si++)stepHF(bgHF,0.35,0.985);
      const _ndW=1-nightT()*0.4; // night damping for wave energy
      injectBoilEnergy(bgHF,boil2*_ndW,dt);
      updateTiltLayer(bgN);
      tickBubbles(bgBubbles,W,H,bgWaveState.fill,dt,bgWaveState.color,true);
      drawWater(ctx,W,H,bgWaveState.fill,bgWaveState.color,waveT*0.35,bgBubbles,true,bgHF);
      // Noodles (drawn submerged, before floaters)
      const bgFillY=H*(1-bgWaveState.fill/100);
      if(getTheme().noodles){
        if(!_noodles.length)initNoodles(W,H,bgFillY);
        drawNoodles(ctx,W,H,bgFillY,boil2,waveT);
      }
      // Ecosystem (bioluminescent life, between noodles and floaters)
      drawEcosystem(ctx,W,H,bgFillY,bgHF,bgStep,bgN,dt);
      // Floaters
      if(activeFloaters.length===0&&((S.shopItems&&S.shopItems.floaters&&S.shopItems.floaters.length)||getTheme().floaters.length))spawnFloaters(W,bgFillY);
      stepFloaters(W,H,bgFillY,bgHF,bgStep,dt,boil2);
      drawFloaters(ctx);
      // Task blocks (inactive tasks as floating emoji blocks)
      if(activeTaskBlocks.length===0&&S.tasks.some(t=>t.running))spawnTaskBlocks(W,bgFillY);
      stepTaskBlocks(W,H,bgFillY,bgHF,bgStep,dt);
      drawTaskBlocks(ctx);
      // Glass fogging at high boil
      if(boil2>0.4){
        ctx.save();ctx.globalAlpha=(boil2-0.4)*0.25;
        const fogG=ctx.createLinearGradient(0,0,0,H);
        fogG.addColorStop(0,'rgba(255,255,255,0.7)');
        fogG.addColorStop(0.25,'rgba(255,255,255,0)');
        fogG.addColorStop(0.75,'rgba(255,255,255,0)');
        fogG.addColorStop(1,'rgba(255,255,255,0.3)');
        ctx.fillStyle=fogG;ctx.fillRect(0,0,W,H);
        ctx.restore();
      }
      // Edge vignette
      const edgeG=ctx.createLinearGradient(0,0,W,0);
      edgeG.addColorStop(0,  `rgba(0,0,0,0.08)`);
      edgeG.addColorStop(0.04,`rgba(0,0,0,0)`);
      edgeG.addColorStop(0.96,`rgba(0,0,0,0)`);
      edgeG.addColorStop(1,  `rgba(0,0,0,0.08)`);
      ctx.fillStyle=edgeG;
      ctx.fillRect(0,0,W,H);
    }
  }

  // Steam particles above waterline at high boil — heat level lowers threshold
  const _steamHm=heatMultiplier();
  const _steamThreshold=Math.max(15,35-_steamHm*4);
  if(bgWaveState.active&&bgWaveState.fill>_steamThreshold){
    const steamBoil=(bgWaveState.fill/100)*(bgWaveState.fill/100);
    if(steamBoil>0.10){
      const steamRate=(steamBoil-0.10)*5*_steamHm*(1-nightT()*0.4);
      const sN=Math.floor(steamRate*dt+(Math.random()<(steamRate*dt%1)?1:0));
      const surfY=FX.height*(1-bgWaveState.fill/100);
      for(let si=0;si<sN;si++){
        const sp=new P(
          FX.width*(0.12+Math.random()*0.76),
          surfY-5-Math.random()*15,
          (Math.random()-.5)*1.5,
          -(0.6+Math.random()*2),
          `rgba(255,255,255,${(0.08+steamBoil*0.12).toFixed(2)})`,
          4+Math.random()*8,-0.015);
        sp.decay=0.01+Math.random()*0.008;
        sp.round=true;
        parts.push(sp);
      }
      if(sN>0)startFX();
    }
  }

  _anyContinue=anyRunning||bgWaveState.active;
  if(GOD_MODE&&_tiltRaw!==undefined){const td=document.getElementById('tilt-debug');if(td)td.textContent=`tilt: ${_tiltRaw===null?'NO DATA':_tiltRaw.toFixed(1)}° smooth: ${tiltSmooth.toFixed(1)} | sensors: ${_sensorsAttached?'ON':'OFF'}`;}
  }catch(e){console.error('waveLoop:',e);_anyContinue=true;}
  if(_anyContinue){
    waveRaf=requestAnimationFrame(waveLoop);
  } else {
    waveRaf=null;
    const _bgc=document.getElementById('bg-canvas');
    if(_bgc){const _ctx=_bgc.getContext('2d');if(_ctx)_ctx.clearRect(0,0,_bgc.width,_bgc.height);}
  }
}


// ── ECOSYSTEM: BIOLUMINESCENT TIDE POOL ────────────────────────────
// Living water — procedural organisms that grow with work
// Always vivid — the life IS the water. Interactive elements (trails, juggling) gated to idle/rest.
// Research: Blue Mind (Nichols), biophilia (Gaekwad), prediction error (Schultz/Bunzeck)

const _ecoSeed={
  driftAngle:Math.random()*Math.PI*2,
  driftSpeed:0.3+Math.random()*0.4,
  glowHue:Math.random()*30-15,
  pulseBase:0.6+Math.random()*0.5,
};
let _plankton=[];
let _organisms=[];
let _bioTrails=[];

function ecoPhase(){
  const e=(S&&S.eco&&S.eco.energy)||0;
  if(e<5)return 'dormant';if(e<20)return 'seed';if(e<50)return 'growing';if(e<80)return 'bloom';return 'mature';
}
function ecoRegister(){return 'vivid';}
function _workRunning(){return S&&S.tasks&&S.tasks.find(t=>t.running&&!t.done&&!t.isRest);}
function ecoPopTarget(){
  const p=ecoPhase();
  return p==='dormant'?4:p==='seed'?12:p==='growing'?25:p==='bloom'?40:50;
}
function ecoAddEnergy(n){
  if(!S||!S.eco)return;
  S.eco.energy=Math.min(100,(S.eco.energy||0)+n);
  if(S.eco.energy>S.eco.peak)S.eco.peak=S.eco.energy;
}
function ecoDecayEnergy(){
  if(!S||!S.eco||!S.eco.energy)return;
  S.eco.energy=Math.max(0,S.eco.energy-Math.max(2,Math.floor(S.eco.energy*0.12)));
}

// ── Plankton (luminous dots) ────────────────────────────────────────
function mkPlankton(W,H,fillY){
  const dpr=_bgDpr();
  const depth=0.15+Math.random()*0.8;
  return{
    x:Math.random()*W, y:fillY+(H-fillY)*(0.05+depth*0.9),
    vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.15,
    r:(0.6+Math.random()*1.8)*dpr,
    glow:0.3+Math.random()*0.7,
    glowPhase:Math.random()*Math.PI*2,
    glowSpeed:_ecoSeed.pulseBase*(0.5+Math.random()),
    depth,
  };
}
function ensurePlankton(W,H,fillY){
  const target=ecoPopTarget();
  while(_plankton.length<target)_plankton.push(mkPlankton(W,H,fillY));
  if(_plankton.length>target)_plankton.length=target;
}
function stepPlankton(dt,W,H,fillY,hf,step){
  const angle=_ecoSeed.driftAngle+Math.sin(waveT*0.03)*0.3;
  const driftX=Math.cos(angle)*_ecoSeed.driftSpeed;
  const driftY=Math.sin(angle)*_ecoSeed.driftSpeed*0.3;
  for(const p of _plankton){
    p.x+=(p.vx+driftX*(1-p.depth*0.5))*dt*25;
    p.y+=(p.vy+driftY)*dt*25;
    p.x+=Math.sin(waveT*p.glowSpeed*0.7+p.glowPhase)*dt*6;
    p.y+=Math.cos(waveT*p.glowSpeed*0.5+p.glowPhase*1.3)*dt*3;
    // Near-surface plankton ride the waves
    if(hf&&p.depth<0.4){
      const col=Math.min(hf.cols-1,Math.max(0,Math.round(p.x/(step||3))));
      if(col>=0&&col<hf.cols){p.y+=(fillY+(hf.h[col]||0)-p.y)*dt*0.5*(0.4-p.depth);}
    }
    p.vx*=0.98;p.vy*=0.98;
    if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;
    if(p.y<fillY+5)p.y=fillY+5+Math.random()*15;
    if(p.y>H-5)p.y=H-5-Math.random()*15;
    p.glow=0.3+0.7*((Math.sin(waveT*p.glowSpeed+p.glowPhase)+1)/2);
  }
}
function scatterPlankton(tx,ty,radius){
  for(const p of _plankton){
    const dx=p.x-tx,dy=p.y-ty,d2=dx*dx+dy*dy;
    if(d2<radius*radius&&d2>0){
      const dist=Math.sqrt(d2),f=(1-dist/radius)*2.5;
      p.vx+=dx/dist*f;p.vy+=dy/dist*f;
      p.glow=Math.min(1,p.glow+0.4);
    }
  }
}
function drawPlankton(ctx,W,H,fillY,N,step,register){
  if(!_plankton.length)return;
  const regMul=register==='subtle'?0.2:1.0;
  const phase=ecoPhase();
  const pMul=phase==='dormant'?0.35:phase==='seed'?0.6:1.0;
  const nA=nightT();
  ctx.save();
  // Clip to water body
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]||fillY);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]||fillY);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.clip();
  ctx.globalCompositeOperation='lighter';
  const bR=Math.round(Math.max(0,80-nA*40+_ecoSeed.glowHue));
  const bG=Math.round(Math.max(0,Math.min(255,220-nA*60)));
  const bB=Math.round(Math.min(255,200+nA*40));
  for(const p of _plankton){
    const a=p.glow*regMul*pMul*(0.4+p.depth*0.4);
    if(a<0.015)continue;
    ctx.globalAlpha=Math.min(1,a*0.9);
    ctx.fillStyle=`rgb(${bR},${bG},${bB})`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    // Soft glow halo — vivid register, bright plankton only
    if(register==='vivid'&&a>0.35){
      const gr=p.r*(3+p.glow*3);
      ctx.globalAlpha=a*0.12;
      const rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,gr);
      rg.addColorStop(0,`rgb(${bR},${bG},${bB})`);
      rg.addColorStop(1,`rgba(${bR},${bG},${bB},0)`);
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(p.x,p.y,gr,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

// ── Organisms (rare procedural soft shapes) ─────────────────────────
function mkOrganism(W,H,fillY){
  const dpr=_bgDpr();
  const r=dpr*(6+Math.random()*10);
  const fromLeft=Math.random()<0.5;
  return{
    x:fromLeft?-r*3:W+r*3, y:fillY+(H-fillY)*(0.15+Math.random()*0.6),
    vx:(fromLeft?1:-1)*(0.15+Math.random()*0.25), vy:(Math.random()-0.5)*0.08,
    r, phase:Math.random()*Math.PI*2, phaseSpeed:0.3+Math.random()*0.4,
    glow:0, maxGlow:0.4+Math.random()*0.35,
    life:0, maxLife:18+Math.random()*22,
    tendrils:2+Math.floor(Math.random()*3),
  };
}
function stepOrganisms(dt,W,H,fillY){
  const reg=ecoRegister(),phase=ecoPhase();
  // Spawn: vivid register, bloom+ phase, max 2, ~once per 5 min
  if(reg==='vivid'&&(phase==='bloom'||phase==='mature')&&_organisms.length<2){
    if(Math.random()<0.003*dt*60)_organisms.push(mkOrganism(W,H,fillY));
  }
  for(let i=_organisms.length-1;i>=0;i--){
    const o=_organisms[i];
    o.life+=dt;
    if(o.life<2)o.glow=o.maxGlow*(o.life/2);
    else if(o.life>o.maxLife-3)o.glow=o.maxGlow*Math.max(0,(o.maxLife-o.life)/3);
    else o.glow=o.maxGlow;
    o.x+=o.vx*dt*15;
    o.y+=o.vy*dt*15+Math.sin(waveT*0.3+o.phase)*dt*3;
    o.phase+=o.phaseSpeed*dt;
    if(o.y<fillY+o.r)o.vy+=dt*0.5;
    if(o.y>H-o.r)o.vy-=dt*0.5;
    o.vy*=0.99;
    if(o.life>o.maxLife||o.x<-o.r*5||o.x>W+o.r*5)_organisms.splice(i,1);
  }
}
function drawOrganisms(ctx,W,H,fillY,N,step){
  if(!_organisms.length)return;
  const nA=nightT();
  const bR=Math.round(Math.max(0,60-nA*30+_ecoSeed.glowHue));
  const bG=Math.round(Math.max(0,Math.min(255,200-nA*50)));
  const bB=Math.round(Math.min(255,220+nA*30));
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]||fillY);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]||fillY);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.clip();
  ctx.globalCompositeOperation='lighter';
  for(const o of _organisms){
    if(o.glow<0.01)continue;
    const pulse=Math.sin(o.phase)*0.15;
    const bodyR=o.r*(0.85+pulse);
    // Outer glow
    ctx.globalAlpha=o.glow*0.4;
    const rg=ctx.createRadialGradient(o.x,o.y-bodyR*0.2,bodyR*0.1,o.x,o.y,bodyR*2.5);
    rg.addColorStop(0,`rgba(${bR},${bG},${bB},0.7)`);
    rg.addColorStop(0.3,`rgba(${bR},${bG},${bB},0.2)`);
    rg.addColorStop(1,`rgba(${bR},${bG},${bB},0)`);
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(o.x,o.y,bodyR*2.5,0,Math.PI*2);ctx.fill();
    // Body dome
    ctx.globalAlpha=o.glow*0.6;
    ctx.fillStyle=`rgba(${bR},${bG},${bB},0.35)`;
    ctx.beginPath();
    ctx.ellipse(o.x,o.y,bodyR*(0.9+pulse*0.5),bodyR*(0.6+pulse*0.3),0,Math.PI,0);
    ctx.fill();
    // Tendrils
    ctx.globalAlpha=o.glow*0.25;
    ctx.strokeStyle=`rgb(${bR},${bG},${bB})`;
    ctx.lineWidth=Math.max(0.5,o.r*0.07);
    for(let ti=0;ti<o.tendrils;ti++){
      const tx=o.x+(ti-(o.tendrils-1)/2)*bodyR*0.35;
      const tLen=bodyR*(1.2+Math.sin(o.phase+ti*0.8)*0.3);
      ctx.beginPath();ctx.moveTo(tx,o.y+bodyR*0.1);
      ctx.quadraticCurveTo(
        tx+Math.sin(o.phase*1.3+ti*0.9)*bodyR*0.3, o.y+tLen*0.6,
        tx+Math.sin(o.phase*0.7+ti*1.2)*bodyR*0.4, o.y+tLen);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Bioluminescent touch trails ─────────────────────────────────────
function addBioTrail(tx,ty){
  if(_workRunning())return;
  if(!S||!S.eco||S.eco.energy<3)return;
  _bioTrails.push({x:tx,y:ty,age:0,glow:1});
  if(_bioTrails.length>50)_bioTrails.shift();
}
function stepBioTrails(dt){
  for(let i=_bioTrails.length-1;i>=0;i--){
    const t=_bioTrails[i];
    t.age+=dt;t.glow=Math.max(0,1-t.age*0.6);
    if(t.glow<=0)_bioTrails.splice(i,1);
  }
}
function drawBioTrails(ctx,W,H,fillY,N,step){
  if(!_bioTrails.length)return;
  const nA=nightT();
  const bR=Math.round(Math.max(0,100-nA*50+_ecoSeed.glowHue));
  const bG=Math.round(Math.max(0,Math.min(255,235-nA*55)));
  const bB=Math.round(Math.min(255,215+nA*35));
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]||fillY);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]||fillY);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.clip();
  ctx.globalCompositeOperation='lighter';
  for(const t of _bioTrails){
    const r=12+t.glow*18;
    ctx.globalAlpha=t.glow*0.35;
    const rg=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,r);
    rg.addColorStop(0,`rgb(${bR},${bG},${bB})`);
    rg.addColorStop(1,`rgba(${bR},${bG},${bB},0)`);
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ── Main ecosystem render ───────────────────────────────────────────
function drawEcosystem(ctx,W,H,fillY,hf,step,N,dt){
  if(isBatterySaver())return;
  if(!S||!S.eco)return;
  const reg=ecoRegister();
  if(reg==='none')return;
  ensurePlankton(W,H,fillY);
  stepPlankton(dt,W,H,fillY,hf,step);
  stepOrganisms(dt,W,H,fillY);
  stepBioTrails(dt);
  drawPlankton(ctx,W,H,fillY,N,step,reg);
  drawOrganisms(ctx,W,H,fillY,N,step);
  drawBioTrails(ctx,W,H,fillY,N,step);
}


// ── BUBBLE SYSTEM ─────────────────────────────────────────────────────
function heatMultiplier(){const idx=HEAT_LEVELS.findIndex(h=>h===getHeatLevel());return 1+idx*0.12;}
// Session water personality — subliminal variation prevents hedonic adaptation (Schultz RPE, Bunzeck novelty)
const _waterSeed={
  nucleateWall:0.20+Math.random()*0.15,   // 20-35% wall nucleation (default was fixed 25%)
  speedMul:0.88+Math.random()*0.24,        // 0.88-1.12× speed
  sizeBias:0.9+Math.random()*0.2,          // 0.9-1.1× size
  wobbleFreq:2.8+Math.random()*1.4,        // 2.8-4.2 wobble Hz (default was fixed 3.5)
};
function tickBubbles(pool,W,H,fp,dt,color,isBg){
  const b2=(fp/100)*(fp/100);
  const fillY=H*(1-fp/100);
  const hm=heatMultiplier();
  const _nd=1-nightT()*0.4; // night damping: 60% energy at full night
  const fizzM=1+shakeF*4;
  // Anticipatory crescendo: +50% bubble rate in final 20% (Salimpoor — caudate anticipation)
  const _cresc=fp>80?1+0.5*Math.pow((fp-80)/20,2):1;
  const baseRate=((isBg?(fp<8?0:b2*120*hm):(fp<15?0:b2*18*hm))*fizzM+(shakeF>0&&fp>0.5?(isBg?shakeF*80:shakeF*12):0))*_cresc*_nd;
  const n=Math.floor(baseRate*dt+(Math.random()<(baseRate*dt%1)?1:0));
  for(let s=0;s<n;s++){
    // Nucleation-site spawning: bubbles form near bottom and edges
    // Start TINY, grow as they rise (simulated via r scaling with born time)
    const startR=isBg?(0.3+Math.random()*0.8):(0.3+Math.random()*0.6);
    // At high boil (b2>0.6) bubbles grow significantly larger and more visible
    const highBoilBonus=isBg?Math.max(0,b2-0.5)*8:0;
    const shakeBoost=shakeF>0?shakeF:0;
    const _sb=_waterSeed.sizeBias;
    const _crescR=(_cresc-1)*2; // 0→1 crescendo for radius boost
    const maxR  =((isBg?(2+b2*9*_sb+highBoilBonus+Math.random()*(b2*4*_sb+highBoilBonus*0.5)):(1.0+b2*3.0*_sb+Math.random()*(b2*2.0*_sb)))+(isBg?shakeBoost*4:shakeBoost*2))*(1+_crescR*0.25);
    const _sm=_waterSeed.speedMul;
    const speed=((isBg?(10+b2*140+Math.random()*(b2*80))
                      :(4+b2*35+Math.random()*(b2*20)))*_sm*_nd)*(1+shakeBoost*1.5);
    // Nucleation sites: mostly near walls and bottom — ratio varies per session
    const nucleateSide=Math.random()<_waterSeed.nucleateWall;
    const spawnX=nucleateSide
      ? (Math.random()<0.5 ? W*(0.02+Math.random()*0.08) : W*(0.90+Math.random()*0.08))
      : W*(0.08+Math.random()*0.84);
    // Spawn in bottom 40% of water column
    const waterDepth=Math.max(1,H-fillY);
    const spawnY=Math.min(H-2, fillY+waterDepth*0.60+Math.random()*waterDepth*0.38);
    pool.push({
      x:spawnX, y:spawnY,
      vy:-speed, vx:(Math.random()-.5)*(isBg?3:1.5),
      r:startR, maxR, // grow toward maxR as rises
      op:isBg?(0.5+b2*0.5+Math.random()*0.05):(0.55+b2*0.35+Math.random()*0.05),
      born:0, wobble:Math.random()*Math.PI*2
    });
  }
  for(let i=pool.length-1;i>=0;i--){
    const b=pool[i];
    b.born+=dt;
    // Accelerate near surface (pressure drops = bubble expands = rises faster)
    const distToSurface=Math.max(0.1,b.y-fillY);
    const pressureFactor=1+(H-b.y)/(H-fillY+1)*0.3; // faster near top
    b.vy*=0.998;
    b.y+=b.vy*dt*pressureFactor;
    b.x+=b.vx*dt+Math.sin(b.born*_waterSeed.wobbleFreq+b.wobble)*dt*(isBg?2:0.8);
    b.vx*=0.995;
    // Grow toward maxR as it rises (expansion due to decreasing pressure)
    if(b.r<b.maxR) b.r=Math.min(b.maxR, b.r+(b.maxR-b.r)*dt*1.5);
    if(b.y<=fillY||b.x<-b.r||b.x>W+b.r||b.born>10){
      // Surface pop: inject impulse into heightfield + spray particles
      if(b.y<=fillY&&isBg&&bgHF.cols>0){
        const col=Math.round(b.x/W*bgHF.cols);
        if(col>=0&&col<bgHF.cols)bgHF.v[col]-=b.r*0.35;
        if(b.r>2.5){
          const sprayCount=b.r>6?6:3;
          for(let k=0;k<sprayCount;k++){
            const a=-Math.PI*0.3+Math.random()*Math.PI*0.6-Math.PI/2;
            const sp=0.5+Math.random()*2;
            const p=new P(b.x,fillY,Math.cos(a)*sp,Math.sin(a)*sp,'rgba(255,255,255,0.35)',0.5+Math.random()*1.5,0.08);
            p.round=true;p.decay=0.04+Math.random()*0.02;parts.push(p);
          }
          startFX();
        }
      }
      pool.splice(i,1);
    }
  }
  // Merge nearby bubbles (bg only)
  if(isBg&&pool.length>1){
    for(let i=0;i<pool.length&&i<100;i++){
      for(let j=i+1;j<pool.length&&j<100;j++){
        const dx=pool[i].x-pool[j].x,dy=pool[i].y-pool[j].y;
        if(dx*dx+dy*dy<(pool[i].r+pool[j].r)*(pool[i].r+pool[j].r)*0.36){
          const big=pool[i].r>=pool[j].r?i:j,small=big===i?j:i;
          pool[big].r=Math.min(pool[big].maxR*1.3,Math.sqrt(pool[big].r*pool[big].r+pool[small].r*pool[small].r));
          pool[big].x=(pool[big].x+pool[small].x)/2;
          pool[big].y=(pool[big].y+pool[small].y)/2;
          pool.splice(small,1);if(small<=i)i--;j--;
        }
      }
    }
  }
  const cap=isBg?200:25;
  if(pool.length>cap)pool.splice(0,pool.length-cap);
}

// ── DRAW WATER ────────────────────────────────────────────────────────
// Design principles:
//   - ONE primary wave (smooth, readable, never spiky)
//   - ONE small ripple on top (adds texture, same direction)
//   - Tilt = LINEAR SLOPE (not phase shift, not offset — actual slope)
//   - Gradient anchored to actual wave min height
//   - Bubbles: bright, high-opacity, clearly visible glass spheres
function clr(v){return Math.max(0,Math.min(255,Math.round(v)));}
const _surf=new Float32Array(1024);

function drawWater(ctx,W,H,fp,colorHex,t,bubbles,isBg,hf){
  fp=Math.max(0,Math.min(fp,100));
  if(fp<1)return;

  const boil=(fp/100)*(fp/100);
  const fillY=H*(1-fp/100);
  // Anticipatory crescendo: quadratic ramp in final 20% (Salimpoor — caudate anticipation)
  const cresc=fp>80?Math.pow((fp-80)/20,2):0;

  // Sine wave params (used for pip canvas; bg uses heightfield)
  const A   = boil*7.0*(1+cresc*0.3);
  const Arip= boil*2.0*(1+cresc*0.3);
  const sp  = Math.min(0.25+boil*0.55, 0.80)*(1+cresc*0.15);
  const lam = W/1.4;
  const lamR= lam*0.5;
  const sprip= sp*2.0;

  let ri=parseInt(colorHex.slice(1,3),16);
  let gi=parseInt(colorHex.slice(3,5),16);
  let bi=parseInt(colorHex.slice(5,7),16);
  // Theme tint — shifts task color toward theme character
  const _theme=getTheme();
  if(_theme.waterTint&&isBg){
    ri=clr(ri+_theme.waterTint.r);gi=clr(gi+_theme.waterTint.g);bi=clr(bi+_theme.waterTint.b);
  }
  // Temperature color tint — task color stays the base, warmth intensifies with boil
  // Heat level amplifies the visual intensity
  const _hm=heatMultiplier();
  if(isBg){
    const warm=Math.max(0,(fp/100-0.25)/0.75)*_hm;
    ri=Math.min(255,Math.round(ri+warm*50));
    gi=Math.max(0,Math.round(gi-warm*15));
    bi=Math.max(0,Math.round(bi-warm*40));
  } else {
    ri=Math.min(255,Math.round(ri+boil*10*_hm));
    bi=Math.max(0,Math.round(bi-boil*6*_hm));
  }
  // Crescendo warmth: amber shift in final 20% (goal gradient — Kivetz)
  if(cresc>0){ri=clr(ri+cresc*25);gi=clr(gi-cresc*5);bi=clr(bi-cresc*20);}
  // Night cooling — moonlit water
  const _nt=nightT();
  if(_nt>0&&isBg){ri=Math.max(0,Math.round(ri-_nt*40));gi=Math.max(0,Math.round(gi-_nt*20));bi=Math.min(255,Math.round(bi+_nt*30));}

  // Build surface
  const step=isBg?Math.max(3,Math.ceil(W/1023)):1;
  const N=Math.min(Math.ceil(W/step)+1,1024);
  let minY=H;
  for(let i=0;i<N;i++){
    if(hf&&i<hf.cols){
      // Heightfield + smooth tilt layer (separate from physics, no jitter)
      const tOff=(tiltH&&i<tiltH.length)?tiltH[i]:0;
      _surf[i]=Math.max(2, Math.min(H-2, fillY+hf.h[i]+tOff));
    } else {
      // Sine waves for pip canvas
      const x=i*step;
      const wave=Math.sin(2*Math.PI*(x/lam - t*sp))*A;
      const rip =Math.sin(2*Math.PI*(x/lamR - t*sprip))*Arip;
      _surf[i]=Math.max(2, Math.min(H-2, fillY+wave+rip));
    }
    if(_surf[i]<minY)minY=_surf[i];
  }
  const gt=Math.max(0,minY-3);

  // ── Body gradient (light at surface, deep at bottom) ──────────────
  const _om=_theme.opacityMul||1.0;
  // Background water starts transparent, reaches full opacity near completion
  // Flowing mode: boost opacity so water is more visually prominent
  const _flowing=isBg&&S&&S.tasks&&S.tasks.some(t=>t.running&&!t.isRest);
  const _bp=isBg?(_flowing?0.55+0.45*(fp/100):0.35+0.65*(fp/100)):1;
  const g=ctx.createLinearGradient(0,gt,0,H);
  g.addColorStop(0,   `rgba(${clr(ri+70)},${clr(gi+70)},${clr(bi+70)},${Math.min(1,(isBg?0.32:0.95)*_om*_bp)})`);
  g.addColorStop(0.08,`rgba(${clr(ri+35)},${clr(gi+35)},${clr(bi+35)},${Math.min(1,(isBg?0.27:0.85)*_om*_bp)})`);
  g.addColorStop(0.4, `rgba(${ri},${gi},${bi},${Math.min(1,(isBg?0.22:0.78)*_om*_bp)})`);
  g.addColorStop(1,   `rgba(${clr(ri-25)},${clr(gi-25)},${clr(bi-25)},${Math.min(1,(isBg?0.28:0.82)*_om*_bp)})`);
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();

  // ── Subsurface shimmer (depth layer) ──────────────────────────────
  if(boil>0.08){
    ctx.save();
    ctx.globalAlpha=boil*0.22;
    ctx.beginPath();
    ctx.moveTo(0,_surf[0]+A*0.6);
    for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]+A*0.6);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=`rgb(${clr(ri+100)},${clr(gi+100)},${clr(bi+100)})`;
    ctx.fill();
    ctx.restore();
  }

  // ── Star reflections on water surface (night only) ────────────────
  if(isBg&&!isBatterySaver()){
    const _nA=nightT();
    if(_nA>0.15&&_stars.length){
      ctx.save();
      const dpr=window.devicePixelRatio||1;
      for(const s of _stars){
        if(s.y>=fillY)continue; // star must be above waterline
        const mirrorY=fillY+(fillY-s.y)*0.3; // compressed reflection
        if(mirrorY>H)continue;
        const tw=0.3+0.7*((Math.sin(waveT*s.speed+s.phase)+1)/2);
        // Wobble tied to surface heightfield
        const si=Math.min(N-1,Math.max(0,Math.round(s.x/step)));
        const surfOff=_surf?_surf[si]-fillY:0;
        const wx=s.x+surfOff*0.5; // horizontal wobble from waves
        const deepMul=s.isBright?1.5:1;
        ctx.globalAlpha=_nA*s.bright*tw*0.25*deepMul; // 25% of sky brightness
        ctx.fillStyle=s.isBright&&s===_stars[0]?'#ffe8c0':'#fff';
        // Elongated vertical reflection
        ctx.beginPath();
        ctx.ellipse(wx,mirrorY+surfOff,s.r*dpr*0.8,s.r*dpr*2.5,0,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── Surface highlight: the single most important line ─────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,_surf[0]);
  for(let i=1;i<N;i++)ctx.lineTo(Math.min(i*step,W),_surf[i]);
  const _cg=fp>80?Math.pow((fp-80)/20,2):0; // crescendo glow
  // Surface highlight warms from white to gold during crescendo
  const _hlG=Math.round(255-_cg*30),_hlB=Math.round(255-_cg*60);
  ctx.lineWidth=(isBg?2.0:1.3)*(1+_cg*0.5);
  ctx.strokeStyle=`rgba(255,${_hlG},${_hlB},${Math.min(1,(isBg?0.75:0.92)+_cg*0.15)})`;
  ctx.stroke();
  // Soft glow below line — heat level amplifies
  const glowMul=0.8+(_hm-1)*0.5;
  ctx.lineWidth=isBg?(8+boil*12*glowMul):(2.5+boil*3*glowMul);
  ctx.strokeStyle=`rgba(255,${_hlG},${_hlB},${isBg?Math.min(0.32,0.16*glowMul):Math.min(0.55,0.35*glowMul)})`;
  ctx.stroke();
  ctx.restore();

  // ── Surface foam at high boil (pip only) ─────────────────────────
  if(!isBg&&boil>0.3){
    ctx.save();
    const foamA=Math.min((boil-0.3)*1.5,0.7)*(1+cresc*0.4);
    ctx.globalAlpha=foamA;
    const _fc=_theme.foamColor||null;
    for(let i=0;i<N;i++){
      const x=i*step,sy=_surf[i];
      // Deterministic foam using sin hash — stable per frame, noisy across x
      const h=(Math.sin(x*127.1+t*2.1)*43758.5453)%1;
      if(Math.abs(h)>0.4-cresc*0.12){
        const fr=(0.4+Math.abs(h)*2.0)*(1+cresc*0.3);
        ctx.beginPath();
        ctx.arc(x,sy+Math.sin(x*0.8+t*3)*1.5,fr,0,Math.PI*2);
        ctx.fillStyle=_fc||`rgba(255,255,255,${0.45*foamA})`;
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // ── Bubbles: deformed glass spheres ─────────────────────────────────
  bubbles.forEach(b=>{
    if(b.r<0.2)return;
    const fade=Math.min(1,b.born*10)*Math.min(1,(5-b.born)*0.8);
    if(fade<=0)return;
    if(b.y<fillY-b.r)return;
    // Deformation: squash/stretch based on velocity
    const vyN=Math.min(Math.abs(b.vy||0)/80,0.5);
    const stretch=1+vyN*0.4;
    const squash=1/Math.sqrt(stretch);
    const boilAlpha=isBg?Math.max(0.4,fp/100):1.0;
    const a=b.op*fade*boilAlpha;
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.scale(squash,stretch);
    const rg=ctx.createRadialGradient(-b.r*0.35,-b.r*0.35,b.r*0.05,0,0,b.r);
    rg.addColorStop(0,  `rgba(255,255,255,${a})`);
    rg.addColorStop(0.25,`rgba(255,255,255,${a*0.35})`);
    rg.addColorStop(0.7, `rgba(255,255,255,${a*0.06})`);
    rg.addColorStop(1,   `rgba(255,255,255,${a*0.65})`);
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fillStyle=rg;ctx.fill();
    ctx.strokeStyle=`rgba(255,255,255,${a*0.5})`;
    ctx.lineWidth=0.6;
    ctx.stroke();
    ctx.restore();
  });
}
function drawContainerWalls(ctx,W,H){
  // Top: slightly darker (dry glass above waterline)
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,W,4);
  // Left edge
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.fillRect(0,0,3,H);
  // Right edge
  ctx.fillRect(W-3,0,3,H);
}

function updateSiteWave(t,pct){
  const bgc=document.getElementById('bg-canvas');
  if(!bgc)return;
  if(t&&t.running){
    bgWaveState.targetFill=pct;
    bgWaveState.targetColor=t.color;
    if(!bgWaveState.color)bgWaveState.color=bgWaveState.targetColor;
    bgWaveState.active=true;
    bgWaveState.ambient=false;
    bgc.classList.add('active');
    startWaveLoop();
  } else if(S.startTs&&S.date===today()){
    // Fall back to ambient water
    bgWaveState.ambient=true;
    bgWaveState.active=true;
    bgWaveState.targetFill=10;
    bgWaveState.targetColor='#a89e92';
    bgc.classList.add('active');
    startWaveLoop();
  } else {
    bgWaveState.active=false;
    bgWaveState.ambient=false;
    bgc.classList.remove('active');
  }
}

function onRestStart(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t)return;
  if(S.seen.rest){sisterMsg(sisterSays('restStart'),2500);}
  else seenToast('rest','☕ Rest. The next block starts after.','#2e9e6a',800);
  // Gentle descending chime — work done, relax now
  const now=ac().currentTime;
  [[0,880,.06],[.1,660,.055],[.22,523,.05],[.36,440,.04]].forEach(([dt,hz,v])=>tone(hz,.35,v,now+dt));
  // Soft "whoosh" noise for transition feel
  try{
    const c=ac(),buf=c.createBuffer(1,c.sampleRate*.3,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.8;
    const src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='lowpass';f.frequency.value=600;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(.04,now+.1);g.gain.exponentialRampToValueAtTime(.001,now+.4);
    src.start(now+.1);src.stop(now+.5);
  }catch(e){}
  haptic([0,30,60]);
  // Re-render card to show rest overlay, then flash green
  renderCard(t);
  updateAquariumBar();
  const el=document.getElementById('c-'+id);
  if(el){el.classList.add('rest-flash');setTimeout(()=>el.classList.remove('rest-flash'),850);}
}

function beginDay(){
  if(!_sensorsAttached)requestMotionPermission();
  S.startTs=Date.now();S.dayHours=24;
  S.bedtime=timeToDecimal(document.getElementById('begin-bed').value);
  _snapshotDay();
  save();
  document.getElementById('begin-screen').style.display='none';
  if(beginWaveRaf){cancelAnimationFrame(beginWaveRaf);beginWaveRaf=null;}
  renderDaybar();renderCards();updateLogoDot();updateScrollState();
  // "Start here" emphasis on first undone task (implementation intentions, d=0.99)
  const _firstUndone=S.tasks.filter(taskVisibleToday).find(t=>!t.done);
  if(_firstUndone){const _fe=document.getElementById('c-'+_firstUndone.id);if(_fe){_fe.scrollIntoView({behavior:'smooth',block:'nearest'});setTimeout(()=>_fe.classList.add('suggested'),150);}}
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  // Begin ceremony: flash + low G2 tone (98hz)
  const _fc=S.tasks.length?S.tasks[0].color:'#4a9eba';
  const flash=document.createElement('div');
  Object.assign(flash.style,{
    position:'fixed',inset:'0',background:_fc,
    opacity:'0',zIndex:'9999',pointerEvents:'none',
    transition:'opacity .1s ease'
  });
  document.body.appendChild(flash);
  requestAnimationFrame(()=>{
    flash.style.opacity='0.22';
    setTimeout(()=>{
      flash.style.opacity='0';
      setTimeout(()=>flash.remove(),200);
    },120);
  });
  try{tone(98,.55,.04);tone(98,.55,.02,ac().currentTime+.55);}catch(e){}
  haptic([30,40,80]);
}

function updateAquariumBar(){
  if(!S.aquariumOn)return;
  const t=S.tasks.find(x=>x.running&&!x.done);
  const an=document.getElementById('aq-name');
  const at=document.getElementById('aq-time');
  const ap=document.getElementById('aq-prog');
  if(!t){if(an)an.textContent='';if(at)at.textContent='';if(ap)ap.style.width='0%';return;}
  if(an)an.textContent=t.name;
  if(at)at.textContent=t.isRest?'':fmtTime(t.rem);

function importData(input){

// ── DRAG TO REORDER ────────────────────────────────────────────────
// Long-press (500ms) activates drag. Touch-based reorder for mobile.
let dragState=null; // {id, el, startY, cloneEl, origIdx}
const LONG_MS=480;

function attachDrag(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('touchstart',onDragTouchStart,{passive:true});
  });
}

function onDragTouchStart(e){
  const card=e.currentTarget;
  const id=card.id.replace('c-','');
  const touch=e.touches[0];
  const startX=touch.clientX, startY=touch.clientY;
  let fired=false;

  const longTimer=setTimeout(()=>{
    fired=true;
    cleanup();
    startDrag(id,card,{clientX:startX,clientY:startY});
  },LONG_MS);

  function onMove(ev){
    const t=ev.touches[0];
    const dx=t.clientX-startX, dy=t.clientY-startY;
    // Only cancel if finger moved >8px — allows natural hand tremor
    if(Math.sqrt(dx*dx+dy*dy)>8){clearTimeout(longTimer);cleanup();}
  }
  function onEnd(){clearTimeout(longTimer);cleanup();}
  function cleanup(){
    card.removeEventListener('touchmove',onMove);
    card.removeEventListener('touchend',onEnd);
  }
  card.addEventListener('touchmove',onMove,{passive:true});
  card.addEventListener('touchend',onEnd,{passive:true});
}

function startDrag(id,card,touch){
  haptic([30]);
  const scroll=document.getElementById('cards');
  scroll.classList.add('drag-active');
  const rect=card.getBoundingClientRect();

  // ghost clone
  const clone=card.cloneNode(true);
  clone.style.cssText=`
    position:fixed;left:${rect.left}px;top:${rect.top}px;
    width:${rect.width}px;height:${rect.height}px;
    z-index:500;pointer-events:none;opacity:.92;
    transform:scale(1.03) rotate(1.2deg);
    box-shadow:0 16px 48px rgba(0,0,0,.22);
    transition:none;border-radius:18px;
  `;
  document.body.appendChild(clone);
  card.classList.add('dragging');

  dragState={id,el:card,clone,startY:touch.clientY,offsetY:touch.clientY-rect.top,origIdx:taskIndex(id)};

  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd,{passive:true});
}

function taskIndex(id){return S.tasks.findIndex(t=>t.id===id);}

function cardAtY(y){
  const cards=[...document.querySelectorAll('.card:not(.dragging)')];
  for(const c of cards){
    const r=c.getBoundingClientRect();
    if(y>=r.top&&y<=r.bottom)return c.id.replace('c-','');
  }
  return null;
}

function onDragMove(e){
  if(!dragState)return;
  e.preventDefault();
  const touch=e.touches[0];
  const{clone,offsetY}=dragState;
  clone.style.top=(touch.clientY-offsetY)+'px';

  // highlight drop target
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));
  const overId=cardAtY(touch.clientY);
  if(overId&&overId!==dragState.id){
    document.getElementById('c-'+overId)?.classList.add('drag-over');
  }
}

function onDragEnd(e){
  if(!dragState)return;
  const touch=e.changedTouches[0];
  const overId=cardAtY(touch.clientY);

  // reorder in state
  if(overId&&overId!==dragState.id){
    const fromIdx=S.tasks.findIndex(t=>t.id===dragState.id);
    const toIdx=S.tasks.findIndex(t=>t.id===overId);
    if(fromIdx>-1&&toIdx>-1){
      const [moved]=S.tasks.splice(fromIdx,1);
      S.tasks.splice(toIdx,0,moved);
      save();
    }
  }

  // cleanup
  dragState.clone.remove();
  dragState.el.classList.remove('dragging');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));
  document.getElementById('cards').classList.remove('drag-active');
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  dragState=null;

  // re-render order without full re-render (just reorder DOM)
  renderCards();
}

// ── BEGIN SCREEN WATER ──────────────────────────────────────────────
let beginWaveRaf=null;
function animateBeginWater(){
  const cv=document.getElementById('begin-water');
  if(!cv||cv.offsetParent===null){beginWaveRaf=null;return;}
  applyNightTheme(); // keep night colors current on begin screen
  const nA=nightT();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const W=Math.round(cv.clientWidth*dpr);
  const H=Math.round(cv.clientHeight*dpr);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const c=cv.getContext('2d');
  c.clearRect(0,0,W,H);
  // Draw stars on begin screen at night
  if(nA>0.01){drawStars(c,W,H,performance.now()/1000,nA);}
  const t=performance.now()/1000;
  const fp=18;
  const fillY=H*(1-fp/100);
  const A=4.8,lam=W/1.6,spd=0.15;
  c.beginPath();
  c.moveTo(0,fillY+Math.sin(2*Math.PI*(-t*spd))*A);
  for(let x=1;x<=W;x+=2){
    const y=fillY+Math.sin(2*Math.PI*(x/lam-t*spd))*A+Math.sin(2*Math.PI*(x/(lam*0.5)-t*spd*2))*1.2;
    c.lineTo(x,y);
  }
  c.lineTo(W,H);c.lineTo(0,H);c.closePath();
  // Water color adapts to night — darker and cooler
  const wAlpha=0.22-nA*0.12;
  const wR=Math.round(74-nA*44),wG=Math.round(158-nA*108),wB=Math.round(186-nA*86);
  const g=c.createLinearGradient(0,fillY,0,H);
  g.addColorStop(0,`rgba(${wR},${wG},${wB},${wAlpha})`);
  g.addColorStop(1,`rgba(${wR},${wG},${wB},${wAlpha*0.3})`);
  c.fillStyle=g;c.fill();
  c.beginPath();
  c.moveTo(0,fillY+Math.sin(2*Math.PI*(-t*spd))*A);
  for(let x=1;x<=W;x+=2){
    const y=fillY+Math.sin(2*Math.PI*(x/lam-t*spd))*A+Math.sin(2*Math.PI*(x/(lam*0.5)-t*spd*2))*1.2;
    c.lineTo(x,y);
  }
  c.lineWidth=1.5;c.strokeStyle=`rgba(255,255,255,${0.45-nA*0.25})`;c.stroke();
  // Subtle bioluminescent life on begin screen
  if(S&&S.eco&&S.eco.energy>2&&!isBatterySaver()){
    const nDots=Math.min(10,Math.max(3,Math.floor((S.eco.energy||0)/6)));
    c.save();
    // Clip to water body
    c.beginPath();c.moveTo(0,fillY);c.lineTo(W,fillY);c.lineTo(W,H);c.lineTo(0,H);c.closePath();c.clip();
    c.globalCompositeOperation='lighter';
    const eR=Math.round(Math.max(0,80-nA*40)),eG=Math.round(Math.max(0,Math.min(255,220-nA*60))),eB=Math.round(Math.min(255,200+nA*40));
    for(let i=0;i<nDots;i++){
      const px=W*((Math.sin(t*0.08+i*2.39)+1)/2);
      const py=fillY+(H-fillY)*(0.08+0.84*((Math.cos(t*0.06+i*1.73)+1)/2));
      const gl=(Math.sin(t*(0.25+i*0.07)+i*1.1)+1)/2;
      c.globalAlpha=gl*0.18;
      c.fillStyle=`rgb(${eR},${eG},${eB})`;
      c.beginPath();c.arc(px,py,1.2*dpr,0,Math.PI*2);c.fill();
    }
    c.restore();
  }
  beginWaveRaf=requestAnimationFrame(animateBeginWater);
}
function checkBeginWater(){
  const bs=document.getElementById('begin-screen');
  if(bs&&bs.style.display!=='none'&&!beginWaveRaf)beginWaveRaf=requestAnimationFrame(animateBeginWater);
  if(bs&&bs.style.display==='none'&&beginWaveRaf){cancelAnimationFrame(beginWaveRaf);beginWaveRaf=null;}
}

// ── INIT ────────────────────────────────────────────────────────────
boot();
schedMidnight();
if(S.tasks.some(t=>t.running))ensureTicker();
render();
</script>
