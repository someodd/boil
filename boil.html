// ── DATA EXPORT/IMPORT ──────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`boil-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Backup saved','#3d3530',1500);
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data.tasks||!Array.isArray(data.tasks))throw new Error('invalid');
      openSheet(`<div class="sh-ttl">Restore backup?</div>
        <p style="font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:4px">This will replace all current data with the backup. ${data.tasks.length} task${data.tasks.length!==1?'s':''}, ${data.lifetimeCoins||0} coins.</p>
        <div class="sh-btns"><button class="bs" onclick="closeSheet()">Cancel</button><button class="bp" onclick="restoreBackup()">Restore</button></div>`);
      window._pendingRestore=data;
    }catch(e){showToast('Invalid backup file','#c0453a',2000);}
  };
  reader.readAsText(file);
  input.value='';
}
function restoreBackup(){
  if(!window._pendingRestore)return;
  S=window._pendingRestore;delete window._pendingRestore;
  save();boot();closeSheet();render();updateHeader(); // save() must come before boot() — boot() reads S from localStorage
  showToast('Data restored','#3d3530',1500);
}

  pomoOn=false;pickedCol=null;pickedEmoji=null;
  const presets=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
    <button class="preset-chip" data-label="focus" onclick="applyPreset('focus',1,25,5)" style="background:var(--brd);color:var(--mid);border:none;border-radius:100px;padding:6px 12px;font-size:11px;font-weight:800;font-family:var(--fs);cursor:pointer;letter-spacing:.04em">25m focus</button>
    <button class="preset-chip" data-label="deep" onclick="applyPreset('deep',1,50,10)" style="background:var(--brd);color:var(--mid);border:none;border-radius:100px;padding:6px 12px;font-size:11px;font-weight:800;font-family:var(--fs);cursor:pointer;letter-spacing:.04em">50m + 10m rest</button>
    <button class="preset-chip" data-label="long" onclick="applyPreset('long',1,90,0)" style="background:var(--brd);color:var(--mid);border:none;border-radius:100px;padding:6px 12px;font-size:11px;font-weight:800;font-family:var(--fs);cursor:pointer;letter-spacing:.04em">90m deep work</button>
  </div>`;
  openSheet(`<div class="sh-ttl">New block</div>${presets}${taskForm(null,simple)}<div class="sh-btns"><button class="bs" onclick="closeSheet()">Cancel</button><button class="bp" onclick="saveTask(null)">Add</button></div>`);
  if(simple)setTimeout(()=>applyPreset('focus',1,25,5),50);
  setTimeout(()=>document.getElementById('fn')?.focus(),80);
}
function openEdit(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;pickedCol=t.color;pickedEmoji=t.emoji;openSheet(`<div class="sh-ttl">Edit block</div>${taskForm(t)}<div class="sh-btns"><button class="bd" onclick="confirmDel('${id}')">Delete</button><button class="bs" onclick="closeSheet()">Cancel</button><button class="bp" onclick="saveTask('${id}')">Save</button></div>`);}

function confirmDel(id){
  const conf=document.createElement('div');conf.className='conf-ask';
  conf.innerHTML=`<p>Delete this block?</p><div class="sh-btns"><button class="bs" onclick="this.closest('.conf-ask').remove()">No</button><button class="bd" onclick="delTask('${id}')">Yes, delete</button></div>`;
  document.getElementById('sb').appendChild(conf);
}
function saveTask(id){
  const name=document.getElementById('fn').value.trim();
  const desc=document.getElementById('fdesc').value.trim();
  const total=parseInt(document.getElementById('ftot').value)||1;
  const workDur=parseInt(document.getElementById('fwork').value)*60||3600;
  const restDur=pomoOn?(parseInt(document.getElementById('frest').value)*60||600):0;
  const color=pickedCol||PAL[0];
  const days=getPickedDays();
  if(!name)return;
  if(id){
    const t=S.tasks.find(x=>x.id===id);
    if(t){t.name=name;t.desc=desc;t.color=color;t.emoji=pickedEmoji||t.emoji;t.days=days;t.total=total;t.continuous=contOn;if(t.workDur!==workDur||t.restDur!==restDur){t.workDur=workDur;t.restDur=restDur;resetTask(t);}if(t.completed>=t.total){t.completed=t.total;t.done=true;t.running=false;t.isRest=false;t.rem=0;t.savedAt=null;t._phaseStart=null;}else if(t.done){t.done=false;t.isRest=false;t.rem=t.workDur;}}
  } else {
    const nt=mkTask('t-'+Date.now(),name,color,total,workDur,restDur,days,desc,pickedEmoji);nt.continuous=contOn;S.tasks.push(nt);
  }
  pickedCol=null;pickedEmoji=null;save();closeSheet();render();
}
function delTask(id){if(S.lastActiveId===id)S.lastActiveId=null;S.tasks=S.tasks.filter(x=>x.id!==id);delete bubblePools[id];save();closeSheet();render();}

// ── FINISH DAY ──────────────────────────────────────────────────────
function openFinishDay(){
  // Compute stats
  const totalSubBlocks = S.tasks.reduce((a,t)=>a+t.total, 0);
  const completedSubBlocks = S.tasks.reduce((a,t)=>a+t.completed, 0);
  const completedTasks = S.tasks.filter(t=>t.done).length;
  const totalTasks = S.tasks.length;
  const wr = dayRem();
  const elapsed = dayEl();
  const fmtElapsed = fmtHM(elapsed);

  // Per-task breakdown — each task as a row of N pip dots, red=pending green=done.
  // All done → row goes solid green with a ✓.
  const taskRows = S.tasks.map(t=>{
    const tot=t.total||1;
    const comp=Math.min(t.completed||0,tot);
    const allDone=!!t.done||comp>=tot;
    const dots=allDone
      ?`<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#2e9e6a;border-radius:6px;color:#fff;font-weight:800;font-size:13px;padding:4px 0">✓</div>`
      :`<div style="flex:1;display:flex;gap:3px">${Array.from({length:tot},(_,k)=>`<div style="flex:1;height:10px;border-radius:3px;background:${k<comp?'#2e9e6a':'#c0453a'};box-shadow:0 1px 2px rgba(0,0,0,.15)"></div>`).join('')}</div>`;
    return `<div class="fin-task-row" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--brd)">
      <div class="fin-task-dot" style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
      <div class="fin-task-name" style="flex:0 0 90px;font-size:13px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${allDone?`<s style="text-decoration-color:${t.color}">${esc(t.name)}</s>`:esc(t.name)}</div>
      ${dots}
      <div style="font-size:11px;font-weight:700;color:var(--dim);font-variant-numeric:tabular-nums;min-width:30px;text-align:right">${comp}/${tot}</div>
    </div>`;
  }).join('');

  const _reflections=['Small things with great love.','You showed up. That\'s what matters.','The water remembers.','Every block was a gift.','Rest well.'];
  const _refl=_reflections[Math.floor(Math.random()*_reflections.length)];

  openSheet(`<div class="sh-ttl">today</div>
    <div style="text-align:center;font-style:italic;font-size:14px;font-weight:600;color:var(--mid);margin-bottom:20px;line-height:1.6">${_refl}</div>

    <div style="margin-bottom:10px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)">by block</div>
    <div style="background:var(--bg);border:1.5px solid var(--brd);border-radius:14px;padding:4px 14px;margin-bottom:20px">
      ${taskRows}
    </div>

    <div class="sh-btns">
      <button class="bs" onclick="closeSheet()">back</button>
    </div>
    <button onclick="closeSheet();askReset()" style="display:block;margin:16px auto 0;background:none;border:none;font-family:var(--fs);font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;padding:8px 0">reset blocks</button>`);

}
// ── SHEET ───────────────────────────────────────────────────────────
let _sheetOpenT=0;
function openSheet(h){document.getElementById('sb').innerHTML=h;document.getElementById('ov').classList.add('open');_sheetOpenT=Date.now();}
function closeSheet(){document.getElementById('ov').classList.remove('open');pickedCol=null;}
function ovClick(e){if(e.target.classList.contains('ov')&&Date.now()-_sheetOpenT>300)closeSheet();}


// ── DRAG TO REORDER ────────────────────────────────────────────────

// ── BEGIN SCREEN WATER ──────────────────────────────────────────────
let beginWaveRaf=null;
function animateBeginWater(){
  const cv=document.getElementById('begin-water');
  if(!cv||cv.offsetParent===null){beginWaveRaf=null;return;}
  applyNightTheme(); // keep night colors current on begin screen
  const nA=nightT();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const W=Math.round(cv.clientWidth*dpr);
  const H=Math.round(cv.clientHeight*dpr);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const c=cv.getContext('2d');
  c.clearRect(0,0,W,H);
  // Draw stars on begin screen at night
  if(nA>0.01){drawStars(c,W,H,performance.now()/1000,nA);}
  const t=performance.now()/1000;
  const fp=18;
  const fillY=H*(1-fp/100);
  const A=4.8,lam=W/1.6,spd=0.15;
  c.beginPath();
  c.moveTo(0,fillY+Math.sin(2*Math.PI*(-t*spd))*A);
  for(let x=1;x<=W;x+=2){
    const y=fillY+Math.sin(2*Math.PI*(x/lam-t*spd))*A+Math.sin(2*Math.PI*(x/(lam*0.5)-t*spd*2))*1.2;
    c.lineTo(x,y);
  }
  c.lineTo(W,H);c.lineTo(0,H);c.closePath();
  // Water color adapts to night — darker and cooler
  const wAlpha=0.22-nA*0.12;
  const wR=Math.round(74-nA*44),wG=Math.round(158-nA*108),wB=Math.round(186-nA*86);
  const g=c.createLinearGradient(0,fillY,0,H);
  g.addColorStop(0,`rgba(${wR},${wG},${wB},${wAlpha})`);
  g.addColorStop(1,`rgba(${wR},${wG},${wB},${wAlpha*0.3})`);
  c.fillStyle=g;c.fill();
  c.beginPath();
  c.moveTo(0,fillY+Math.sin(2*Math.PI*(-t*spd))*A);
  for(let x=1;x<=W;x+=2){
    const y=fillY+Math.sin(2*Math.PI*(x/lam-t*spd))*A+Math.sin(2*Math.PI*(x/(lam*0.5)-t*spd*2))*1.2;
    c.lineTo(x,y);
  }
  c.lineWidth=1.5;c.strokeStyle=`rgba(255,255,255,${0.45-nA*0.25})`;c.stroke();
  beginWaveRaf=requestAnimationFrame(animateBeginWater);
}
function checkBeginWater(){
  const bs=document.getElementById('begin-screen');
  if(bs&&bs.style.display!=='none'&&!beginWaveRaf)beginWaveRaf=requestAnimationFrame(animateBeginWater);
  if(bs&&bs.style.display==='none'&&beginWaveRaf){cancelAnimationFrame(beginWaveRaf);beginWaveRaf=null;}
}

// ── INIT ────────────────────────────────────────────────────────────
boot();
schedRollover();
if(S.tasks.some(t=>t.running))ensureTicker();
render();
