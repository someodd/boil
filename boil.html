<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f5f0e8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="boil">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f5f0e8'/><text y='.85em' font-size='75' text-anchor='middle' x='50'>🫧</text></svg>">
  <title>boil</title>
  <meta name="description" content="Time-blocking with heat. Focus blocks that boil as you work.">
  <meta property="og:title" content="boil">
  <meta property="og:description" content="Time-blocking with heat. Focus blocks that boil as you work.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="boil">
  <meta name="twitter:description" content="Time-blocking with heat. Focus blocks that boil as you work.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #f5f0e8;
      --card:  #faf8f4;
      --brd:   #e2dbd0;
      --text:  #1c1917;
      --mid:   #6b6258;
      --dim:   #a89e92;
      --dimmer:#d4cdc4;
      --ink:   #1c1917;
      --fs: 'Plus Jakarta Sans', system-ui, sans-serif;
      --fd: 'Syne', sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
    :focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:4px}
    html,body{height:100%;overscroll-behavior:none}
    body{background:var(--bg);color:var(--text);font-family:var(--fs);display:flex;flex-direction:column;height:100dvh;overflow:hidden;align-items:center}
    .app-wrap{width:100%;max-width:680px;display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative}

    /* ── HEADER ──────────────────────── */
    .hdr{
      padding:14px 16px 0;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;gap:8px;
    }
    /* Profile pill — sits between logo and streak */
    .profile-pill{
      display:flex;align-items:center;gap:5px;
      background:var(--card);border:1.5px solid var(--brd);
      padding:4px 10px 4px 6px;border-radius:100px;
      cursor:pointer;transition:all .14s;flex-shrink:0;
    }
    .profile-pill:hover{background:var(--brd)}
    .profile-pill:active{transform:scale(.93)}
    .profile-avatar{
      width:22px;height:22px;border-radius:50%;
      background:var(--tc,#c8841a);
      display:flex;align-items:center;justify-content:center;
      font-size:11px;line-height:1;flex-shrink:0;
      transition:background .5s;
    }
    .profile-heat{
      font-size:11px;font-weight:800;color:var(--ink);
      font-family:var(--fs);letter-spacing:.01em;
      white-space:nowrap;
    }

    /* Left: logo + streak badge */
    .hdr-left{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .logo{
      font-family:var(--fd);font-size:21px;font-weight:800;
      color:var(--ink);letter-spacing:-.03em;
      display:flex;align-items:center;gap:5px;
    }
    .logo-dot{
      width:10px;height:10px;border-radius:50%;background:#c8841a;
      transition:background .5s,transform .3s;flex-shrink:0;
    }
    .logo-dot.pulse{animation:dot-pop .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes dot-pop{0%{transform:scale(1)}50%{transform:scale(1.8)}100%{transform:scale(1)}}
    /* Streak badge — next to logo, disappears at streak=0 */
    .streak-badge{
      display:none;align-items:center;gap:3px;
      background:rgba(200,132,26,.12);
      color:#c8841a;
      font-size:12px;font-weight:800;font-family:var(--fs);
      padding:4px 9px;border-radius:100px;
      letter-spacing:.01em;
      cursor:default;
      flex-shrink:0;
    }
    .streak-badge.visible{display:flex}
    /* Right: action pills */
    .hdr-acts{display:flex;gap:5px;align-items:center}
    /* Coin pill — shows total coins, taps to shop */
    .coin-pill{
      display:flex;align-items:center;gap:4px;
      background:var(--card);border:1.5px solid var(--brd);
      color:var(--mid);
      font-size:12px;font-weight:800;font-family:var(--fs);
      padding:5px 10px 5px 8px;border-radius:100px;
      cursor:pointer;transition:all .14s;
      white-space:nowrap;
    }
    .coin-pill:hover{background:var(--brd);color:var(--ink)}
    .coin-pill:active{transform:scale(.94)}
    .coin-pill-icon{font-size:13px;line-height:1}
    .coin-pill-val{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
    /* Standard action pills */
    .pill{
      background:var(--card);border:1.5px solid var(--brd);
      color:var(--mid);font-size:12px;font-family:var(--fs);
      font-weight:700;padding:5px 13px;border-radius:100px;
      cursor:pointer;transition:all .14s;
    }
    .pill:hover{background:var(--brd);color:var(--ink)}
    .pill:active{background:var(--brd);color:var(--ink);transform:scale(.95)}

    /* ── TIMELINE ─────────────────────── */
    .daybar{margin:10px 13px 0;background:var(--card);border:1.5px solid var(--brd);border-radius:12px;padding:11px 14px 10px;flex-shrink:0}
    .db-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
    .db-stat{font-size:11px;font-weight:600;color:var(--dim)}
    .db-stat b{font-weight:800;font-size:15px;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
    .db-stat.go b{color:#2e9e6a}
    .db-stat.hi b{color:#c8841a}
    .db-stat.warn b{color:#c0453a}
    .db-track{height:18px;background:var(--bg);border-radius:7px;position:relative;overflow:hidden;margin-bottom:4px}
    .db-el{position:absolute;left:0;top:0;bottom:0;background:var(--dimmer);border-radius:7px 0 0 7px;transition:width 1s linear;z-index:1}
    .db-slack{position:absolute;top:0;bottom:0;background:#d4edda;z-index:2;transition:all .5s}
    .db-seg{position:absolute;top:0;bottom:0;transition:all .5s;z-index:3;opacity:.88}
    .db-hatch{position:absolute;right:0;top:0;bottom:0;z-index:4;background:linear-gradient(90deg,rgba(192,69,58,.4),rgba(220,80,40,.85));transition:width .5s;border-radius:0 7px 7px 0;animation:lava-pulse 1.8s ease-in-out infinite}
    @keyframes lava-pulse{0%,100%{opacity:1}50%{opacity:.65}}
    .db-now{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink);border-radius:2px;z-index:5;transform:translateX(-50%);box-shadow:0 0 4px rgba(28,25,23,.3)}
    .db-ticks{display:flex;justify-content:space-between}
    .db-tick{font-size:9px;font-weight:700;color:var(--dimmer);letter-spacing:.03em}

    /* ── SCROLL ────────────────────────── */
    .scroll{flex:1;overflow-y:auto;padding:8px 12px 88px;display:flex;flex-direction:column;gap:8px;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--brd) transparent;-webkit-overflow-scrolling:touch}

    /* dim inactive cards when something running */
    .scroll.has-running .card:not(.running):not(.resting):not(.done-all){
      opacity:.6;transform:scale(.985);filter:grayscale(12%);
      transition:opacity .35s,transform .35s,filter .35s;
    }

    /* ── CARD ──────────────────────────── */
    @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .scroll .card{animation:cardIn .28s ease both}
    .scroll .card:nth-child(2){animation-delay:.05s}
    .scroll .card:nth-child(3){animation-delay:.1s}
    .scroll .card:nth-child(4){animation-delay:.15s}
    .scroll .card:nth-child(n+5){animation-delay:.2s}

    .card{
      background:var(--card);border:2px solid var(--brd);border-radius:16px;
      overflow:hidden;cursor:pointer;position:relative;
      transition:transform .18s cubic-bezier(.34,1.2,.64,1),box-shadow .25s,border-color .25s,opacity .35s,filter .35s;
      user-select:none;-webkit-user-select:none;
    }
    @media(hover:hover){.card:hover:not(.running):not(.resting){box-shadow:0 4px 16px rgba(0,0,0,.09);transform:translateY(-1px)}}
    .card:active{transform:scale(.972)!important}
    .card.running,.card.resting{
      border-color:var(--tc);
      box-shadow:0 8px 32px rgba(0,0,0,.15),0 0 0 1px color-mix(in srgb,var(--tc) 20%,transparent);
      transform:translateY(-3px);
    }
    .card.done-all{border-style:dashed;border-color:var(--dimmer)}
    .card.warn{border-color:#f0c060}
    .card.danger{border-color:#f09090}
    .card.critical{border-color:#e05050;box-shadow:0 0 0 3px rgba(224,80,80,.2)!important}
    .card.critical .c-time-cur{color:#c0453a!important;animation:danger-pulse .45s ease-in-out infinite!important}

    /* top color bar */
    .c-bar{height:4px;background:var(--tc);width:100%}

    .c-body{padding:14px 15px 13px}

    .c-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .c-name{font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:-.025em;color:var(--ink);flex:1;margin-right:8px;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .c-edit{background:none;border:none;color:var(--dimmer);font-size:22px;line-height:1;cursor:pointer;padding:0 2px;transition:color .14s;flex-shrink:0}
    .c-edit:hover{color:var(--dim)}

    /* ── BLOCK SQUARES ────────────────── */
    /* Inline-styled in JS — these classes are visual-only */
    .pips{margin-bottom:12px}
    .pip{position:relative;overflow:hidden;transition:border-color .25s,transform .18s;border-radius:8px}
    .pip.done{background:var(--tc)}
    @keyframes pip-pop{
      0%{transform:scale(1)}
      45%{transform:scale(1.15)}
      72%{transform:scale(.95)}
      100%{transform:scale(1)}
    }
    .pip.done.popped{animation:pip-pop .38s cubic-bezier(.34,1.56,.64,1)}
    .pip.empty{background:transparent;border:2px solid var(--brd)}
    .pip.active{background:color-mix(in srgb,var(--tc) 5%,transparent);border:2px solid var(--tc)}
    .pip.rest-active{background:transparent;border:2px solid #2e9e6a}
    @keyframes active-glow{
      0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--tc) 30%,transparent)}
      50%{box-shadow:0 0 0 5px color-mix(in srgb,var(--tc) 12%,transparent)}
    }
    .pip.active{animation:active-glow 2.4s ease-in-out infinite}
    @keyframes rest-glow{
      0%,100%{box-shadow:0 0 0 0 rgba(46,158,106,.25)}
      50%{box-shadow:0 0 0 5px rgba(46,158,106,.1)}
    }
    .pip.rest-active{animation:rest-glow 2.4s ease-in-out infinite}

    /* .c-bottom/.timer removed — using .c-times now */

    /* play button with spring */
    .play-btn{
      width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      background:var(--tc);color:#fff;
      box-shadow:0 4px 14px rgba(0,0,0,.18);
      transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,background .2s;
    }
    .play-btn:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(0,0,0,.24)}
    .play-btn:active{transform:scale(.82)!important;transition:transform .1s ease!important}
    .card.resting .play-btn{background:#2e9e6a}
    .card.done-all .play-btn{background:var(--brd);color:var(--dimmer);box-shadow:none;cursor:default}
    .mercy-btn{
      width:40px;height:40px;border-radius:50%;border:2px solid var(--brd);cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      background:var(--card);font-size:16px;line-height:1;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
    }
    .mercy-btn:hover{transform:scale(1.08);box-shadow:0 3px 12px rgba(0,0,0,.14)}
    .mercy-btn:active{transform:scale(.85)!important}
    .day-picker{display:flex;gap:5px}
    .day-pill{
      width:32px;height:32px;border-radius:50%;border:2px solid var(--brd);
      background:transparent;color:var(--dim);font-size:11px;font-weight:800;
      font-family:var(--fs);cursor:pointer;transition:all .14s;
      display:flex;align-items:center;justify-content:center;
    }
    .day-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

    /* Progressive disclosure — hide complexity on early days */
    .app-wrap.day-0 .coin-pill,
    .app-wrap.day-0 .streak-badge,
    .app-wrap.day-0 .profile-pill,
    .app-wrap.day-0 .cont-row,
    .app-wrap.day-0 .pill-finish{display:none!important}
    .hdr.day-0 .coin-pill,
    .hdr.day-0 .streak-badge,
    .hdr.day-0 .profile-pill,
    .hdr.day-0 .pill-finish{display:none!important}
    .app-wrap.day-1 .streak-badge,
    .app-wrap.day-1 .profile-pill{display:none!important}
    .hdr.day-1 .streak-badge,
    .hdr.day-1 .profile-pill{display:none!important}
    .app-wrap.day-0 .daybar{display:none!important}

    /* idle invitation breathing */
    .scroll:not(.has-running) .card:not(.done-all) .play-btn{
      animation:invite 3.6s ease-in-out infinite;
    }
    @keyframes invite{
      0%,100%{box-shadow:0 4px 14px rgba(0,0,0,.18)}
      50%{box-shadow:0 4px 22px rgba(0,0,0,.28),0 0 0 8px color-mix(in srgb,var(--tc) 14%,transparent)}
    }

    /* progress bar */
    .prog-wrap{height:6px;background:var(--bg);border-radius:100px;overflow:hidden;margin-bottom:7px}
    .prog{height:100%;border-radius:100px;background:var(--tc);opacity:.6;transition:width 1s linear}
    .card.running .prog,.card.resting .prog{opacity:1}
    .card.resting .prog{background:#2e9e6a}

    .c-sub{font-size:11px;font-weight:600;color:var(--dim);letter-spacing:.01em;margin-top:6px;transition:opacity .3s}
    .card.running .c-sub,.card.resting .c-sub{opacity:0.35}

    /* ── DONE CARD: collapsed with strikethrough ── */
    .card.done-all{opacity:1;border-color:var(--brd);border-style:solid}
    .card.done-all .c-bar{opacity:.25}
    .card.done-all .c-body{padding:11px 14px}
    .done-row{display:flex;align-items:center;gap:10px}
    .done-name{
      font-family:var(--fd);font-size:17px;font-weight:800;
      letter-spacing:-.025em;color:var(--dim);
      text-decoration:line-through;
      text-decoration-color:var(--tc);
      text-decoration-thickness:2.5px;
      flex:1;
    }
    .done-count{
      font-size:11px;font-weight:700;color:var(--dimmer);
      font-family:var(--fs);letter-spacing:.02em;
    }
    .done-trophy{font-size:20px;line-height:1;flex-shrink:0}

    /* ── PIPS + TIMER OVERLAY ── */
    /* Wrap pips in a relative container so timer can float over */
    .pips-wrap{position:relative;margin-bottom:0}
    .pip-timer-overlay{
      position:absolute;
      left:0;bottom:0;
      /* sits on top of pip grid */
      background:rgba(245,240,232,.88);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      border-radius:8px;
      padding:4px 10px 5px;
      line-height:1;
      pointer-events:none;
    }
    .pto-cur{
      font-size:26px;font-weight:800;letter-spacing:-.04em;
      font-variant-numeric:tabular-nums;
      color:var(--mid);transition:color .25s;display:block;
    }
    .card.running  .pto-cur{color:var(--tc)}
    .card.resting  .pto-cur{color:#2e9e6a}
    .card.warn     .pto-cur{color:#c07820!important}
    .card.danger   .pto-cur{color:#c0453a!important}
    .card.critical .pto-cur{color:#c0453a!important;animation:danger-pulse .45s ease-in-out infinite}
    .pto-tot{
      font-size:11px;font-weight:700;letter-spacing:.01em;
      font-variant-numeric:tabular-nums;
      color:var(--dim);display:block;margin-top:1px;
    }

    /* ── TIMER ROW ─────────────────────── */
    /* Flat single-row: [BIG TIMER]...[total label / total val][play-btn] */
    .c-times{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:4px;
      margin-bottom:8px;
    }
    .c-time-cur{
      font-size:38px;font-weight:800;letter-spacing:-.04em;line-height:1;
      font-variant-numeric:tabular-nums;color:var(--mid);
      transition:color .25s;flex-shrink:0;
    }
    /* shrink timer when showing H:MM:SS (longer string) */
    .c-time-cur.has-hours{font-size:30px;letter-spacing:-.03em}
    .card.running  .c-time-cur{color:var(--tc)}
    .card.resting  .c-time-cur{color:#2e9e6a}
    .card.done-all .c-time-cur{color:var(--dimmer)}
    .card.warn     .c-time-cur{color:#c07820!important}
    .card.danger   .c-time-cur{color:#c0453a!important}
    /* urgency pulse on danger */
    @keyframes danger-pulse{0%,100%{opacity:1}50%{opacity:.55}}
    @keyframes tick-pulse{0%{transform:scale(1)}30%{transform:scale(1.04)}100%{transform:scale(1)}}
    .tick-pulse{animation:tick-pulse .18s ease}
    .card.danger .c-time-cur{animation:danger-pulse .7s ease-in-out infinite}
    .c-time-divider{
      font-size:13px;font-weight:700;color:var(--dimmer);flex-shrink:0;
    }
    .c-time-totblock{
      display:flex;flex-direction:column;gap:1px;flex-shrink:0;
    }
    .c-time-tot-label{
      font-size:8px;font-weight:800;letter-spacing:.1em;
      text-transform:uppercase;color:var(--dimmer);line-height:1;
    }
    .c-time-tot{
      font-size:15px;font-weight:800;letter-spacing:-.02em;
      font-variant-numeric:tabular-nums;color:var(--dim);line-height:1;
    }
    .c-times-spacer{flex:1}

    /* card flash animations */
    @keyframes blockPop{
      0%{transform:translateY(-2px) scale(1)}
      20%{transform:translateY(-10px) scale(1.04)}
      50%{transform:translateY(-6px) scale(1.02)}
      75%{transform:translateY(-8px) scale(1.03)}
      100%{transform:translateY(-2px) scale(1)}
    }
    .card.running.block-flash{animation:blockPop .55s cubic-bezier(.34,1.56,.64,1)}

    /* urgency vignette — red edge glow growing as time runs out */
    .card.danger::after{
      content:'';
      position:absolute;inset:0;pointer-events:none;
      box-shadow:inset 0 0 24px rgba(192,69,58,.22);
      border-radius:16px;
      animation:vignette-pulse .6s ease-in-out infinite;
    }
    @keyframes vignette-pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* screen flash overlay for sub-block done */
    @keyframes screenFlash{
      0%{opacity:0}12%{opacity:.45}100%{opacity:0}
    }
    .screen-flash{
      position:fixed;inset:0;pointer-events:none;z-index:997;
      animation:screenFlash .42s ease forwards;
      mix-blend-mode:multiply;
    }

    @keyframes allDoneFlash{
      0%{transform:translateY(-2px);background:var(--card)}
      25%{transform:translateY(-6px) scale(1.02);background:#e8faf2;border-color:var(--tc)}
      100%{transform:translateY(0);background:var(--card)}
    }
    .card.all-done-flash{animation:allDoneFlash .7s ease forwards;pointer-events:none}

    /* all-done day overlay */
    @keyframes dayDone{
      0%{opacity:0;transform:scale(.75)}
      20%{opacity:1;transform:scale(1.04)}
      75%{opacity:1;transform:scale(1)}
      100%{opacity:0;transform:scale(1.08)}
    }
    .day-done-msg{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      z-index:998;pointer-events:none;
    }
    .day-done-inner{
      font-family:var(--fd);font-size:46px;font-weight:800;color:var(--ink);
      text-align:center;line-height:1.2;letter-spacing:-.03em;
      text-shadow:0 2px 20px rgba(255,255,255,.9);
      animation:dayDone 3.8s ease forwards;
    }
    .day-done-sub{font-size:22px;opacity:.65;font-weight:700;display:block;margin-top:4px}

    /* custom scrollbar — visible but tasteful on desktop */
    .scroll::-webkit-scrollbar{width:4px}
    .scroll::-webkit-scrollbar-track{background:transparent}
    .scroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:100px}
    .scroll::-webkit-scrollbar-thumb:hover{background:var(--dimmer)}

    .empty{text-align:center;padding:60px 0;font-size:13px;font-weight:600;color:var(--dim);line-height:2.2;white-space:pre-line}

    /* ── DRAG TO REORDER ───────────────── */
    .card.dragging{
      opacity:.5;transform:scale(.97);
      box-shadow:none!important;
      border-style:dashed;
      transition:none;
      animation:none!important;
    }
    .card.drag-over{
      transform:translateY(-4px);
      border-color:var(--ink)!important;
      box-shadow:0 8px 28px rgba(0,0,0,.14)!important;
    }
    .scroll.drag-active{cursor:grabbing}

    /* ── FAB ───────────────────────────── */
    .fab{
      position:fixed;bottom:20px;right:16px;width:58px;height:58px;
      border-radius:50%;background:var(--ink);color:#fff;border:none;
      font-size:30px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 22px rgba(28,25,23,.28);
      transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
    }
    @media(min-width:680px){
      .fab{right:calc(50% - 340px + 16px)}
    }
    .fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(28,25,23,.36)}
    .fab:active{transform:scale(.86)!important;transition:transform .1s ease!important;box-shadow:0 2px 8px rgba(28,25,23,.2)}

    /* ── SHEET ─────────────────────────── */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;transition:background .25s;pointer-events:none}
    .ov.open{background:rgba(0,0,0,.42);pointer-events:all}
    .sheet{background:#fff;border:1.5px solid var(--brd);border-bottom:none;border-radius:22px 22px 0 0;padding:6px 16px 52px;width:100%;max-width:680px;margin:0 auto;max-height:90dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
    .ov.open .sheet{transform:translateY(0)}
    .sh-hnd{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:10px auto 18px}
    .sh-ttl{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:18px}

    /* form */
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
    .field input,.field select{width:100%;background:var(--bg);border:2px solid var(--brd);color:var(--ink);font-size:16px;font-weight:600;font-family:var(--fs);padding:11px 13px;border-radius:12px;outline:none;transition:border-color .14s;appearance:none;-webkit-appearance:none}
    .field input:focus,.field select:focus{border-color:var(--ink)}
    .tog-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:2px solid var(--brd);padding:11px 13px;border-radius:12px}
    .tog-lbl{font-size:15px;font-weight:600;color:var(--ink)}
    .tog-sub{font-size:11px;color:var(--dim);margin-top:1px}
    .tog{width:46px;height:26px;border-radius:100px;background:var(--brd);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
    .tog.on{background:var(--ink)}
    .tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .tog.on::after{transform:translateX(20px)}
    .cr{display:flex;gap:8px;flex-wrap:wrap}
    .sw{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .14s,border-color .14s}
    .sw.on{border-color:var(--ink);transform:scale(1.2)}
    .sh-btns{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
    .bp{flex:1;background:var(--ink);color:#fff;border:none;padding:14px;border-radius:12px;font-size:14px;font-family:var(--fs);font-weight:800;cursor:pointer;transition:opacity .12s}
    .bp:active{opacity:.8}
    .bs{flex:1;background:none;color:var(--mid);border:2px solid var(--brd);padding:14px;border-radius:12px;font-size:14px;font-family:var(--fs);font-weight:700;cursor:pointer}
    .bd{background:none;color:#c0453a;border:2px solid rgba(192,69,58,.25);padding:14px 16px;border-radius:12px;font-size:14px;font-family:var(--fs);font-weight:700;cursor:pointer}
    .conf-ask{background:#fff8f8;border:2px solid rgba(192,69,58,.2);border-radius:12px;padding:13px;margin-top:12px}
    .conf-ask p{font-size:13px;color:#c0453a;font-weight:700;margin-bottom:10px}
    .conf-ask .sh-btns{margin-top:0}

    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* ── BEGIN SCREEN ─────────────────── */
    .begin-screen{
      position:fixed;inset:0;z-index:900;
      background:var(--bg);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:clamp(16px,4vh,28px);padding:32px;
    }
    .begin-logo{
      font-family:var(--fd);font-size:42px;font-weight:800;
      color:var(--ink);letter-spacing:-.04em;
      animation:cardIn .5s ease both;
    }

    #begin-streak{
      font-family:var(--fd);font-size:22px;font-weight:800;
      letter-spacing:-.02em;color:var(--ink);
      text-align:center;min-height:30px;
    }
    .begin-sub{
      font-size:15px;font-weight:600;color:var(--dim);
      text-align:center;line-height:1.6;max-width:260px;
    }
    .begin-btn{
      background:var(--ink);color:#fff;border:none;
      font-family:var(--fd);font-size:20px;font-weight:800;
      letter-spacing:-.02em;
      padding:20px 40px;border-radius:100px;
      cursor:pointer;
      box-shadow:0 6px 28px rgba(28,25,23,.28);
      transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
    }
    .begin-btn:hover{transform:scale(1.03);box-shadow:0 8px 32px rgba(28,25,23,.38)}
    .begin-btn:active{transform:scale(.92)!important;transition:transform .1s ease!important}
    .quick-boil-btn{
      background:transparent;color:var(--dim);border:1.5px solid var(--brd);
      font-family:var(--fs);font-size:13px;font-weight:700;
      padding:10px 24px;border-radius:100px;cursor:pointer;
      transition:all .2s;margin-top:8px;
    }
    .quick-boil-btn:hover{background:var(--card);color:var(--ink)}
    .quick-boil-btn:active{transform:scale(.92)!important}
    .begin-hours{
      display:flex;align-items:center;gap:12px;
    }
    .begin-h-label{font-size:13px;font-weight:700;color:var(--dim)}
    .begin-h-input{
      width:72px;background:var(--card);border:2px solid var(--brd);
      color:var(--ink);font-size:22px;font-weight:800;font-family:var(--fd);
      padding:8px 10px;border-radius:12px;outline:none;text-align:center;
      transition:border-color .14s;
      /* hide native spinner on all browsers */
      -moz-appearance:textfield;appearance:textfield;
    }
    .begin-h-input::-webkit-outer-spin-button,
    .begin-h-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .begin-h-input:focus{border-color:var(--ink);outline:none}

    /* hide spinners on all number inputs */
    input[type=number]{-moz-appearance:textfield;appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

    /* ── PIP CANVAS WATER ─────────────────────────────────────── */
    .pip-canvas{
      position:absolute;inset:0;
      display:block;
      will-change:contents;
      border-radius:inherit;
    }


    /* ── REST MODE ─────────────────────────────────────────────────────── */
    @keyframes restPulse{
      0%{background:var(--card)}
      30%{background:#d4f0e4}

    /* Steam banner — shows during rest above cards */
    #steam-banner{
      text-align:center;padding:18px 16px 14px;

      transition:opacity .6s ease;
      position:relative;z-index:2;
    }
    #steam-banner .sb-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
    #steam-banner .sb-timer{font-size:42px;font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1.1}
    #steam-banner .sb-sub{font-size:11px;font-weight:600;font-family:var(--fs);color:var(--mid);margin-top:2px}

    /* Rest overlay inside pips-wrap — covers pips with a chill vibe */
    .rest-overlay{
      position:absolute;inset:0;
      background:linear-gradient(160deg,#e8faf2 0%,#d0f0e4 100%);
      border-radius:10px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:4px;
      z-index:2;
    }
    .rest-emoji{font-size:28px;line-height:1;animation:float 2.4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .rest-label{
      font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
      color:#2e9e6a;
    }
    .rest-timer-big{
      font-family:var(--fd);font-size:38px;font-weight:800;
      letter-spacing:-.04em;line-height:1;color:#2e9e6a;
      font-variant-numeric:tabular-nums;
    }
    .rest-bar-wrap{
      width:80%;height:5px;background:rgba(46,158,106,.15);
      border-radius:100px;overflow:hidden;margin-top:2px;
    }
    .rest-bar{
      height:100%;background:#2e9e6a;border-radius:100px;
      transition:width 1s linear;
    }

    /* ── SITE BACKGROUND CANVAS ────────────────────────────────────────── */
    #bg-canvas{
      position:fixed;left:0;top:0;right:0;bottom:0;width:100%;height:100%;max-width:none;
      pointer-events:none;z-index:-1;
      opacity:0;
      transition:opacity 1.4s ease;
      will-change:contents;
    }
    #bg-canvas.active{opacity:1}
    /* everything else sits above z-index:-1 naturally */

    /* ── AQUARIUM MODE ────────────────────── */
    .aquarium .scroll,.aquarium .fab,.aquarium .cont-row,.aquarium .daybar{display:none!important}
    .aquarium .hdr{justify-content:center}
    .aquarium .hdr-left,.aquarium .hdr-acts{display:none}
    .aquarium .aq-bar{display:flex!important}
    .aq-bar{
      display:none;align-items:center;gap:12px;
      padding:6px 16px;flex-shrink:0;width:100%;max-width:680px;
    }
    .aq-info{
      flex:1;display:flex;align-items:center;gap:10px;
    }
    .aq-name{
      font-family:var(--fd);font-size:15px;font-weight:800;
      letter-spacing:-.02em;color:var(--ink);opacity:.7;
    }
    .aq-time{
      font-size:22px;font-weight:800;letter-spacing:-.03em;
      font-variant-numeric:tabular-nums;color:var(--ink);opacity:.6;
    }
    .aq-prog{
      flex:1;height:4px;background:var(--brd);border-radius:100px;overflow:hidden;
    }
    .aq-prog-fill{height:100%;border-radius:100px;transition:width 1s linear}
    .aq-exit{
      background:none;border:1.5px solid var(--brd);color:var(--dim);
      font-size:10px;font-weight:800;font-family:var(--fs);
      letter-spacing:.06em;text-transform:uppercase;
      padding:5px 12px;border-radius:100px;cursor:pointer;
      transition:all .14s;flex-shrink:0;
    }
    .aq-exit:hover{background:var(--brd);color:var(--ink)}
    .aq-exit:active{transform:scale(.93)}

    /* ── CONTINUOUS TOGGLE ─────────────────── */
    .cont-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 14px 0;
      flex-shrink:0;
    }
    .cont-label{
      font-size:11px;font-weight:700;color:var(--dim);
      display:flex;align-items:center;gap:6px;letter-spacing:.02em;
    }
    .cont-label .cont-icon{font-size:14px}
    .cont-tog{
      width:40px;height:22px;border-radius:100px;
      background:var(--brd);border:none;cursor:pointer;
      position:relative;transition:background .2s;flex-shrink:0;
    }
    .cont-tog.on{background:#2e9e6a}
    .cont-tog::after{
      content:'';position:absolute;top:2px;left:2px;
      width:18px;height:18px;border-radius:50%;background:#fff;
      transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    .cont-tog.on::after{transform:translateX(18px)}

    /* ── FINISH DAY SHEET ─────────────────── */
    .fin-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:20px;
    }
    .fin-stat{
      background:var(--bg);border:1.5px solid var(--brd);
      border-radius:14px;padding:14px 14px 12px;
      display:flex;flex-direction:column;gap:4px;
    }
    .fin-stat.wide{grid-column:span 2}
    .fin-stat-icon{font-size:24px;line-height:1;margin-bottom:2px}
    .fin-stat-val{
      font-family:var(--fd);font-size:28px;font-weight:800;
      letter-spacing:-.03em;line-height:1;color:var(--ink);
    }
    .fin-stat-val.gold{color:#c8841a}
    .fin-stat-val.grn{color:#2e9e6a}
    .fin-stat-val.purple{color:#9b6bb5}
    .fin-stat-label{
      font-size:10px;font-weight:800;letter-spacing:.09em;
      text-transform:uppercase;color:var(--dim);
    }
    .fin-progress{
      background:var(--bg);border:1.5px solid var(--brd);
      border-radius:14px;padding:14px;margin-bottom:10px;
    }
    .fin-prog-label{
      display:flex;justify-content:space-between;align-items:baseline;
      margin-bottom:8px;
    }
    .fin-prog-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
    .fin-prog-pct{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--ink)}
    .fin-prog-track{height:10px;background:var(--brd);border-radius:100px;overflow:hidden}
    .fin-prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#c8841a,#2e9e6a);transition:width .6s cubic-bezier(.34,1.2,.64,1)}
    .fin-task-row{
      display:flex;align-items:center;gap:10px;
      padding:8px 0;border-bottom:1px solid var(--brd);
    }
    .fin-task-row:last-child{border-bottom:none}
    .fin-task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .fin-task-name{flex:1;font-size:14px;font-weight:700;color:var(--ink)}
    .fin-task-detail{font-size:12px;font-weight:600;color:var(--dim)}
    .fin-task-coins{font-size:14px}

    /* Tap ripple */
    .tap-ripple{
      position:fixed;pointer-events:none;z-index:997;
      width:0;height:0;border-radius:50%;
      border:1.8px solid rgba(28,25,23,0.16);
      transform:translate(-50%,-50%);
      animation:tap-ring .55s ease-out forwards;
    }
    .tap-ripple:nth-child(odd){animation-duration:.7s;border-color:rgba(28,25,23,0.11);}
    @keyframes tap-ring{
      0%{width:0;height:0;opacity:1}
      100%{width:100px;height:100px;opacity:0}
    }
  </style>
</head>
<body>

<script>
/*
 * boil — design manifesto
 *
 * warm, not cool. physical, not digital.
 * punishing, not forgiving. one metaphor, committed fully.
 * the water is the product. everything else is seasoning.
 * subtract before adding. if it doesn't serve heat, cut it.
 * no accounts. no sync. no analytics. no settings page.
 * one file. honest, portable, hackable.
 * copy should sound human, never like software.
 * every feature earns its place or gets boiled off.
 */

// ── PWA MANIFEST (inline via blob) ────────────────────────────────
(function(){
  try{
    const m={name:'boil',short_name:'boil',display:'standalone',
      background_color:'#f5f0e8',theme_color:'#f5f0e8',
      description:'Time-blocking with heat',
      icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🫧</text></svg>',sizes:'any',type:'image/svg+xml'}]};
    const blob=new Blob([JSON.stringify(m)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('link');
    link.rel='manifest';link.href=url;
    document.head.appendChild(link);
  }catch(e){}
})();
// ── CONSTANTS ──────────────────────────────────────────────────────
// Day window: min(dayHours, time until midnight from startTs)
function DAY_S(){
  const raw=(S?.dayHours??14)*3600;
  if(!S?.startTs)return raw;
  const start=new Date(S.startTs);
  const midnight=new Date(start);midnight.setHours(24,0,0,0);
  const secsToMid=Math.floor((midnight-start)/1000);
  return Math.min(raw,secsToMid);
}
function dayEl(){if(!S?.startTs)return 0;return Math.min(DAY_S(),Math.max(0,Math.floor((Date.now()-S.startTs)/1000)));}
function dayRem(){return Math.max(0,DAY_S()-dayEl());}
const PAL=['#c0453a','#d4782a','#b59a1a','#3a9e6a','#2a8a8a','#4a78c0','#5b5cd6','#9b6bb5','#c06090','#8a6548'];
const KEY='boil-v1'; // renamed from blocks-v7

// ── DATA MODEL ─────────────────────────────────────────────────────
function defaults(){
  const isFirstRun=!localStorage.getItem(KEY)&&!localStorage.getItem('blocks-v7');
  return{
    tasks:isFirstRun
      ?[mkTask('trial','Try it','#4a9eba',1,GOD_MODE?2*60:2*60,0)]
      :[mkTask('work','Work','#4a9eba',8,50*60,10*60),
        mkTask('chinese','Chinese','#c8841a',1,50*60,10*60),
        mkTask('life','Life','#9b6bb5',1,50*60,10*60)],
    date:today(),
    startTs:null,
    dayHours:14,
    continuous:false,
    streak:0,
    lastCompletedDate:'',
    bestScore:0,
    lifetimeCoins:0,
    stars:0,
    streakFreezes:0,
    badges:[],
    shopItems:{},
    mercyCoins:0,
    daysCompleted:isFirstRun?0:99,
    seen:{},
    isTrial:isFirstRun
  };
}
function mkTask(id,name,color,total,workDur,restDur,days){
  return{id,name,color,total,workDur,restDur,days:days||null,completed:0,isRest:false,rem:workDur,running:false,done:false,savedAt:null};
}

let S, ticker=null;
let GOD_MODE=false; // 1min=1sec, free shop, infinite currency
function godTick(){return GOD_MODE?60:1;}

// ── BOOT ───────────────────────────────────────────────────────────
function boot(){
  // Migrate from old key if needed
  try{
    if(!localStorage.getItem(KEY)&&localStorage.getItem('blocks-v7')){
      localStorage.setItem(KEY,localStorage.getItem('blocks-v7'));
    }
  }catch(e){}
  try{S=JSON.parse(localStorage.getItem(KEY))||defaults();}

  } else {

  }
  // Capture elapsed BEFORE save() overwrites savedAt
  const _reopenTask=S.tasks.find(t=>t.running&&t.savedAt);
  const _elapsedBeforeSave=_reopenTask?Math.floor((Date.now()-_reopenTask.savedAt)/60000):0;

function resetTask(t){t.completed=0;t.isRest=false;t.rem=t.workDur;t.running=false;t.done=false;t.savedAt=null;if(bubblePools[t.id])bubblePools[t.id]=[];delete window['_sf_'+t.id];}

function resolvePhaseEnd(t,animate){
  const cont=S.continuous;
  if(t.isRest){
    // Rest finished → next work block
    t.isRest=false;t.completed++;
    S.lifetimeCoins=(S.lifetimeCoins||0)+1; // accumulate in real-time
    if(t.completed>=t.total){t.done=true;t.running=false;t.savedAt=null;return true;}
    t.rem=t.workDur;
    if(cont){t.savedAt=animate?Date.now():null;}
    else{t.running=false;t.savedAt=null;}
  } else {
    if(t.restDur>0){
      // Work finished → rest phase (always auto-continue into rest)
      t.isRest=true;t.rem=t.restDur;
      if(animate)t.savedAt=Date.now();
    } else {
      // Work finished, no rest
      t.completed++;
      S.lifetimeCoins=(S.lifetimeCoins||0)+1; // accumulate in real-time
      if(t.completed>=t.total){t.done=true;t.running=false;t.savedAt=null;return true;}
      t.rem=t.workDur;
      if(cont){t.savedAt=animate?Date.now():null;}
      else{t.running=false;t.savedAt=null;}
    }
  }
  return false;
}

function skipRest(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t||!t.isRest||!t.running)return;
  t.rem=0;
  const allDone=resolvePhaseEnd(t,true);
  save();
  if(allDone){onTaskDone(id);}
  renderCard(t);updateHeader();
}
function reconcileTask(t,now){
  if(!t.running||t.done||!t.savedAt)return;
  let el=Math.floor((now-t.savedAt)/1000);
  while(el>0&&t.running&&!t.done){
    if(el>=t.rem){
      el-=t.rem;t.rem=0;
      const allDone=resolvePhaseEnd(t,false);
      if(allDone||!t.running)break;
    } else {
      t.rem-=el;el=0;
    }
  }
  if(t.running&&!t.done)t.savedAt=now;
  else t.savedAt=null;
}

let _erasing=false;
function save(){
  if(_erasing)return;
  const now=Date.now();
  S.tasks.forEach(t=>{if(t.running&&!t.done)t.savedAt=now;});
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}
}

function ensureTicker(){
  if(ticker)return;
  ticker=setInterval(()=>{
    // Date rollover guard (foreground past midnight)
    if(S.date!==today()){
      S.tasks.forEach(t=>{if(t.running){t.running=false;t.savedAt=null;}});
      stopAmbient();S.tasks.forEach(resetTask);S.date=today();S.startTs=null;
      delete S._daySnap; // day ended naturally — rewards earned
      clearInterval(ticker);ticker=null;bgBubbles.length=0;
      save();render();return;
    }
    let any=false;
    S.tasks.forEach(t=>{
      if(!t.running||t.done)return;
      any=true;t.rem=Math.max(0,t.rem-godTick());
      if(t.rem===0){
        const allDone=resolvePhaseEnd(t,true);
        save();
        if(allDone)onTaskDone(t.id);
        else if(!t.isRest)onSubBlockDone(t.id);
        else onRestStart(t.id);
        return;
      }
    });
    if(any){save();fastUpdateAll();}
    if(!S.tasks.some(t=>t.running)){clearInterval(ticker);ticker=null;}
  },1000);
}

// ── PROCEDURAL NOODLES ──────────────────────────────────────────────
// Noodles: spaghetti dropped in as a bundle — stiff sticks fanning from
// a grip point near the surface, many poking above the water. As they cook
// they soften and slink down into the water, eventually draping limp.
const _noodles=[];
function initNoodles(W,H,fillY){
  _noodles.length=0;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const count=22+Math.floor(Math.random()*6);
  // Bundle grip point — where your hand dropped them in
  // Slightly off-center for a natural look
  const gripX=W*(0.4+Math.random()*0.2);
  for(let i=0;i<count;i++){
    const len=(320+Math.random()*180)*dpr;
    // Fan angle: steep, mostly pointing UP from the bottom
    const spread=(i/count-0.5)*1.2; // -0.6 to +0.6
    const baseAngle=-Math.PI/2+spread; // straight up ± fan
    const angle=baseAngle+(Math.random()-0.5)*0.3; // individual jitter
    // Anchor x: clustered around the grip point with slight scatter
    const x=gripX+(Math.random()-0.5)*30*dpr;
    // bottomOff: small offset from the very bottom of the canvas
    const bottomOff=(Math.random()-0.5)*20*dpr;
    _noodles.push({
      x,bottomOff,len,
      initAngle:angle, // raw/rigid angle (steep, poking up from bottom)
      cookedAngle:-0.1+Math.random()*0.2, // target: mostly horizontal when cooked
      phase:Math.random()*Math.PI*2,
      drift:0.15+Math.random()*0.25,
      thick:(4.5+Math.random()*2.0)*dpr,
      bendCenter:0.3+Math.random()*0.4,
      cookOffset:Math.random()*0.18,
      bob:0.4+Math.random()*0.6,
      // Each strand settles to a different depth when fully cooked
      settleDepth:0.15+Math.random()*0.55,
      // Slight x drift as strand settles — they spread out
      settleX:W*(0.05+Math.random()*0.9),
    });
  }
}
function drawNoodles(ctx,W,H,fillY,boil,t){
  if(!_noodles.length)return;
  const rawCook=Math.min(boil*2.0,1.0);
  const waterDepth=H-fillY;
  ctx.save();
  ctx.lineCap='round';
  ctx.lineJoin='round';

  // Starchy water overlay — subtle milky tint that increases with cooking
  if(rawCook>0.1){
    ctx.save();
    ctx.globalAlpha=rawCook*0.08;
    ctx.fillStyle='rgb(245,240,230)';
    ctx.fillRect(0,fillY,W,H-fillY);
    ctx.restore();
  }

  _noodles.forEach(n=>{
    const cook=Math.max(0,Math.min(1,rawCook-n.cookOffset));
    // Ease function — fast initial slump, slow settle
    const ease=1-Math.pow(1-cook,2.5);

    // Anchor point transitions from bottom cluster to spread-out floating position
    const nx=n.x+(n.settleX-n.x)*ease+Math.sin(t*0.3+n.phase)*n.drift*25*cook;
    // Rigid: sits on the bottom. Cooked: floats up to settle in the water column.
    const bottomY=H-8+n.bottomOff;
    const floatY=fillY+waterDepth*n.settleDepth;
    const ny=bottomY+(floatY-bottomY)*ease+Math.sin(t*0.2*n.bob+n.phase*1.3)*8*cook;

    // Angle: steep (poking up) at raw → horizontal when cooked
    const angle=n.initAngle+(n.cookedAngle-n.initAngle)*ease;

    // Length above water shrinks as they cook (slink into the pot)
    // At raw: most of the strand is above water. At cooked: fully submerged.
    const segs=14;
    const segLen=n.len/segs;
    const pts=[];
    for(let s=0;s<=segs;s++){
      const frac=s/segs;
      // Baseline: straight rigid stick from anchor at current angle
      const bx=nx+Math.cos(angle)*segLen*s;
      const by=ny+Math.sin(angle)*segLen*s;

      // Softening bend — only develops as strand cooks
      const maxBend=n.len*0.10;
      const bendAmp=cook*cook*maxBend;
      const bend=bendAmp*Math.sin((frac-n.bendCenter)*Math.PI*1.3+n.phase*0.3);

      // Gravity: pulls tips downward. Stronger at the far end of the strand.
      // At low cook: stiff, gravity barely affects. At high cook: tips droop heavily.
      const gravityPull=cook*cook*n.len*0.12*frac*frac;

      // Subtle secondary wave at high cook
      const secondary=cook>0.5?(cook-0.5)*n.len*0.012*Math.sin(frac*Math.PI*2.3+t*0.15+n.phase):0;

      const px=-Math.sin(angle);
      const py=Math.cos(angle);
      pts.push({
        x:bx+px*(bend+secondary),
        y:by+py*(bend+secondary)+gravityPull
      });
    }
    // At low cook: allow points above fillY (sticking out of water)
    // At high cook: clamp into water column
    const minY=fillY*(1-Math.max(0,1-cook*1.5))+0; // at cook=0: allow y=0; at cook>0.67: clamp to fillY
    const clampTop=cook<0.67?0:fillY+4;
    pts.forEach(p=>{p.y=Math.max(clampTop,Math.min(H-6,p.y));});

    // Draw smooth curve
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let s=1;s<pts.length-1;s++){
      const cx=(pts[s].x+pts[s+1].x)/2;
      const cy=(pts[s].y+pts[s+1].y)/2;
      ctx.quadraticCurveTo(pts[s].x,pts[s].y,cx,cy);
    }
    ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);

    // Color: raw semolina → cooked pale wheat
    const r=Math.round(224+cook*13);
    const g=Math.round(204+cook*20);
    const b=Math.round(144+cook*28);
    const alpha=0.65+cook*0.10;
    ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth=n.thick*(1+cook*0.15);
    ctx.stroke();

    // Subtle highlight
    ctx.strokeStyle=`rgba(250,243,220,${0.10+cook*0.06})`;
    ctx.lineWidth=n.thick*0.25;
    ctx.stroke();
  });
  ctx.restore();
}

// ── AUDIO ──────────────────────────────────────────────────────────
let aC;
function ac(){
  if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();
  // Resume suspended context (mobile browsers suspend until user gesture)
  if(aC.state==='suspended')aC.resume().catch(()=>{});
  return aC;
}
// Pre-warm AudioContext on first touch
document.addEventListener('touchstart',function _aw(){
  try{ac();}catch(e){}
  document.removeEventListener('touchstart',_aw);
},{once:true,passive:true});
function tone(hz,dur,vol,t0,type='sine'){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=hz;
    const t=t0??c.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur+.01);
  }catch(e){}
}
const sndTap   =()=>{tone(720,.065,.022);haptic([8]);};
// Water surface tap — hollow plop with pitch scaled by force
function sndPlop(force){
  try{
    const c=ac(),now=c.currentTime;
    const f=Math.min(Math.abs(force||25),50);
    const hz=180+f*3; // harder tap = higher pitch
    const vol=0.015+f*0.0006;
    // body: short sine drop
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(hz,now);
    o.frequency.exponentialRampToValueAtTime(hz*0.4,now+0.12);
    g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    o.connect(g);g.connect(c.destination);o.start(now);o.stop(now+0.16);
    // click: tiny triangle transient
    const o2=c.createOscillator(),g2=c.createGain();
    o2.type='triangle';o2.frequency.value=hz*2.2;
    g2.gain.setValueAtTime(vol*0.5,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.03);
    o2.connect(g2);g2.connect(c.destination);o2.start(now);o2.stop(now+0.04);
  }catch(e){}
}
// Ambient focus drone — very faint 40hz sine while block runs
let _ambOsc=null,_ambGain=null;
function startAmbient(){
  try{
    if(_ambOsc)return;
    const c=ac();
    _ambOsc=c.createOscillator();_ambGain=c.createGain();
    _ambOsc.type='sine';_ambOsc.frequency.value=40;
    _ambGain.gain.setValueAtTime(0,c.currentTime);
    _ambGain.gain.linearRampToValueAtTime(0.008,c.currentTime+2);
    _ambOsc.connect(_ambGain);_ambGain.connect(c.destination);
    _ambOsc.start();
  }catch(e){}
}
function stopAmbient(){
  try{
    if(!_ambOsc)return;
    const c=ac();
    _ambGain.gain.linearRampToValueAtTime(0,c.currentTime+1.5);
    const o=_ambOsc;setTimeout(()=>{try{o.stop();}catch(e){}},1600);
    _ambOsc=null;_ambGain=null;
  }catch(e){}
}
const sndStop  =()=>{tone(460,.07,.018);haptic([5]);};
// Sub-block done: glass break SFX
function sndSub(){
  const now=ac().currentTime;
  // punchy attack transient then ascending chime
  tone(1760,.04,.05,now,'square'); // sharp click at start
  [[0,880,.065],[.06,1108,.06],[.13,1318,.055],[.21,1760,.05],[.32,2093,.045]].forEach(([dt,hz,v])=>tone(hz,.35,v,now+dt));
  // glass shatter: descending noise sweep
  try{
    const c=ac();
    // two noise bursts at different frequencies = glass crack character
    [1,2].forEach(pass=>{
      const buf=c.createBuffer(1,c.sampleRate*.18,c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/(d.length));
      const src=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();
      f.type='highpass';f.frequency.value=pass===1?3000:6000;
      src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);
      const t0=now+(pass-1)*.04;
      g.gain.setValueAtTime(.06,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.18);
      src.start(t0);src.stop(t0+.2);
    });
    // low thud
    tone(80,.25,.06,now);tone(60,.3,.04,now+.05);
  }catch(e){}
  haptic([15,80,15]);
}

// ── PARTICLES ──────────────────────────────────────────────────────
const FX=document.getElementById('fx');
const ctx=FX.getContext('2d');
let parts=[];
let fxRaf=null;

function resizeFX(){FX.width=window.innerWidth;FX.height=window.innerHeight;}
window.addEventListener('resize',resizeFX);resizeFX();

class P {
  constructor(x,y,vx,vy,col,sz,grav=0.28,bouncy=false){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.col=col;this.sz=sz;
    this.rot=Math.random()*Math.PI*2;
    this.rotv=(Math.random()-.5)*.18;
    this.life=1;this.grav=grav;this.bouncy=bouncy;
    this.damp=.62;
    this.decay=bouncy?(.003+Math.random()*.002):(.011+Math.random()*.009);
  }
  tick(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=this.grav;this.vx*=.99;
    this.rot+=this.rotv;
    if(this.bouncy){
      if(this.x<this.sz/2){this.x=this.sz/2;this.vx*=-this.damp;this.rotv*=-.9;}
      if(this.x>FX.width-this.sz/2){this.x=FX.width-this.sz/2;this.vx*=-this.damp;this.rotv*=-.9;}
      if(this.y>FX.height-this.sz/2){
        this.y=FX.height-this.sz/2;
        this.vy*=-this.damp;
        this.vx*=.95;
        this.rotv*=.8;
        if(Math.abs(this.vy)<.8)this.vy=0;
      }
    }
    this.life-=this.decay;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life);
    ctx.translate(this.x,this.y);
    if(this.emoji){
      ctx.rotate(this.rot);
      ctx.font=`${Math.round(this.sz)}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.emoji,0,0);
    } else if(this.round){
      ctx.fillStyle=this.col;
      ctx.beginPath();ctx.arc(0,0,this.sz/2,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=this.col;
      ctx.rotate(this.rot);
      ctx.fillRect(-this.sz/2,-this.sz/2,this.sz,this.sz);
    }
    ctx.restore();
  }
}

function fxStep(){
  ctx.clearRect(0,0,FX.width,FX.height);
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{p.tick();p.draw();});
  fxRaf=parts.length>0?requestAnimationFrame(fxStep):null;
  if(!parts.length)ctx.clearRect(0,0,FX.width,FX.height);
}
function startFX(){if(!fxRaf)fxRaf=requestAnimationFrame(fxStep);}

// helpers
function lc(hex,a=40){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;}
const CPAL=['#f5c842','#e05898','#42a8e0','#68d090','#e06840','#9b6bb5','#4a9eba','#c8841a'];

// Burst from point — used for sub-block done
function burstAt(x,y,col,n=20){
  const cols=['#fff',col,lc(col,60),lc(col,-30),'#fffbe8'];
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+(Math.random()-.5)*.6;
    const sp=3+Math.random()*8;
    parts.push(new P(
      x+(Math.random()-.5)*16,y+(Math.random()-.5)*16,
      Math.cos(a)*sp,Math.sin(a)*sp-3,
      cols[Math.floor(Math.random()*cols.length)],
      3+Math.random()*6));
  }
  startFX();
}

// Shatter: sharp angular shards flying outward (glass break)
function shatterAt(x,y,col,n=28){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+(Math.random()-.5)*.4;
    const sp=4+Math.random()*14;
    const sz=2+Math.random()*9;
    const p=new P(x+(Math.random()-.5)*10,y+(Math.random()-.5)*10,
      Math.cos(a)*sp,Math.sin(a)*sp-4,
      Math.random()<.45?'#fff':Math.random()<.5?col:'rgba(255,255,255,.7)',sz,.32);
    p.decay=.008+Math.random()*.012;
    p.rotv=(Math.random()-.5)*.45;
    parts.push(p);
  }
  startFX();
}

// Big shockwave ring of squares expanding from point
function shockwave(x,y,col,n=32){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n;
    const sp=6+Math.random()*5;
    const p=new P(x,y,Math.cos(a)*sp,Math.sin(a)*sp,
      Math.random()<.5?col:Math.random()<.5?'#fff':lc(col,70),
      4+Math.random()*5);
    p.decay=.016+Math.random()*.008;
    parts.push(p);
  }
  startFX();
}

// Streak of squares shooting upward from point (like sparks)
function sparks(x,y,col,n=18){
  for(let i=0;i<n;i++){
    const spread=(Math.random()-.5)*4;
    const sp=5+Math.random()*12;
    const p=new P(x+(Math.random()-.5)*20,y,spread,-sp,
      Math.random()<.4?'#fff':Math.random()<.5?col:lc(col,60),
      2+Math.random()*4,.32);
    p.decay=.012+Math.random()*.01;
    parts.push(p);
  }
  startFX();
}

// confetti rain from top (full task done)
function rainConfetti(col,n=80){
  const cols=[col,...CPAL];
  for(let i=0;i<n;i++){
    const p=new P(
      Math.random()*FX.width,-15-Math.random()*80,
      (Math.random()-.5)*3.5,1.8+Math.random()*4,
      cols[Math.floor(Math.random()*cols.length)],
      5+Math.random()*7);
    p.decay=.005+Math.random()*.004;
    p.life=.85+Math.random()*.15;
    parts.push(p);
  }
  // Noodle theme: toss pasta emojis with the confetti
  if(getTheme().noodles){
    const pastas=['🍝','🍜','🍝','🍜','🍝','🍜'];
    for(let i=0;i<Math.round(n/6);i++){
      const p=new P(
        Math.random()*FX.width,-20-Math.random()*60,
        (Math.random()-.5)*2.5,1.2+Math.random()*3,
        'rgba(0,0,0,0)',14+Math.random()*10);
      p.emoji=pastas[Math.floor(Math.random()*pastas.length)];
      p.decay=.004+Math.random()*.003;
      p.life=.9+Math.random()*.1;
      parts.push(p);
    }
  }
  startFX();
}

// Solitaire bouncing squares: all tasks done!
function launchSolitaire(){
  const cols=[...PAL,...CPAL];
  for(let i=0;i<55;i++){
    const x=FX.width*.2+Math.random()*FX.width*.6;
    const y=FX.height*.3+Math.random()*FX.height*.25;
    const a=Math.random()*Math.PI*2;
    const sp=5+Math.random()*9;
    const p=new P(x,y,Math.cos(a)*sp,Math.sin(a)*sp-8,
      cols[Math.floor(Math.random()*cols.length)],
      16+Math.random()*14,.38,true);
    p.decay=.003;
    parts.push(p);
  }
  startFX();
}

// ── INTERACTIONS ───────────────────────────────────────────────────
function tapCard(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t||t.done)return;
  const wasRunning=t.running;
  // single-block rule: pause anything else
  S.tasks.forEach(o=>{
    if(o.id!==id&&o.running){o.running=false;o.savedAt=null;renderCard(o);}
  });
  t.running=!wasRunning;
  if(t.running){t.savedAt=Date.now();sndTap();startAmbient();ensureTicker();showToast('Heating up. ↑','var(--tc)',1200);if(!_sensorsAttached)requestMotionPermission();}
  else{t.savedAt=null;sndStop();stopAmbient();showToast('The water cools.','#6b6258',1800);}
  save();renderCard(t);renderDaybar();updateLogoDot();
  updateScrollState();
}

function useMercy(id){
  if(!S.mercyCoins||S.mercyCoins<1)return;
  const t=S.tasks.find(x=>x.id===id);
  if(!t||!t.running||t.done)return;
  S.mercyCoins--;
  t.rem=0;
  const allDone=resolvePhaseEnd(t,true);
  save();
  if(allDone)onTaskDone(t.id);
  else if(!t.isRest)onSubBlockDone(t.id);
  else{renderCard(t);renderDaybar();}
  showToast('🕊️ Mercy granted.','#6b6258',1800);
  haptic([15,30,60]);
}

function notify(title,body){
  if('Notification' in window&&Notification.permission==='granted'&&document.hidden){
    try{new Notification(title,{body,icon:'',silent:true});}catch(e){}
  }
}
function onSubBlockDone(id){
  if(S.aquariumOn){S.aquariumOn=false;save();applyAquarium();}
  sndSub();
  const t=S.tasks.find(x=>x.id===id);
  if(t){
    const blocksLeft2=t.total-t.completed-1;
    if(blocksLeft2>0)notify(`${t.name} block done ✓`,`${blocksLeft2} block${blocksLeft2!==1?'s':''} left`);
    else notify(`${t.name} — last block done!`,'Task completing…');
    // Contextual one-liners
    seenToast('coin','🪙 You earned a coin. One per block.','#c8841a',1200);
  }
  const el=document.getElementById('c-'+id);
  if(!el){renderCards();return;}

  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height*.4;

  // 1. Shatter shards — glass breaking outward
  shatterAt(cx,cy,t.color,32);
  // 2. Big radial burst behind shards
  burstAt(cx,cy,t.color,55);
  // 3. Shockwave ring
  shockwave(cx,cy,t.color,40);
  // 4. Sparks up
  sparks(cx,cy,t.color,28);
  // 5. Second delayed burst for linger
  setTimeout(()=>burstAt(cx,cy+10,t.color,30),180);

  // 4. Screen flash — brighter, double pulse
  [0,220].forEach(delay=>{
    setTimeout(()=>{
      const flash=document.createElement('div');
      flash.className='screen-flash';
      flash.style.background=t.color;
      document.body.appendChild(flash);
      setTimeout(()=>flash.remove(),380);
    },delay);
  });

  // 5. Card bounce
  el.classList.add('block-flash');

  // 6. Find the pip that just completed — coin flip animation
  // (pip already re-rendered with coin emoji by resolvePhaseEnd → renderCard)
  const pips=el.querySelectorAll('.pip.done');
  const lastPip=pips[pips.length-1];
  if(lastPip){lastPip.classList.add('popped');setTimeout(()=>lastPip.classList.remove('popped'),400);}

  setTimeout(()=>{
    el.classList.remove('block-flash');
    renderCard(t);renderDaybar();updateLogoDot();
  },720);
}

function onTaskDone(id){
  if(S.aquariumOn){S.aquariumOn=false;save();applyAquarium();}
  stopAmbient();sndTask();
  const _td=S.tasks.find(x=>x.id===id);
  if(_td){
    notify(`${_td.name} complete! ⭐`,'All blocks done. What\'s next?');
    S.stars=(S.stars||0)+1;save();updateHeader();
    const _dc=getTheme().doneCopy;

const HEAT_LEVELS=[[0,"🌡️","Cold"],[10,"☁️","Warming"],[30,"🔆","Heating"],[75,"🌶️","Hot"],[150,"🫧","Boiling"],[300,"🔥","Raging"],[600,"🌋","Inferno"],[1000,"⭐","White Hot"],[2000,"⚡","Plasma"],[5000,"💥","Supernova"]];
function getHeatLevel(){
  const coins=S.lifetimeCoins||0;
  let lvl=HEAT_LEVELS[0];
  for(const h of HEAT_LEVELS){if(coins>=h[0])lvl=h;}
  return lvl;
}
function calcDayScore(){
  // Score = coins × 10, bonus for tasks completed in order, cap at 9999
  const coins=S.tasks.reduce((a,t)=>a+t.completed,0);
  const stars=S.tasks.filter(t=>t.done).length;
  const total=S.tasks.length;
  const orderBonus=S.tasks.every(t=>t.done)?Math.round(stars*15):0;
  return Math.min(9999, coins*10 + orderBonus);
}
function updateStreak(){
  const td=today();
  const yesterday=new Date(Date.now()-86400000);
  const yd=`${yesterday.getFullYear()}-${p2(yesterday.getMonth()+1)}-${p2(yesterday.getDate())}`;
  if(S.lastCompletedDate===td){
    // Already updated today — no change
  } else if(S.lastCompletedDate===yd){
    S.streak=(S.streak||0)+1; // consecutive day
  } else if(S.streakFreezes>0){
    // Use a freeze instead of resetting!
    S.streakFreezes--;
    showToast('🧊 Streak freeze used. Back to it.','#4a78c0',3500);
    haptic([0,50,0,50,200]);
    // Don’t change streak, just update date
  } else {
    S.streak=1; // gap or first time
  }
  S.lastCompletedDate=td;
  const score=calcDayScore();
  if(score>S.bestScore&&S.bestScore>0){
    S.bestScore=score;
    setTimeout(()=>showToast('🏆 New personal best!','#c8841a',2500),1200);
  } else if(score>S.bestScore){
    S.bestScore=score;
  }
  // Lifetime coins accumulated per block in resolvePhaseEnd
  checkStreakMilestone(S.streak);
  checkBadges();
  save();updateHeader();
}

// ── FORMAT ─────────────────────────────────────────────────────────
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h>0?`${h}:${p2(m)}:${p2(ss)}`:`${p2(m)}:${p2(ss)}`;}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0&&m>0?`${h}h ${m}m`:h>0?`${h}h`:`${m}m`;}
function p2(n){return String(n).padStart(2,'0');}
// dayEl/dayRem defined near constants above

function totalRemSecs(){
  return S.tasks.reduce((a,t)=>{
    if(t.done)return a;
    const extra=(t.total-t.completed-1)*t.workDur
      +(!t.isRest&&t.restDur>0?(t.total-t.completed)*t.restDur:0)
      +(t.isRest&&t.restDur>0?t.restDur:0);
    return a+t.rem+extra;
  },0);
}

// ── DAYBAR ─────────────────────────────────────────────────────────
function renderDaybar(){
  const we=dayEl(),wr=dayRem(),totalB=totalRemSecs();
  const elPct=(we/DAY_S()*100).toFixed(2);
  const nowPct=parseFloat(elPct);

  // stack task segments from NOW
  const active=S.tasks.filter(t=>!t.done);
  let cursor=nowPct;
  const segs=[];
  active.forEach(t=>{
    const tSecs=t.rem
      +(t.total-t.completed-1)*t.workDur
      +(!t.isRest&&t.restDur>0?(t.total-t.completed)*t.restDur:0);
    const w=Math.min(tSecs/DAY_S()*100, 100-cursor);
    if(w>0)segs.push({color:t.color,left:cursor,width:w});
    cursor+=tSecs/DAY_S()*100;
  });

  const overflow=Math.max(0,cursor-100);
  const slackPct=overflow>0?0:Math.min(100-cursor,15); // show up to 15% slack in green
  const slackLeft=cursor;
  const hatchW=overflow>0?Math.min(100-nowPct,overflow):0;
  const slack=Math.round(wr-totalB); // round to avoid -0 float
  const isOver=slack<0;

  // Dynamic tick labels based on actual start time
  const dbTicks=(()=>{
    if(!S.startTs)return['8 am','12 pm','6 pm','midnight'];
    const start=new Date(S.startTs);
    const fmtT=h=>{const ap=h>=12?'pm':'am';const h12=h%12||12;return`${h12}${ap}`;};
    const s0=start.getHours();
    // 4 evenly spaced ticks across dayHours window
    const step=S.dayHours/3;
    return [0,1,2,3].map(i=>{
      const h=(s0+i*step)%24;
      return fmtT(Math.round(h));
    });
  })();
  document.getElementById('daybar').innerHTML=`
    <div class="db-top">
      <div class="db-stat go"><b>${fmtHM(wr)}</b> left</div>
      <div class="db-stat${isOver?' warn':''}">${isOver?`<span style="font-size:14px">💀</span> <b>${fmtHM(Math.abs(slack))}</b> over`:`<b>${slack===0?'±0m':('+'+fmtHM(slack))}</b> slack`}${S.streak>1?`<span style="margin-left:6px;font-size:10px;font-weight:800;color:#c8841a">🔥${S.streak}</span>`:''}</div>
    </div>
    <div class="db-track">
      <div class="db-el" style="width:${elPct}%"></div>
      ${slackPct>0?`<div class="db-slack" style="left:${slackLeft.toFixed(2)}%;width:${slackPct.toFixed(2)}%"></div>`:''}
      ${segs.map((s,i)=>`<div class="db-seg" style="left:${s.left.toFixed(2)}%;width:${s.width.toFixed(2)}%;background:${s.color};${i===segs.length-1?'border-radius:0 7px 7px 0':''}"></div>`).join('')}
      ${hatchW>0?`<div class="db-hatch" style="width:${Math.min(hatchW,100-nowPct).toFixed(2)}%;right:0"></div>`:''}
      <div class="db-now" style="left:${nowPct}%"></div>
    </div>
    <div class="db-ticks">
      ${dbTicks.map(l=>`<span class="db-tick">${l}</span>`).join('')}
    </div>`;
}

function cardState(t){
  if(t.done||t.isRest)return'';
  if(t.rem<=10)return'critical'; // last 10s
  if(t.rem<60)return'danger';
  if(t.rem<300)return'warn';
  return'';
}

function taskTotalRem(t){
  if(t.done)return 0;
  const fullBlock=t.workDur+t.restDur;
  const afterCurrent=t.total-t.completed-1;
  // current phase rem + rest of current block (if in work phase with pomo) + all remaining full blocks
  const curBlockRem=t.rem+(!t.isRest&&t.restDur>0?t.restDur:0);
  return curBlockRem+afterCurrent*fullBlock;
}

function _attachSensors(){

function requestMotionPermission(){

// ── HEIGHTFIELD WATER SIMULATION ─────────────────────────────────────
const bgHF={h:null,v:null,cols:0};
function ensureBgHF(cols){
  if(bgHF.cols===cols)return;
  const nh=new Float32Array(cols),nv=new Float32Array(cols);
  if(bgHF.h){const m=Math.min(cols,bgHF.cols);for(let i=0;i<m;i++){nh[i]=bgHF.h[i];nv[i]=bgHF.v[i];}}
  bgHF.h=nh;bgHF.v=nv;bgHF.cols=cols;
}
function stepHF(hf,tension,damping){
  const{h,v,cols}=hf;
  for(let i=1;i<cols-1;i++)v[i]+=(h[i-1]+h[i+1]-2*h[i])*tension;
  v[0]+=(h[1]-h[0])*tension;
  v[cols-1]+=(h[cols-2]-h[cols-1])*tension;
  for(let i=0;i<cols;i++){
    v[i]-=h[i]*0.004;
    v[i]*=damping;
    h[i]+=v[i];
    if(h[i]>150)h[i]=150; if(h[i]<-150)h[i]=-150;
  }
  // Smoothing pass — prevents jagged surface from per-column noise
  for(let i=1;i<cols-1;i++)h[i]=h[i]*0.7+(h[i-1]+h[i+1])*0.15;
}
function applyForce(hf,col,force,radius){
  const lo=Math.max(0,Math.floor(col-radius*3)),hi=Math.min(hf.cols,Math.ceil(col+radius*3));
  for(let i=lo;i<hi;i++){const dx=i-col;hf.v[i]+=force*Math.exp(-dx*dx/(radius*radius));}
}
function injectBoilEnergy(hf,boil,dt){
  if(boil<0.02)return;
  // Inject as gaussian blobs, not per-column noise — creates smooth rolling waves
  const rate=boil*2*dt*60;
  const n=Math.floor(rate+(Math.random()<(rate%1)?1:0));
  for(let s=0;s<n;s++){
    const col=Math.floor(Math.random()*hf.cols);
    const strength=(Math.random()-0.5)*boil*6;
    applyForce(hf,col,strength,8+Math.random()*12);
  }
}
// Tilt: separate smooth height layer (no oscillation, no jitter)
let tiltH=null;
function updateTiltLayer(cols){
  if(!tiltH||tiltH.length!==cols)tiltH=new Float32Array(cols);
  const strength=-tiltSmooth/30;
  for(let i=0;i<cols;i++){
    const target=strength*(i/cols-0.5)*300;
    tiltH[i]+=(target-tiltH[i])*0.12;
  }
}

// ── FLOATING OBJECTS ─────────────────────────────────────────────────
const activeFloaters=[];
const FLOATER_DEFS={
  'float_ducky':{emoji:'🦆',size:28,buoyancy:0.06,drag:0.88},
  'float_boat': {emoji:'⛵',size:24,buoyancy:0.05,drag:0.90},
  'float_ice':  {emoji:'🧊',size:32,buoyancy:0.07,drag:0.86},
  'float_ball': {emoji:'🏐',size:30,buoyancy:0.10,drag:0.88,bouncy:true},
  'float_fish': {emoji:'🐟',size:22,buoyancy:0.06,drag:0.98,underwater:true},
};
function spawnFloaters(W,fillY){

  const owned=S.shopItems&&S.shopItems.floaters?S.shopItems.floaters:[];

        activeFloaters.push({
          type:'theme',emoji:def.emoji,

        });
        idx++;
      }

  }
}
function stepFloaters(W,H,fillY,hf,step,dt,boil){
  activeFloaters.forEach(f=>{
    const col=Math.round(f.x/step);
    const surfY=(hf&&col>=0&&col<hf.cols)?fillY+hf.h[col]:fillY;
    // Fish: swim through the water with sinusoidal path
    if(f.underwater){
      // Target: middle of the water column
      const waterMid=surfY+(H-surfY)*0.5;
      f.vy+=(waterMid-f.y)*0.02;
      f.vy*=0.92;
      f.y+=f.vy;
      // Fish AI: gentle turns with longer intervals
      f.fishTimer-=dt;
      if(f.fishTimer<=0){f.fishDir*=-1;f.fishTimer=3+Math.random()*5;}
      // Wall bounce — nudge away so it doesn't re-trigger
      if(f.x<=f.size+4){f.x=f.size+5;f.fishDir=1;f.fishTimer=3+Math.random()*4;}
      if(f.x>=W-f.size-4){f.x=W-f.size-5;f.fishDir=-1;f.fishTimer=3+Math.random()*4;}
      const panicMult=boil>0.5?1+boil*2:1;
      const baseSwim=0.7*panicMult;
      f.vx+=(f.fishDir*baseSwim-f.vx)*0.08; // smooth acceleration
      f.x+=f.vx;
      // Sinusoidal swimming path — gentle wave motion
      f.y+=Math.sin(waveT*2.5+f.x*0.01)*0.4*panicMult;
      // Tilt into swim direction + slight bobbing
      f.rot=f.fishDir<0?0.08:-0.08;
      f.rot+=Math.sin(waveT*3)*0.04;
      // Flip direction stored for drawing
      f.flipX=f.fishDir>0;
      // Panic jump at high boil
      if(boil>0.6&&Math.random()<boil*0.002){
        f.vy=-6-boil*4;
        if(hf&&col>=0&&col<hf.cols)hf.v[col]+=2;
      }
    } else if(f.sinkFirst&&f.sinkTimer>0){
      // Dumpling: sink first, then float up
      f.sinkTimer-=dt;
      f.vy+=0.3; // gravity pulls down
      f.vy*=0.95;
      f.y+=f.vy;
      // Don't fall through bottom
      if(f.y>H-f.size){f.y=H-f.size;f.vy=0;}
    } else {
      // Surface floaters
      if(f.sinkFirst)f.sinkFirst=false; // done sinking, now float normally
      const submerge=f.size*0.35;
      const targetY=surfY-submerge;
      const aboveWater=f.y<targetY-2;
      if(f.bouncy&&aboveWater){
        // Ball in air: gravity + air drag
        f.vy+=0.45;
        f.vy*=0.993;
        f.vx*=0.995;
        f.y+=f.vy;
        // Clamp: can't fly off top of screen
        if(f.y<0){f.y=0;f.vy=Math.abs(f.vy)*0.3;}
        // Spin while airborne
        f.rot+=f.vx*0.015;
        // Splash on landing
        if(f.y>=targetY){
          f.y=targetY;
          if(hf&&Math.abs(f.vy)>2){
            const c=Math.round(f.x/step);
            if(c>=0&&c<hf.cols)applyForce(hf,c,f.vy*0.3,5);
            try{tone(100,.08,.025);}catch(e){}haptic([5]);
          }
          f.vy*=-0.4;
        }
      } else if(f.bouncy){
        // Ball on water surface — apply buoyancy
        f.vy+=(targetY-f.y)*f.buoyancy;
        f.vy*=f.drag;
        f.y+=f.vy;
        // Ball touched water — combo ends
        if(f.juggleCount>0)f.juggleCount=0;
      } else {
        f.vy+=(targetY-f.y)*f.buoyancy;
        f.vy*=f.drag;
        f.y+=f.vy;
      }
      // Rotation from surface slope (or slow continuous roll for eggs)
      if(f.roll){
        f.rot+=dt*0.3;
      } else if(hf&&col>0&&col<hf.cols-1){
        const tRot=Math.atan2(hf.h[col+1]-hf.h[col-1],step*2)*0.8;
        f.rot+=(tRot-f.rot)*0.12;
      }
    }
    // Gentle horizontal drift from wave slope
    if(!f.underwater&&hf&&col>0&&col<hf.cols-1){
      f.vx+=(hf.h[col+1]-hf.h[col-1])*0.08;
    }
    f.vx+=tiltSmooth*0.0008;
    if(!f.underwater){f.vx*=f.drag;f.x+=f.vx;}
    else f.x+=f.vx;
    // Walls
    if(f.bouncy){
      if(f.x<f.size){f.x=f.size;f.vx=Math.abs(f.vx)*0.6;}
      if(f.x>W-f.size){f.x=W-f.size;f.vx=-Math.abs(f.vx)*0.6;}
      // Hard velocity cap — prevents any edge case from sending ball to space
      f.vy=Math.max(-12,Math.min(f.vy,15));
      f.vx=Math.max(-8,Math.min(f.vx,8));
    } else {
      if(f.x<f.size){f.x=f.size;f.vx*=-0.3;}
      if(f.x>W-f.size){f.x=W-f.size;f.vx*=-0.3;}
    }
    // Ice cube melting: shrinks with boil intensity
    if(f.type==='float_ice'){
      f.melt=Math.min(0.85,f.melt+boil*dt*0.12);
      f.size=f.baseSize*(1-f.melt);
      if(f.size<f.baseSize*0.15)f.size=f.baseSize*0.15;
    }
  });
}
function drawFloaters(ctx){

function pushFloatersAt(tx,ty,vx,vy){
  activeFloaters.forEach(f=>{
    const dx=tx-f.x,dy=ty-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>=f.size*3)return;

    // Ball: ONLY direct taps, no proximity/drag forces
    // Rising pitch on successive juggles (Mario shell style)
    if(f.bouncy){
      if(dist<f.size*2){
        // Only count juggles when ball is above water surface
        const _H=window.innerHeight*_bgDpr();
        const _waterSurf=_H*(1-bgWaveState.fill/100);
        const aboveSurf=f.y<_waterSurf+f.size*0.5;
        const nx=f.x-tx, ny=f.y-ty;
        const mag=Math.sqrt(nx*nx+ny*ny)||1;
        const power=6+Math.min(dist/f.size,1)*4;
        f.vx=nx/mag*power*0.6;
        f.vy=ny/mag*power;
        if(f.vy>-3) f.vy=-3;
        if(aboveSurf){
          f.juggleCount=(f.juggleCount||0)+1;
        }
        const jc=Math.min(f.juggleCount,10); // pitch caps at 10
        const basePitch=300+jc*70;
        try{const now=ac().currentTime;
          tone(basePitch,.06,.035,now);tone(basePitch+200,.06,.03,now+.05);tone(basePitch+500,.1,.025,now+.09);
        }catch(e){}
        haptic([10,20,10]);
        // Confetti + record toast the moment you beat the high score
        if(aboveSurf&&f.juggleCount>0&&f.juggleCount>(S.ballRecord||0)&&f.juggleCount>3){
          S.ballRecord=f.juggleCount;save();
          const dpr=_bgDpr();
          burstAt(f.x/dpr,f.y/dpr,'#c8841a',40);
          burstAt(f.x/dpr,f.y/dpr,PAL[f.juggleCount%PAL.length],25);
          showToast(`🏐 New record: ${f.juggleCount}!`,'#c8841a',1800);
        }
      }
      return;
    }

    // Other floaters: gentle proximity push + sounds on direct hit
    const force=Math.max(0,1-dist/(f.size*3));
    f.vx+=(vx-dx*0.05)*force*0.5;
    f.vy+=(vy-dy*0.05)*force*0.5;
    if(dist<f.size*1.5){
      try{const now=ac().currentTime;
        if(f.type==='float_ducky'){tone(280,.12,.04,now,'square');tone(220,.14,.035,now+.1,'square');}
        else if(f.type==='float_boat'){tone(150,.08,.03,now);tone(120,.1,.02,now+.05);}
        else if(f.type==='float_ice'){tone(2400,.06,.025,now);tone(3200,.04,.02,now+.04);}
      }catch(e){}
      if(f.type==='float_ducky')haptic([15]);
      else if(f.type==='float_boat')haptic([8]);
      else haptic([5]);
    }
  });
}

// ── TOUCH PHYSICS (heightfield + bubble pop + floaters) ─────────────
const waterTouches={};
function _bgDpr(){return Math.min(window.devicePixelRatio||1,2);}
function _touchCol(tx){
  if(bgHF.cols===0)return -1;
  const W=window.innerWidth*_bgDpr();
  return Math.round(tx/W*bgHF.cols);
}
function popBubbleAt(tx,ty){
  for(let j=bgBubbles.length-1;j>=0;j--){
    const b=bgBubbles[j];
    const dx=tx-b.x,dy=ty-b.y;
    if(dx*dx+dy*dy<(b.r+12)*(b.r+12)){
      const popCount=5+Math.round(b.r*1.5);
      for(let k=0;k<popCount;k++){
        const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;
        const p=new P(b.x,b.y,Math.cos(a)*sp,Math.sin(a)*sp-2.5,'rgba(255,255,255,0.65)',1.5+Math.random()*3+b.r*0.3,0.12);
        p.round=true;p.decay=0.03+Math.random()*0.02;parts.push(p);
      }
      // Ring flash at pop site
      const ring=new P(b.x,b.y,0,0,'rgba(255,255,255,0.35)',b.r*2,0);
      ring.round=true;ring.decay=0.08;ring.grav=0;parts.push(ring);
      startFX();bgBubbles.splice(j,1);
      // Pop pitch inversely proportional to size — big bubbles = deep, small = high
      tone(600+2000/(b.r+1)+Math.random()*200, .04+b.r*.008, .025+b.r*.006);
      haptic([5]);break;
    }
  }
}
document.addEventListener('touchstart',(e)=>{
  if(!bgWaveState.active||e.target.closest('.card,.sheet,.fab,.hdr,.pill,.coin-pill'))return;
  const dpr=_bgDpr();
  const H=window.innerHeight*dpr;
  const waterY=H*(1-bgWaveState.fill/100);
  const surfZone=80*dpr; // surface interaction zone below waterline
  const aboveZone=20*dpr; // narrow zone above waterline
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const tx=t.clientX*dpr,ty=t.clientY*dpr;

    if(ty<waterY-aboveZone)continue;
    waterTouches[t.identifier]={x:tx,y:ty};
    if(ty<waterY+surfZone){
